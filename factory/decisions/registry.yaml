# Pandacorp decision registry
# Recurring decisions with a pre-approved default. If a decision is not here:
# escalate to the owner ONCE and add the new rule with their answer.

decisiones:
  - id: DR-001
    patron: "add an npm/pip dependency to a project"
    default: "auto-approve if: no known CVEs, maintained within the last 12 months, permissive license (MIT/Apache/BSD), and it exists in the official registry (beware of hallucinated packages)"
    requiere_humano: false

  - id: DR-002
    patron: "stack/technology choice for a new project"
    default: "the architect proposes the stack in the blueprint starting from the recommended one (factory/standards/stack.md, in the latest stable versions) and may suggest better alternatives with trade-offs; the owner approves the choice (lightweight gate) and it is recorded as an ADR. The durable conventions (factory/standards) are NOT negotiable"
    requiere_humano: true
    nota: "lightweight approval within the blueprint, not a separate gate"

  - id: DR-003
    patron: "deploy to staging / test environment"
    default: "auto-approve if CI is green"
    requiere_humano: false

  - id: DR-004
    patron: "deploy to PRODUCTION"
    default: "BLOCK — requires explicit approval from the owner"
    requiere_humano: true

  - id: DR-005
    patron: "spend money (purchases, paid plans, domains, paid APIs)"
    default: "BLOCK — requires explicit approval from the owner with the amount"
    requiere_humano: true

  - id: DR-006
    patron: "DB schema migration"
    default: "auto-approve ADDITIVE (expand) migrations in dev/staging if they have a down block and pass on a test DB. DESTRUCTIVE changes (DROP of a column/table, rename) = forward-compatible expand/contract pattern; the final DROP requires a verified snapshot + human gate (DR-007) and a troubleshooting timebox with rollback. In production → escalate"
    requiere_humano: false

  - id: DR-007
    patron: "delete data, repos, remote branches, or cloud resources"
    default: "BLOCK — requires explicit approval from the owner"
    requiere_humano: true

  - id: DR-008
    patron: "external communications (emails to users, public webhooks, publishing on stores/marketplaces)"
    default: "BLOCK — requires explicit approval from the owner"
    requiere_humano: true

  - id: DR-009
    patron: "language of artifacts (what goes in English and what in Spanish)"
    default: "the state in git decides the language. COMMITTED → English: code, commits, file and folder names, and product/technical documents (PRD, FRD, blueprint, ADR, README, tests, the project's docs/decision-log.md). GITIGNORED → Spanish: the communication with Pandacorp (project summary, .pandacorp/inbox/decisions.md, logs, activity, Mission Control feed, .pandacorp/comms/iteration.md) and the owner's personal data. .pandacorp/status.yaml is committed with ONLY machine state in English (keys/enums/counters/SHAs); its human-readable prose goes to the gitignored Spanish layer. UI visible to the user via i18n, Spanish by default (conventions.md). Result: whoever clones sees everything in English; the owner operates Pandacorp in Spanish. INTERACTION with the owner (chat and any skill output addressed to the owner — questions, explanations, progress, recommendations, summaries) is ALWAYS in Spanish, regardless of the artifact language: artifact language (git-state-driven) and interaction language (always Spanish) are two separate axes. Detail in factory/standards/conventions.md (Language)"
    requiere_humano: false
    nota: "replaces the previous rule ('documents in Spanish'). Pending migration: translate the existing docs + rename files/folders + propagate to templates (see factory/decision-log.md 2026-06-15)"

  - id: DR-010
    patron: "create a GitHub repository for a project"
    default: "auto-approve as a PRIVATE repo in the owner's account; public → escalate"
    requiere_humano: false

  - id: DR-011
    patron: "discard an idea from the base (score < 30 after documenting)"
    default: "auto-approve moving to the 'discarded' status leaving the rationale in the card; never delete the file"
    requiere_humano: false

  - id: DR-012
    patron: "scope of a version (which FRDs go into v1)"
    default: "the minimal slice that validates the value hypothesis; 'nice to have' FRDs go to the backlog of the next version"
    requiere_humano: false

  - id: DR-013
    patron: "implementation of a project (how the work is divided among agents)"
    default: "use a dynamic workflow (Dynamic Workflows) that orchestrates the subagents; the per-FRD build loop lives in the script (resumable, deterministic), NOT in Agent Teams. Composition according to the stack: web (A) → backend-dev + frontend-dev + test-writer; API/scraper (B/C/D) → backend-dev + test-writer; dependencies and parallelism explicit in the pipeline (frontend starts when the backend contract exists; testing when frontend/backend finish) and the reviewer at the FRD GATE (once per feature, when all its work orders are IN_REVIEW — not per work order; DR-050). Agent Teams only for occasional adversarial review, not as the backbone"
    requiere_humano: false

  - id: DR-014
    patron: "concurrency and models per subagent (consumption control)"
    default: "DESIGN FOR Max 5x on projects: up to 3 simultaneous agent() in the workflow, judgment (review/architecture) on opus, workers (implementation/testing/research) on sonnet or haiku. The construction of the factory itself (panda-corp and its Pandacorp panel) can raise the concurrency while the plan allows it (Max 20x)"
    requiere_humano: false

  - id: DR-015
    patron: "ownership of the verification tests (who writes what)"
    default: "the test-writer/implementer writes the happy-path tests and the EARS criteria; the reviewer (a different model from the generator, opus) ADDITIONALLY writes adversarial and edge-case tests that the implementer did NOT see. Anchor the cases in EARS criteria and in real bugs from .pandacorp/comms/progress.md, never in what the model imagines"
    requiere_humano: false
    nota: "breaks the shared bias between test-writer and implementer (see docs/proposals/06). For DEEP-mode adversarial review, prefer a reviewer of a DIFFERENT model FAMILY (e.g. non-Claude) when available — a different size within the Claude family still shares its training blind spots; cross-family is the ideal, cross-size the minimum."

  - id: DR-016
    patron: "mutation testing / property-based testing (when to run them)"
    default: "NOT at every Stop gate (expensive). Run mutation testing (Stryker in TS / mutmut in Python) and property-based (fast-check / hypothesis) at the CLOSE of each FRD milestone and in CI toward main. Suggested mutation-score threshold ≥60% on new business logic; below that, the reviewer demands additional tests"
    requiere_humano: false

  - id: DR-017
    patron: "agentic security checklist at release"
    default: "the security-auditor evaluates the OWASP Top 10 for Agentic Applications (ASI01–ASI10) in addition to the essential web OWASP. Tool Misuse, Identity/Privilege Abuse, Memory Poisoning, and Cascading Failures = blocking if there is real exposure"
    requiere_humano: false

  - id: DR-018
    patron: "living documentation (changelog, ADRs, user docs)"
    default: "auto-generate the changelog from Conventional Commits at release; propose an ADR automatically when a work order touches architecture; maintain README/docs as part of the work order (not a separate task). No human effort except approving a non-obvious ADR"
    requiere_humano: false

  - id: DR-019
    patron: "hardening of the verification environment (anti-cheat)"
    default: "verify.sh runs in a clean environment, parses fail-closed (ambiguity = failure), does not expose to the generator agent the exact names of the tests to pass nor the fixtures, and emits actionable messages (which rule failed and why). Applies to the verify.sh template that the blueprint creates"
    requiere_humano: false

  - id: DR-020
    patron: "operation of the construction (how implement runs unattended)"
    default: "implement launches a dynamic workflow in the background and runs in auto mode (permissions; the owner enables it at the user level, the repo does not grant it). Freeze-on-red: a stage that fails throws → the pipeline skips that WO (does not commit what is broken, leaves HEAD at the last green, marks it BLOCKED, notifies) and continues with the independent WOs. Circuit breakers (cap on iterations, no-progress, workflow budget). The workflow stops by itself when the queue is empty; to run continuously it is wrapped in /loop self-paced. The operator talks through files (.pandacorp/inbox/bugs, .pandacorp/inbox/decisions.md, rethink_pending), which the workflow reviews only at safe points"
    requiere_humano: false

  - id: DR-021
    patron: "database and services in development"
    default: "in DEV, each project and each worktree brings up its DB/services with Docker Compose, its own port; in STAGING/PRODUCTION, the golden path's managed DB (Neon/Supabase), never Docker. See factory/standards/infra.md"
    requiere_humano: false

  - id: DR-022
    patron: "port assignment (several projects/worktrees in parallel)"
    default: "dev ports are ALLOCATED from a central ledger (factory/ports.yaml, gitignored), NEVER guessed or hashed (hashing collides by the birthday problem): scaffold reserves the next free 10-wide block from base 4000 (slug→base recorded in the ledger + dev_port_base in the project's status.yaml) and a project keeps its block forever; within the block, offsets keep worktrees apart (app agent +0 / review +1, Postgres +2/+3, Redis +4/+5, +6..+9 spare); blueprint materializes the ports into .claude/launch.json (app=base+0) and the worktree .env; in Docker, a different Compose project name per worktree. Zero collisions by construction. See factory/standards/infra.md"
    requiere_humano: false

  - id: DR-023
    patron: "test the progress without stopping the construction"
    default: "the owner tests the last green commit (last_green_sha) in a separate git worktree (a single review folder, refreshed to the latest green), never the agent's working tree. The gate script writes last_green_sha + safe_to_test in .pandacorp/status.yaml. Native checkpoints do NOT work as a snapshot (they ignore what was done by Bash)"
    requiere_humano: false

  # DR-024..030 are governance: they point to a standard in factory/standards/ (the values live there, not here).
  - id: DR-024
    patron: "performance in a web project"
    default: "apply the Core Web Vitals budget (LCP≤2.5s / INP≤200ms / CLS≤0.1 at p75, see performance.md); Lighthouse-CI gate as a proxy, block-on-main; real p75 in the field via PostHog. Threshold deviation = ADR"
    requiere_humano: false

  - id: DR-025
    patron: "privacy / handling of personal data (PII)"
    default: "minimize PII, do not log it, retention with a time limit, export/delete in the model (see privacy.md). Collecting NEW PII or sharing data with third parties = escalate to the owner (aligns with DR-008)"
    requiere_humano: true
    nota: "human only for new PII / sharing with third parties; everything else is a deterministic default"

  - id: DR-026
    patron: "minimum observability of a project"
    default: "every project integrates error-tracking (Sentry, from the stack) + structured JSON logs with service.name from day 1, without asking (see observability.md)"
    requiere_humano: false

  - id: DR-027
    patron: "security headers / CSP (web)"
    default: "set the cheap OWASP set as a literal default in next.config (see web-security.md); CSP with nonce in report-only in v1. Verified by header-scan in CI. The submit to hstspreload.org = human (it is durable)"
    requiere_humano: false
    nota: "auto except the preload submit, which escalates to the owner"

  - id: DR-028
    patron: "error contract of an API"
    default: "RFC 9457 (application/problem+json) + validation at the edge (Zod/pydantic) by default (see api-design.md)"
    requiere_humano: false

  - id: DR-029
    patron: "feature flags"
    default: "sensitive flags are evaluated server-side (the client receives only the result); expiration MANDATORY when creating the flag + archive (do not delete). Auto-approvable: kill-switch and gradual rollout (1/5/25/50/100). ESCALATE if the flag would bypass an existing gate (prod migration DR-006, money DR-005)"
    requiere_humano: false
    nota: "conditional escalation: human only if the flag bypasses another gate"

  - id: DR-030
    patron: "deviation from the golden path in a project"
    default: "deviating = per-project ADR (not a new DR). sync-portfolio/recommend observe recurring deviation ADRs across projects and propose promoting the pattern to factory/standards/ when it repeats. Promoting to a standard = the owner's decision"
    requiere_humano: false
    nota: "the promotion of a recurring pattern to a global standard is approved by the owner"

  - id: DR-031
    patron: "source of Party events (how Mission Control is fed during the construction)"
    default: "Mission Control is read-only and decoupled: it reads ~/.claude/dashboard-events.ndjson. With Dynamic Workflows, the events are emitted by the workflow's subagents (emit-event.sh when starting/finishing their stage) and the SubagentStop hook — NOT the Agent Teams hooks (TeammateIdle/TaskCreated/TaskCompleted, which do not fire in workflows). The emission is fire-and-forget (append to a file): it does not block the workflow nor compete for tokens, so having the little RPG graphic costs no performance. Mapping: agent() running → working; stage transition → walking/handoff; reviewer stage → review; stage that throws → blocked; WO commit → safe point"
    requiere_humano: false

  - id: DR-032
    patron: "iterate in an early phase (discovered/documented/design/architecture) without advancing a column, and how to advance between phases"
    default: "the manual phases do NOT auto-close: each skill (explore/new-idea/spec/design/blueprint) produces its output, marks advance_pending: true in .pandacorp/status.yaml, and does NOT write the phase transition until the owner's explicit 'ok, advance'. Re-running the SAME phase = iterate in place (refines what exists, does NOT regenerate from scratch nor repeat what was already rejected). The essence of the back-and-forth (what was tried, what was rejected and why, what remains open) is persisted in .pandacorp/comms/iteration.md (in ideas, without a project: factory/ideas/_drafts/<slug>.md) so it can be resumed even if the conversation is lost. Extends principle 2 (artifacts before chat)."
    requiere_humano: true
    nota: "lightweight, per-phase gate at the manual stages; does NOT apply to implement (autonomous, already resumable) nor change the release-to-production gate (DR-004). The journal reduces future intervention (principle 7): resuming does not require re-explaining."

  - id: DR-033
    patron: "the owner's personal data in the factory repo (profile, portfolio, idea cards) and portability"
    default: "they are NEVER committed to the public repo: they live on disk gitignored (factory/profile.md, factory/portfolio.md, factory/ideas/*.md except _idea-template.md and decision-log.md). Only the mold is versioned: *.example.md seeds and templates. Personalizing the factory = /pandacorp:onboarding, which generates factory/profile.md (the factory reads it for name/GitHub/project path/objectives). The paths in skills/scripts are resolved relative to the factory root (cwd / repo root), never absolute."
    requiere_humano: false
    nota: "opens the factory as a template cloneable by anyone; see factory/decision-log.md (2026-06-14)."

  - id: DR-034
    patron: "versioning of the pandacorp plugin when something changes in plugin/"
    default: "the plugin carries a semver `version` in plugin/.claude-plugin/plugin.json (source of truth) and IT IS BUMPED on every change to plugin/: PATCH (x.y.Z) fix/adjustment/doc without changing behavior; MINOR (x.Y.0) new compatible capability (new skill/agent/option); MAJOR (X.0.0) breaking change (renaming/removing a skill, changing a flow in an incompatible way). The bump is part of the 'after editing plugin/' flow: bump version → commit → claude plugin update. Note the why in plugin/docs/decision-log.md."
    requiere_humano: false
    nota: "the local installation tracks the SHA to detect drift (FRD-15); the version is the semantic label of the release."

  - id: DR-035
    patron: "a version includes payments/charging users (Polar checkout, subscription, ads, donations) and is deployed on Vercel"
    default: "do NOT block the work (it is not a gate). WARN the owner at 3 moments —when defining the PRD (when it is decided that there are payments), in the blueprint (hosting plan), and at the release (before the deploy)— that Vercel Hobby prohibits commercial use and its suspension is of the WHOLE ACCOUNT without guaranteed notice; if the version charges money it requires Vercel Pro (USD 20/month per seat, covers the whole team + USD 20 of credit). The owner decides to continue or stop. Structure: a single Pro team for all shipped apps; the day an app turns on payments it goes to the Pro team. Trigger a push (DR-038). See factory/standards/external-services.md §6"
    requiere_humano: false
    nota: "it is a WARNING, not an obstacle. The decision 'does v1 include payments? yes/no' is defined explicitly in the PRD (product-manager)."

  - id: DR-036
    patron: "choice of external service by category (storage, email, payments, analytics) and the multi-app account model"
    default: "use the standard proven service per category (storage=Cloudflare R2, transactional email=Resend, marketing/waitlist email=Kit, errors=Sentry, analytics=PostHog, payments=Polar; DB=Neon, deploy=Vercel, auth=Better Auth already in stack.md) and the 'ONE shared account/org + 1 primitive per app' model (Neon project / R2 bucket / Resend domain / PostHog org / Polar product). FORBIDDEN to create puppet accounts with +aliases to dodge free-tier caps (violates ToS). Deviating from a service = per-project ADR (DR-030). The values and the why live in factory/standards/external-services.md"
    requiere_humano: false

  - id: DR-037
    patron: "credentials/secrets of external services and how the resources are provisioned"
    default: "provision via API/CLI (headless) where it exists; browser (Claude-in-Chrome) only as a fallback, verifying the active account before acting. Secrets in two planes: runtime in the project's .env (gitignored, .env.example without values) and machine store in SOPS+age (encrypted file OUTSIDE every repo, age key in the macOS Keychain) for provider tokens and per-app credentials. LastPass = only the owner's personal one, separate from the machine store. Tokens with least privilege. See factory/standards/external-services.md §3-4 and web-security.md"
    requiere_humano: false

  - id: DR-038
    patron: "the agent reaches a point that requires a decision or action by the owner (any human gate)"
    default: "trigger a push notification to the owner (arrives on the phone if Remote Control / the Claude app is connected) with a one-line actionable message, IN ADDITION to leaving the pending item by file (.pandacorp/status.yaml, .pandacorp/inbox/decisions.md). Applies to EVERY gate: production (DR-004), spending money (DR-005), deleting (DR-007), external communications (DR-008), Vercel/payments warning (DR-035), :decide pending items, and signup/2FA/payment during provisioning (DR-037). Mission Control is the desktop view; the push is the 'I'm out' view."
    requiere_humano: false
    nota: "it does not replace the by-file channel (principle 2): it complements it so the owner can leave it running and know when to come back."

  - id: DR-039
    patron: "idea recommendation model (discover/recommend) according to the owner's profile"
    default: "discover and recommend read factory/profile.md and work in TWO streams, ~50/50: (A) general opportunities of high return/ease, independent of the topic; (B) aligned with the profile (interests, objectives, ASSETS/levers such as audience/community/network/niche), even if the monetary return is lower, because they are useful to them or open doors. RETURN != only money: it also counts opportunity (reach/network/positioning), learning, and personal value, weighted according to the profile's monetization_appetite. OPEN SCOPE: not only monetizable apps — web/mobile app, rework, Claude Code tooling/project, prompt or prompt system, automation, etc. The card records project_type, profile_alignment, and return_type; the new-idea scoring weights return (monetary/opportunity/personal) and fit with the profile"
    requiere_humano: false
    nota: "do not penalize an aligned idea for low monetary ROI if it leverages an asset or opens doors, nor a general idea for not being 'on topic'. See factory/ideas/decision-log.md (2026-06-15)"

  - id: DR-040
    patron: "git workflow: branching and pushing to main"
    default: "the solo operator commits and pushes to main DIRECTLY — no mandatory feature branch or PR (human review adds no value with a single operator; the quality gate is the reviewer in /pandacorp:implement + .pandacorp/verify.sh). A throwaway branch is OPTIONAL, only for big/risky changes the owner may want to abort wholesale. STILL BLOCKED by block-dangerous.sh (anti-catastrophe, not workflow): force-push, deleting the main branch, git reset --hard, rm -rf of roots, gh repo delete. Applies to the factory and to every scaffolded project"
    requiere_humano: false
    nota: "replaces the previous 'feature branches; never push to main' rule (constitution §11). Removed the direct-push-to-main block from plugin/scripts/block-dangerous.sh"

  - id: DR-041
    patron: "launch market and language for a product (which market(s)/language(s), mono vs multi-language)"
    default: "NO fixed default — decided per product. During /pandacorp:spec the researcher analyzes the launch market & language (where to launch first, single vs multi-language, which languages), weighing the app, market size/competition, customer-acquisition ease, ROI and the owner's country/language (from factory/profile.md); it recommends and the product-manager records the decision in the PRD, which the owner approves (scope gate, like DR-012). The product is ALWAYS i18n-ready so adding languages later is cheap; the chosen launch locale sets the UI default (NOT automatically Spanish). Mission Control and other owner-facing tools are always Spanish, independent of this."
    requiere_humano: true
    nota: "the owner's country is captured by /pandacorp:onboarding into factory/profile.md (country field). The choice is part of the PRD scope the owner approves. Distinct from the repo's artifact language (DR-009) and the interaction language (always Spanish)."

  - id: DR-042
    patron: "how the product pipeline (spec/blueprint/release) adapts to an idea's return_type, and the demand/economics/distribution gates"
    default: "the pipeline READS return_type (from the card / .pandacorp/idea-origin.md) and adapts — it is not a single monetary-app-shaped pipeline. PERSONAL → the owner is the user: skip market/competitor research, demand validation, pricing and GTM; focus on solving the owner's need well. MONETARY or MIXED → full treatment: (a) DEMAND GATE before the expensive build — spec records a real demand signal (live PAYING competitors = the market exists; volume/recurrence of the pain; for B2B, who pays) and, when cheap, a willingness-to-pay validation (landing/waitlist via Kit); if the signal is absent or contradicts the idea, recommend KILL/PIVOT before scaffolding+PRD (don't invest design+build on an unvalidated monetary idea). (b) UNIT ECONOMICS — the PRD carries a unit-economics block: proposed price (anchored to paying competitors) + per-active-user variable cost (from the known service costs: Polar ~4%+$0.40, Vercel Pro, Neon/R2/Resend/PostHog tiers) + back-of-envelope break-even; the blueprint fills the cost side. (c) DISTRIBUTION — release produces a launch plan (primary acquisition channel + draft posts the owner publishes under DR-008). OPPORTUNITY → validate the ASSET/reach is real (does the audience exist/engage), define the opportunity metric (reach/network/positioning), GTM via the owner's own channel, no pricing unless mixed. The demand gate, unit-economics block and launch plan are scope items the owner approves with the PRD (like DR-012/DR-041)"
    requiere_humano: true
    nota: "return_type previously only fed ranking (DR-039); this makes it DRIVE delivery. personal ideas stop paying the monetary-pipeline tax; monetary ideas stop skipping demand validation. The kill/pivot and the price are the owner's call (scope gate)."

  - id: DR-043
    patron: "closing the loop after launch — reading metrics vs the value hypothesis and deciding kill / double-down"
    default: "a shipped project does NOT end at phase 'release' as a dead sink (DR-085: there is no separate 'operation' phase — it is folded into 'release', the launched/terminal phase). /pandacorp:review-launch (run on demand or as a /loop self-paced job; precondition phase: release — reaching release, internal or external, is what triggers eligibility) reads the product's REAL metrics (PostHog events from docs/analytics/events.md; telemetry is wired during construction, DR-085) against the PRD's value hypothesis and its kill-signals, and presents the owner a verdict: DOUBLE DOWN (iterate / market more), HOLD, or KILL/ARCHIVE. The PRD defines kill-signals with numeric thresholds — for monetary/mixed (e.g. < N active users or $0 revenue at 60 days → formal review), for opportunity the opportunity-metric (reach/contacts gained). The portfolio gains business columns (active users / revenue-or-opportunity metric / last verdict) so the owner sees winners vs zombies across the portfolio. Killing or archiving a shipped product is a human decision (like DR-007/DR-011); the loop produces the recommendation, the owner decides"
    requiere_humano: true
    nota: "the missing back half of the economic arc: the factory could ship + instrument but never read results to decide. review-launch + portfolio business columns close it. Distinct from /iterate (feature-driven) — this is evidence-driven. DR-085 reframed it under the 'release' phase (post-launch loop), not a separate 'operation' phase."

  - id: DR-044
    patron: "how changes are made to a Pandacorp product project (free-chat edit vs going through a skill)"
    default: "WRITE-GATE: in a Pandacorp product project (marker: the .pandacorp/ folder, i.e. .pandacorp/status.yaml present), changes that touch app BEHAVIOR, a CANONICAL doc (PRD/FRD/blueprint/ADR/DESIGN/tokens) or STATE (.pandacorp/status.yaml, work-orders) go through the /pandacorp:* skills, NOT ad-hoc free-chat edits — otherwise the two-layer documentation, status.yaml, FRDs/work-orders, TDD and review are skipped and the docs/state drift. PRAGMATIC FRONTIER — EXEMPT (do directly): reading, answering, debugging, and micro non-product edits (a typo in a comment, local config, a throwaway experiment); BY SKILL: anything that changes behavior, a canonical doc, or state. ROUTER: when the owner asks for a change, the agent classifies it and AUTO-INVOKES the right skill, announcing which one — feature/behavior change → /iterate; bug found while testing → /bug; decide a pending point → /decide; big package/redesign → /new-version. Auto-invoking covers the ENTRY to the skill only; it does NOT bypass the skill's internal human-gates (production DR-004, money DR-005, delete DR-007, external comms DR-008 still ask). ENFORCEMENT: instruction in the project CLAUDE.md/AGENTS.md (self-regulation) + a non-blocking PreToolUse Write|Edit hook that reminds when a product file is edited without a skill"
    requiere_humano: false
    nota: "the frontier is pragmatic, the router auto-invokes (entry only), enforcement is instruction + warning hook — all the owner's choices (2026-06-15). Lives in the project template (CLAUDE.md.tpl/AGENTS.md.tpl) so every project, new or adopted, is born with it. GRACEFUL DEGRADATION: the skills/hooks live in the owner's plugin (user scope), NOT in the project repo, so a fork/clone WITHOUT the plugin is still fully workable — the project CLAUDE.md/AGENTS.md tell a plugin-less agent to apply the same discipline (update the FRD + decision-log) by hand. The write-gate is the assisted path, not a lock on contributing. NOTE: template changes are NOT retroactive by themselves — a project keeps its overlay until `/pandacorp:upgrade` re-syncs it (overlay-versioning + auto-upgrade, DR-048). See plugin/docs/decision-log.md"

  - id: DR-045
    patron: "running a Pandacorp skill on a project NOT born from the handoff (external / brownfield), and how the factory adopts it"
    default: "the factory is greenfield-first but ACCEPTS brownfield. PREFLIGHT: every skill that mutates a project (implement/iterate/release/bug/new-version) checks the Pandacorp marker (.pandacorp/status.yaml present) at start; if absent it STOPS and points to /pandacorp:adopt (bring the existing project into the factory) or /pandacorp:spec (create a new one) — it does NOT hallucinate over a missing structure. ADOPT: /pandacorp:adopt injects the overlay without clobbering, infers the real phase from the code (tests? deploy? scaffolding-only?), reconstructs minimal as-built docs (PRD/FRDs, or stubs, so downstream skills have an anchor), writes .pandacorp/status.yaml, creates a retroactive idea card (status: in-pipeline) and the portfolio row. Touching an existing project = human gate: confirm the plan AND its consequences before writing (which files are created/merged, and that the project becomes Pandacorp-managed — changes via skills from then on, while staying workable without the plugin). Mission Control may surface unregistered sibling projects (FRD-16) as 'adopt?' banners"
    requiere_humano: false
    nota: "fixes the silent-failure / hallucination when a mutating skill runs on a non-Pandacorp folder (skills had no preflight). Distinct from scaffold (greenfield): adopt is the brownfield path. See factory/decision-log.md (2026-06-15)"

  - id: DR-046
    patron: "reflecting a factory know-how change (new/renamed/removed skill or agent, changed flow or gate, new decision rule or standard) in Mission Control's Manual (FRD-08)"
    default: "Mission Control's Manual (the 'Códice del gremio', FRD-08) is the operable, navigable surface of the factory's know-how and MUST stay in sync with it via TWO complementary mechanisms. (1) DERIVED reference: the Reference catalogs (commands=skills, agents=party, decision-rules, standards) are GENERATED from the canonical source — the plugin skill+agent frontmatter (name+description) under plugin/skills/ and plugin/agents/, factory/decisions/registry.yaml, and factory/standards/ — NOT hand-copied, so a new/renamed/removed skill, agent, rule or standard appears automatically with no drift. The future Next.js app builds them by reading those files at build/read time; while only the HTML prototype exists, its CONFIG.{skills,agents,rules,estandares} arrays are reconciled BY HAND until the app derives them. (2) DISCIPLINE for prose: the hand-authored Tutorial/Guides/Concepts pages (the how-to and the why, which cannot be auto-derived) are part of the documentation discipline — a change that alters HOW the factory is operated (new flow, changed gate, renamed step) MUST update the affected Manual page in the SAME change, alongside the area decision-log entry. The Manual is a canonical surface (like an FRD): letting it drift from the factory is documentation drift"
    requiere_humano: false
    nota: "the owner asked for this rule (2026-06-15); a re-audit found the prototype Manual had drifted (behind by 2 skills, 1 agent, 6 rules, 1 standard). Derivation makes the reference drift-proof; discipline covers the prose. ENFORCEMENT (2026-06-20, plugin v8.26.0): the prose half is now backed by a non-blocking PreToolUse hook (plugin/scripts/remind-manual-sync.sh) that fires whenever a conversation edits the operable surface (plugin/skills, plugin/agents, factory/standards, registry.yaml, constitution.md) — in free chat OR in /memory|/learn — reminding the model to update the matching content/manual/ narrative page in the same change. Owner decision: reminder-first while Mission Control's own build is in flight; harden to a hard-blocking Stop variant once that build finishes. Canonical doc: mission-control FRD-08. Factory-level operating discipline (CLAUDE.md 'Decision log' section) — NOT the product-project documentation.md standard, since Mission Control is the factory's own tool, not a product project"

  - id: DR-047
    patron: "the factory learns from its own projects — when and how a harvested lesson is stored, applied, or escalated (the self-learning loop)"
    default: "the factory accumulates durable engineering lessons in factory/memory/ (committed English know-how, like factory/standards/; typed: problem-solution | library-verdict | pattern | gotcha | anti-pattern). CAPTURE is always-on (Tier 1): in any skill or conversation, durable lessons are jotted as one-line candidates to a raw inbox (.pandacorp/run/lessons.md per project, factory/memory/_inbox.md in the factory). REFINE (Tier 2): the librarian drains the inbox + project traces (a fixed bug, a reviewer finding seen >=2x, a library chosen in blueprint, a review-launch verdict, a recurring deviation ADR, operationalizes DR-030) into clean lessons with A.U.D.N. dedup (ADD/UPDATE/MERGE/NO-OP, so capture volume does NOT bloat the store) and PROVENANCE (owner-stated > ci-verified > agent-inferred), on a scheduled sweep + on demand (surfaced by Mission Control's memory-health reminder, FRD-17: pending-notes count + last-run staleness), NOT tied to any single skill. RETRIEVE: the agents read factory/memory/ before design/blueprint/implement so a past solution makes the next build faster. Autonomy is TIERED by risk (owner chose alternative B, semi-autonomous): (1) LOW-RISK — recording/updating a lesson in factory/memory/ (any type, incl. library-verdict): AUTO after a light eval-gate (schema-valid + corroborated: >=2 occurrences OR a confirmed outcome, and it does not contradict a higher-confidence lesson). The harvester writes it as a CANDIDATE (status: candidate), never as confirmed truth. (2) MEDIUM-RISK — promoting a lesson to a NEW factory/standards/ rule as SHOULD/warning: AUTO only if it ships with its deterministic verifier (the existing learn / skill-creator / verify.sh machinery), and the owner is notified. (3) HIGH-RISK — promoting to a MUST standard, creating/editing a skill or agent, adding/changing a DR, deprecating/removing anything, or anything that touches a project under construction: ALWAYS human gate, surfaced in Mission Control's Propuestas inbox (FRD-17) + push (DR-038). NEVER delete a lesson — deprecate it (status: deprecated), like DR-011/DR-007. ANTI-POISONING (this is Memory Poisoning, DR-017/ASI; evidence: MemoryGraft shows agents over-trust self-generated reflections): candidate != confirmed, confidence + corroboration + PROVENANCE (an agent-inferred lesson needs corroboration before active; owner-stated/ci-verified outrank it), A.U.D.N. dedup, capture only evidence-anchored notes (never reflections-on-reflections), the eval-gate, and the human gate for high-risk; a periodic prune job proposes deprecating lessons never retrieved in N months or contradicted by newer evidence (it proposes, the owner decides)"
    requiere_humano: true
    nota: "tiered: low/medium AUTO after the eval-gate, high-risk always asks — so the coarse flag is true (when in doubt, ask). Operationalizes DR-030 (recurring pattern -> standard) with a substrate (factory/memory/) and a closed loop (harvest -> store -> retrieve -> propose -> gate -> promote -> prune). learn becomes the 'apply' stage of the loop, not a manual point-tool. factory/memory/ is committed English engineering know-how, NOT owner personal data (DR-033). Owner chose alternative B 2026-06-15. Canonical doc: docs/proposals/09-self-learning-factory.md + factory/memory/README.md. Engine shipped: librarian agent + /pandacorp:memory + retrieval + learn-as-promote (plugin v6.1.0); always-on hybrid capture (raw inbox) + A.U.D.N. dedup + provenance (v6.2.0). FRD-17 (Mission Control Propuestas inbox + memory-health reminder) is spec'd. SWEEP ACTIVATED (2026-06-22 process audit — the loop captured but never refined: 1 graduated lesson vs 103 piled-up inbox notes, no trigger was wired): harvest now fires at the FRESHEST moment — `/pandacorp:implement` runs a `librarian` harvest of the just-built project at build CLOSE-OUT (close-out step) — and a periodic review sweep is registered as a scheduled job (machine-local: the harness scheduler / a LaunchAgent, like the MC always-on), draining the inbox + proposing promotions to the owner. Still pending: prototype reconcile (DR-046)"

  - id: DR-048
    patron: "where a project's Pandacorp files live (the .pandacorp/ integration layer) and how a project's overlay is kept current (overlay versioning + auto-upgrade)"
    default: "STRUCTURE: a project keeps the factory-integration layer in a single `.pandacorp/` folder (the project's analogue of .github/), SEPARATE from the product. Committed (English, a clone needs it): `.pandacorp/{guide.md,status.yaml,idea-origin.md,README.md,verify.sh}`. Gitignored (Spanish/owner-facing/runtime, regenerable): `.pandacorp/comms/` (summary, iteration, progress, activity), `.pandacorp/inbox/` (bugs, decisions), `.pandacorp/run/` (skill-active marker, caches). The PRODUCT documentation stays in `docs/` (prd, frds, blueprint, adr, decision-log, design, work-orders, reviews); the tool contracts stay where the tool looks (`CLAUDE.md`/`AGENTS.md` at the root, `.claude/`). `CLAUDE.md` is THIN: it `@`-imports `@AGENTS.md` (durable conventions, self-contained for any agent) and `@.pandacorp/guide.md` (managed Origin/write-gate/doc-map), leaving a free zone for the owner's own notes; the managed `guide.md` regenerates whole, the owner's notes are never touched. CRITERION committed-vs-gitignored = the AUTOSUFFICIENCY test (does someone cloning JUST the repo need it to continue?) decides IF it goes in git; DR-009 decides the LANGUAGE of what is committed. VERSIONING: `.pandacorp/status.yaml` carries `overlay_version` (mutable, what the project has now) + `created_with` (immutable); the plugin carries `${CLAUDE_PLUGIN_ROOT}/templates/OVERLAY_VERSION` (the last version in which templates/shared actually changed). Drift iff overlay_version < OVERLAY_VERSION (avoids false positives from plugin bumps that don't touch the overlay). AUTO-UPGRADE: the mutating skills' preflight detects drift and runs `/pandacorp:upgrade`, which migrates an old layout into `.pandacorp/`, regenerates the managed layer non-destructively, bumps overlay_version and commits on its own. Owner chose SILENT for compatible (same-MAJOR) bumps; a breaking (MAJOR) jump is announced first. The marker that identifies a Pandacorp project (detector is-pandacorp-project.sh, the preflight, the write-gate hook) is the presence of `.pandacorp/status.yaml`"
    requiere_humano: false
    nota: "owner's idea (2026-06-15): one .pandacorp/ folder like .github, autosufficiency as the committed-vs-gitignored test, a thin CLAUDE.md that references a managed file via @import, automatic silent-but-safe upgrade. Replaces the scattered docs/{status.yaml,summary,iteration,decisions,progress,activity,bugs,idea-origin} layout (MAJOR / plugin v6.0.0 — breaking paths, migrated by /pandacorp:upgrade). Supersedes the overlay-drift note in DR-044 (now resolved by the upgrade loop). What does NOT move: CLAUDE.md/AGENTS.md (tool contract, root) and docs/ (product). Mission Control dogfoods it (its own status/idea-origin/summary moved to mission-control/.pandacorp/). See plugin/docs/decision-log.md + factory/decision-log.md (2026-06-15). NOTE: the INTERNAL layout of docs/ (prd/frds/blueprint/work-orders) was later reorganized feature-centric by DR-049; .pandacorp/ itself is unchanged"

  - id: DR-049
    patron: "how a project's product documentation under docs/ is organized (PRD, FRDs, design, blueprint, work orders) and how features/requirements are identified for traceability"
    default: "FEATURE-CENTRIC, the FRD as a self-contained module (canonical: factory/standards/structure.md → 'Documentation structure'). LAYOUT: docs/product/ (prd.md + a LIVING feature-landscape table; architecture.md = PLATFORM architecture; research.md; context-pack.md + glossary.md ON DEMAND) — design/ (the GLOBAL design system = the PDD: design-tokens.json + root DESIGN.md + references/voice; ONE per project) — docs/frds/frd-NN-<slug>/ as a MODULE holding frd.md + fdd.md (CONDITIONAL: UI only) + blueprint.md (feature impl design; large → blueprints/ folder split by coherent concern, NOT 'pillars') + mocks/ (CONDITIONAL) + work-orders/ (README.md + wo-NN-MMM-<slug>.md, each WO targets exactly ONE deploy unit and copies its AC inline) — docs/adr/ (platform decisions) — docs/analytics/events.md (GLOBAL) — docs/decision-log.md. TWO ARCHITECTURE LAYERS: product/architecture.md (platform, stable, ONE) vs frd-NN/blueprint.md (per-feature); a single global blueprint.md is the rejected anti-pattern. PRD↔FRD = SIBLINGS, loosely coupled (feature-landscape table + parent-PRD frontmatter), NOT nested. WORK ORDERS live UNDER their FRD (was: one global docs/work-orders/); intra-feature order in the per-FRD README, cross-feature order from each WO's Dependencies; the build walks every frd-NN/work-orders/. DESIGN = two layers: design/ (product system, the PDD) + frd-NN/fdd.md (feature UI). STABLE IDs (numeric, folder-derived, never renamed): REQ-NN-MMM → AC-NN-MMM.K → CMP-NN-<slug>/IF-NN-<slug> → WO-NN-MMM → tests; SOURCE-OF-TRUTH hierarchy FRD > FDD > design-tokens > blueprint > work order, restated in every blueprint/WO header, changes propagate upstream in that order. PROGRESSIVE DISCLOSURE: same shape always, folders created on demand, depth scales with size; growth is ADDITIVE (a new feature = a new frd-NN/ folder, nothing moves), the only lifecycle rename is product/prd.md → product/prds/. EXTENSIBLE skeleton: a project MAY add its own folders (runbooks/, db/, a feature's references/) but MUST NOT rename/relocate the contract parts (product/, design/, frds/frd-NN/, the IDs)"
    requiere_humano: false
    nota: "owner-driven (2026-06-16), benchmarked vs JobLeap (0-jobleap-company-context, the reference adopted) and PandaTrack (deeper nesting, rejected). Replaces the by-type flat layout (docs/{prd.md, frds/frd-NN.md flat, blueprint.md global, work-orders/ global}) which is comfortable for small MVPs but caps at scale (a single blueprint monolith; growth forced a flat→nested migration mid-project). Owner decisions: numeric folder-derived IDs (JobLeap 2-letter code rejected as cryptic); blueprint splits into a blueprints/ FOLDER not 'pillars'; the design/ folder IS the PDD (no separate PDD file); one structure at two fill levels (not two structures). Canonical doc: factory/standards/structure.md + factory/standards/documentation.md (owner-doc table + source-of-truth hierarchy). Proposal: docs/proposals/10-feature-centric-doc-structure.md. MAJOR plugin change (skills spec/scaffold/blueprint/work-orders/implement/iterate/design/adopt/upgrade/new-version + party agents + templates rewritten to the new paths; implement walks per-FRD work-orders instead of a flat glob) + Mission Control docs migrated + Manual (DR-046). See factory/decision-log.md (2026-06-16)"

  - id: DR-050
    patron: "how the factory plans, tracks and runs a build — where the state of each work order/FRD lives, work-order granularity, where the build dependency plan lives, and when tests run"
    default: "DOCUMENT-DRIVEN ORCHESTRATION (canonical: factory/standards/build-orchestration.md). STATE lives in the YAML FRONTMATTER of each FRD/blueprint/work-order (never in body prose, commits or runtime inference): `status` (DRAFT|ACTIVE|BLOCKED|SUPERSEDED) + `implementation_status` (PLANNED→IN_PROGRESS→IN_REVIEW→VERIFIED, +BLOCKED) — the build engine's SOURCE OF TRUTH: it builds only PLANNED/IN_PROGRESS and NEVER rebuilds VERIFIED; changing the field IS the instruction (iterate/new-version reopen a WO by setting it PLANNED). The WORK ORDER is the ATOMIC SOURCE OF TRUTH; an FRD's/blueprint's implementation_status is a DERIVED ROLLUP of its work orders (VERIFIED iff ALL are, else the worst non-VERIFIED in order BLOCKED>PLANNED>IN_PROGRESS>IN_REVIEW) — on any FRD↔work-order discrepancy the WORK ORDERS WIN (the FRD field is a cache, trustworthy alone only at VERIFIED), and the engine RE-DERIVES & PERSISTS each rollup when it plans and after each gate so the document never lies about progress ('done' = VERIFIED, measured on work orders). WORK ORDERS are COARSE (one cohesive view/page/capability, not an atomic component). The BUILD PLAN (DAG of a feature's work orders: order, deps, parallelism, integration order) lives in each per-FRD blueprint.md and the engine READS it (no runtime re-inference). Each closed WO writes a `## Status Note` HAND-OFF (interfaces exposed, integration seams) so the next agent reads that, not all the code. The engine builds FRD BY FRD and reviews/tests PER FRD (not per WO): a WO runs only its own fast self-test → IN_REVIEW; one review + integration test over the whole FRD → VERIFIED (cost O(FRDs) not O(WOs)). A failing WO/gate triggers a REPAIR PASS (diagnose+fix) before blocking; only if the fix is out of reach does the feature go BLOCKED with a `blocked_reason` (needs-owner|external|error). A RUN RUNS TO COMPLETION by default — it stops only by: nothing left, the BUDGET ceiling (the real token guardrail, set via the run's budget directive), a HEALTH breaker (too many non-external blocks in a row), or work that NEEDS-OWNER; `maxFrds` is opt-in for supervised TEST runs only, never the overnight guardrail. THREE test layers: unit/component (per WO) + integration/adversarial (FRD gate) + functional/browser via preview tools (opt-in per project). Templates in plugin/templates/docs/. Mission Control's status.yaml replicates the per-status counts."
    requiere_humano: false
    nota: "owner-driven (2026-06-16), recovered from PandaTrack after the Mission Control dogfood exposed the failure modes: a build that ran ~8h and ~944 subagents for ~37 work orders (~76% re-work) because state was not in the data (the engine rebuilt finished WOs on every relaunch), with atomic WOs, per-WO review/verify and runtime dependency inference, and the owner blind to stalls. Completes what DR-049 took from PandaTrack (the feature-centric STRUCTURE) with what it left behind (frontmatter state, coarse WOs, the blueprint Build Plan, hand-offs, per-FRD testing). Canonical: factory/standards/build-orchestration.md. Proposal: docs/proposals/11-build-orchestration-v2.md. MAJOR plugin change (v8.0.0): doc templates added (plugin/templates/docs/); skills spec/blueprint/work-orders/iterate/new-version updated; pandacorp-build.js rewritten to the per-FRD loop. v8.1.0 added the build SUPERVISOR (live Monitor watch + heartbeat + phone push); v8.2.0 refined the FRENO (owner decision): run-to-COMPLETION with stop-by-HEALTH/BUDGET (maxFrds → opt-in test-only), REPAIR-before-block, BLOCKED carries a blocked_reason (needs-owner|external|error), desktop+PushNotification only (no third-party push app). v8.10.0: the FRD/blueprint implementation_status is a DERIVED rollup of its work orders (the atomic source of truth) — the engine RE-DERIVES & PERSISTS it on plan + after each gate, fixing a stale frd.md that misreported FRD-06 as PLANNED while its 11 WOs were IN_REVIEW (MC dogfood 2026-06-17). See plugin/docs/decision-log.md + factory/decision-log.md (2026-06-16)"

  - id: DR-051
    patron: "how an engineering rule/standard actually reaches the projects (the injection + propagation channel), and what is required when a project-facing standard is added or changed"
    default: "RULES ARE INJECTED AS FILES, NOT REFERENCED. The factory keeps a project-injectable rule library at plugin/templates/rules/ — the operative, portable form of factory/standards/, split by purpose/technology (Cursor-.mdc-style), each file declaring `applies_when` (always | web-ui | react | nextjs | tailwind | public-web | prisma | next-intl | posthog | sentry). Projects carry their rules as FILES in docs/rules/ (NOT .pandacorp/ — they are good practices any agent must follow whether or not the project uses Pandacorp), referenced from CLAUDE.md (`@docs/rules/README.md`, loaded via recursive @import) and AGENTS.md. SELECTIVE COPY: scaffold injects the `always` files at birth; blueprint adds the tech-gated files that match the APPROVED stack (a React-only project gets react.md but NOT nextjs.md; no Prisma → no prisma.md); adopt injects the set matching a brownfield project's inferred stack. docs/rules/README.md is generated to @import exactly the files present + index them. PROPAGATION (no more drift): the plugin's rule files are the source of truth — upgrade re-copies them VERBATIM (overwriting the project copy, removing now-inapplicable ones, leaving owner-added project-specific rule files), and re-generates the README, on the next skill run. The TRIGGER is OVERLAY_VERSION: any change to a rule file (or the templates) bumps templates/OVERLAY_VERSION, and the DR-048 auto-upgrade loop carries it into every existing project. CONTRACT (enforced in the learn skill): a standard that governs how projects are built MUST, in the same change, (1) update/add the matching plugin/templates/rules/ file with the right applies_when, (2) wire any hard-enforceable part into the stack's lint/verify.sh (templates/stack-*/STACK.md) so violations FAIL the gate — not just live in prose, and (3) bump OVERLAY_VERSION. THREE ENFORCEMENT LAYERS: presence (the rule file in docs/rules/, read by every agent) + propagation (upgrade + OVERLAY_VERSION) + hard gate (lint/typecheck/test in verify.sh/CI). Standards that are factory-internal only (build orchestration, factory ops) do NOT ship to projects and need no rule-library change — but that must be stated, so it is a decision not an omission."
    requiere_humano: false
    nota: "owner-driven (2026-06-18): Mission Control violated core/modules even though it was already written in AGENTS.md.tpl — proving that a hand-condensed embed that drifts from factory/standards/ AND is not hard-enforced is not enough. Root cause: TWO copies of the rules (canonical factory/standards/ + condensed AGENTS.md embed) with nothing syncing them, and the learn skill only wrote the canonical copy → new rules never reached projects. Fix (this design): a single injectable rule library in the plugin, copied as files into docs/rules/ selectively by stack, propagated by upgrade+OVERLAY_VERSION, with the learn contract making propagation mandatory and a hard-enforcement layer in verify.sh. Owner's model: rules live in docs/ (portable, tool-agnostic), split by tech like PandaTrack's .cursor/rules, with a README manifest that doubles as the @import loader. Sibling-project harvest that seeded the initial library: PandaTrack (.cursor/rules .mdc) + jobresearch-app. See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-18). Builds on DR-048 (overlay versioning + auto-upgrade) and DR-046 (derived, non-drifting surfaces)"

  - id: DR-052
    patron: "which lint/format tool a project uses, and which version of a tool/library to install"
    default: "TOOLING: **Biome is the single standard for BOTH formatting and linting** in JS/TS/React/Next projects — it replaces Prettier AND ESLint. Do NOT install Prettier or ESLint by default. Biome's formatter (~97% Prettier-compatible) is the formatter; Biome's linter (recommended rules + the react/next/test domains + the a11y group) is the linter; Tailwind class ordering = Biome `useSortedClasses`. ESCAPE HATCH (only when a needed rule Biome lacks): a MINIMAL ESLint config running ONLY the missing rules — Testing-Library-specific query/async lint (eslint-plugin-testing-library) and/or full eslint-plugin-next parity — added ALONGSIDE Biome; never re-add Prettier. Rationale: one binary, one config, ~10–25× faster, fewer moving parts for agents. VERSIONS: a new project/install uses the **latest stable** version (@latest); an in-flight project stays on the version it was built with (no mid-build churn); an older/brownfield project installs only versions **compatible with its framework major** — verify support before adding (e.g. a Next.js 13 project gets the latest library version that still supports Next 13, not @latest). When the compatible range is unclear, resolve it; don't assume @latest."
    requiere_humano: false
    nota: "owner-driven (2026-06-18). Biome: owner asked to standardize on it after the MC iterate flagged a plan/stack mismatch (plan said install ESLint, the project uses Biome). Verified by research (Biome v2.x: 500+ rules, react/next/test domains, a11y group, useSortedClasses for Tailwind, type-aware noFloatingPromises without tsc; gaps = deep Testing-Library rules, full eslint-plugin-next, full typescript-eslint type-aware suite → the documented ESLint escape hatch). next lint was removed in Next 16, so a linter must be invoked directly anyway. Versions: owner wants latest-always for new work but compatibility-first for old projects (don't force a Next 13 project onto libs needing Next 15). Canonical: factory/standards/stack.md (recommended stack + Version policy) + the injectable rules (code-conventions.md, styling-and-ui.md, web-security.md, clean-code.md, quality-and-testing.md) + plugin/templates/stack-a-nextjs/STACK.md (Biome setup + hard-enforcement mapping). See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-18)"

  - id: DR-053
    patron: "the owner profile (factory/profile.md) — how it is first built and how it stays current as the owner talks to the factory"
    default: "THE OWNER PROFILE IS A LIVING DOCUMENT, captured continuously — NOT a one-time onboarding form. (1) BOOTSTRAP: /pandacorp:onboarding offers to seed the profile from the owner's PAST CONVERSATIONS before interviewing — it lists the projects that have Claude Code transcripts (~/.claude/projects/*/), ASKS the owner yes/no, and only on yes mines them. Mining is a CHEAP FUNNEL, never a raw read: layer 0 = read any already-distilled auto-memory; layer 1 = MECHANICAL jq extraction of ONLY the owner's typed turns across the chosen projects (0 model tokens — a transcript is ~0.4% human text, so this strips ~99.6% of the bulk: tool results, code, assistant output); layer 2 = parallel agents over that compact corpus extract structured personal signal (interests, hobbies, tastes/dislikes, goals, assets/levers, project types, working style), IGNORING orchestration/agent prompts; then it PRESENTS 'this is what I already know about you' and interviews FROM there (confirm/fill gaps), never from zero. Archived transcripts are included (still on disk); deleted ones can't be. (2) CONTINUOUS CAPTURE: whenever the owner reveals a durable personal fact about THEMSELVES (interest, hobby, taste/dislike, goal, asset/lever, how they work) in ANY conversation, the agent writes/updates it in the profile — read-first, dedupe, never duplicate. Destination is ALWAYS factory/profile.md (personal, gitignored, Spanish): in the factory repo directly; in a product project via the factory path stamped in .pandacorp/guide.md ({{FACTORY_PATH}}). The rule lives in panda-corp's CLAUDE.md (rule 9) and in the product overlay's .pandacorp/guide.md (rule 9), propagated by upgrade/adopt + OVERLAY_VERSION. THREE DISTINCT PLANES, never mixed: the OWNER profile (who the owner is → personalizes discover/recommend/conversation, DR-053) vs ENGINEERING memory (durable technical lessons → factory/memory, DR-047) vs DECISIONS (history → the decision log). The profile is the single source of user configuration (DR-033)."
    requiere_humano: false
    nota: "owner-driven (2026-06-18). Owner wanted the factory to KNOW him without re-interviewing from scratch and to keep learning him as they talk, purely for personalization (e.g. 'I like reading manga' → discover/recommend lean that way) — explicitly NOT the engineering self-learning loop (DR-047) nor the decision log. Measured before designing: a single pandatrack transcript is 18MB on disk but only ~79KB (~0.4%) is human-typed text, so the bootstrap funnels mechanically (jq, 0 model tokens) before any agent reads → all signal, a fraction of the cost. guide.md.tpl already stamps {{FACTORY_PATH}}, so a product project already knows where the factory profile is; sibling-project layout is already a scaffold rule (scaffold step 2). Builds on DR-033 (profile = single source of user config, gitignored), DR-047 (engineering memory, kept separate), DR-048/DR-051 (overlay propagation). Canonical: plugin/skills/onboarding/SKILL.md (bootstrap) + panda-corp CLAUDE.md rule 9 + plugin/templates/shared/.pandacorp/guide.md.tpl rule 9 + factory/profile.example.md note. OVERLAY_VERSION 8.16.0 → 8.17.0; plugin v8.17.0. See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-18)"

  - id: DR-054
    patron: "design fidelity — how the factory captures the look (an owner-approved visual vs none), freezes it as a contract, and forces the build to reproduce it"
    default: "TWO PATHS, decided by SCANNING THE REPO FIRST then confirming with the owner — never ask blind (in design AND in adopt): scan for an existing visual (a prototype/HTML mockups, docs/design artifacts, a token/CSS system in the stylesheets, screenshots, the live styled UI); IF something is found PRESENT it and let the owner confirm/correct (encontre esto, es tu referencia? falta alguna, o no son estas?); IF nothing is found THEN ask whether it lives elsewhere (Figma, another folder). A confirmed visual is the binding target. ADOPT-VISUAL path (a visual is confirmed): the designer EXTRACTS it FAITHFULLY into docs/design/design-tokens.json + root DESIGN.md (+ design-decisions.md = frozen FROM the approved visual at <path>), stages its assets (fonts/images/sprites; embedded iframes are part of the contract), SKIPS the 3-direction exploration, and the owner gate becomes a FIDELITY check — demoting/relaxing/modernizing the approved visual, or inventing a fresh look over it, is FORBIDDEN. EXPLORE path (no): research the domain, 3 genuinely different directions, owner picks, freeze; bespoke per domain (never the factory RPG look). The FROZEN CONTRACT is MANDATORY and GATED: design does not advance to architecture (even on an owner ok) until DESIGN.md + design-tokens.json + design-decisions.md exist AND every UI FRD has a non-empty fdd.md + mocks/ derived from the contract — existence is CHECKED, a missing artifact is not-done (the hole that let Mission Control reach build with a frozen design-tokens.json that did not exist). FIDELITY is ENFORCED DOWNSTREAM, not just use-the-tokens: FRD declares ui:true|false + visual_source and ACs include visual fidelity; blueprint Build Plan cites fdd.md + mocks/ as the visual spec for a UI WO + the assets to stage; the WO carries a Visual reference section + a fidelity AC (the built screen matches mocks/<file>); implementer/frontend-dev must REPRODUCE the mock (layout/structure/components/density), not approximate; reviewer verifies the RENDERED result vs the mock (DR-055), not token usage in source. Canonical: factory/standards/design.md."
    requiere_humano: true
    nota: "owner-driven (2026-06-18), root-caused from the Mission Control dogfood: it was ADOPTED with an owner-approved prototype (prototype/index.html + party iframes) as the agreed 100% visual target, but (1) adopt had NO design step so the prototype was never migrated into a contract, (2) the later design brief DEMOTED it to functional-only and invented a cold-blue palette (the design skill had no anchor-on-approved-visual path — it was hard-wired to invent 3 fresh directions), (3) the frozen artifacts were never produced, and (4) nothing enforced fidelity (use-tokens satisfied every gate; the party views shipped emoji instead of the contracted pixel-art sprites, assets never staged). Fix touches plugin/skills/{design,adopt,spec,blueprint,work-orders} + plugin/agents/{designer,implementer,frontend-dev,reviewer} + templates/docs/{frd,blueprint,work-order} + new factory/standards/design.md. Pairs with DR-055 (preview smoke gate). See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-18)"

  - id: DR-055
    patron: "runtime/visual verification — whether a build may be VERIFIED without the app being rendered in a browser"
    default: "THE PREVIEW SMOKE GATE: for any FRD with UI routes, the gate MUST render each key route in a real browser before VERIFIED — MANDATORY and FAIL-CLOSED (default ON for web; only a genuinely headless project — pure API, scraper — opts out, recorded as a decision, not an omission). A Playwright smoke (booting the app via webServer) loads each route and FAILS the gate on any browser console error / uncaught pageerror / failed request / blank-or-error render; it asserts a real-content sentinel (main/h1 visible, not error.tsx) and screenshots to docs/reviews/smoke/ for the reviewer fidelity check (DR-054). FAIL-CLOSED is the load-bearing word: a MISSING smoke harness is a RED gate, never a skip — a referenced-but-absent layer must not read as passed. It rides inside verify.sh (so the per-FRD gate and close-out enforce it automatically) and the reviewer re-runs it independently (generator != verifier) as a 4th lens (runtime/visual). Per DR-051 the rule lives in the injectable quality-and-testing.md and the concrete wiring (playwright.config + e2e/smoke.spec.ts + the verify.sh fail-closed stage) in stack-a-nextjs/STACK.md; a change bumps OVERLAY_VERSION. Canonical: factory/standards/design.md + build-orchestration.md section 5."
    requiere_humano: false
    nota: "owner-driven (2026-06-18): the owner exact diagnosis — bastaba con entrar UNA vez a la app para ver que estaba llena de errores. Root cause: the whole verification surface (verify.sh = biome+tsc+vitest; reviewer writes more node tests + reads code; the live supervisor watches liveness/progress/spend) operated on the STATIC artifact and NEVER opened a browser; the one runtime hook (close-out run the e2e of critical flows) was a PHANTOM (no Playwright existed -> silently degraded to vitest -> fail-OPEN), and the browser layer existed in build-orchestration.md as opt-in/default-off, never turned on. So 112/112 WOs went VERIFIED while every route threw React duplicate-key errors and matched no mockup. Fix: flip build-orchestration section 5 layer 3 to mandatory/default-on/fail-closed, add the reviewer runtime/visual lens, ship the Playwright smoke + fail-closed verify.sh stage in STACK.md, add the definition-of-done bullet to quality-and-testing.md. Pairs with DR-054. See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-18)"

  - id: DR-056
    patron: "how the factory GUARANTEES an AI agent implements a UI at 100% visual fidelity to an approved HTML/design reference"
    default: "RESEARCH-BACKED (Design2Code/DCGen/UI2Code^N benchmarks + v0/Builder.io + Anthropic guidance): the dominant failure is element-omission/layout-drift, fixed by SCOPE + GROUND + IN-LOOP + GATE; and because the reference IS HTML the agent TRANSLATES it (HTML->React+Tailwind+tokens) rather than reconstructing from pixels. FOUR mechanisms, all required. (1) SCOPE/SHARD: the design phase shards the approved whole-app prototype into ONE self-contained mock per FRD (docs/frds/<frd>/mocks/, that FRD screens only) — never hand an agent the whole prototype (full-screenshot reproduction lands ~2% of elements; scoping recovers them). The whole-app prototype's defined home is docs/design/prototype/. (2) GROUND/MATERIALIZE: the per-FRD fdd.md + mock + the work order ## Visual reference (the exact mock file + the token slice + the fdd pointer) are MATERIALIZED, because the build engine passes the implementer only a one-line summary — so the WO body IS the agent design context (empty = builds blind). The engine ALSO injects the design refs + the in-loop directive into the implementer/frontend-dev prompt (belt and suspenders). (3) IN-LOOP: the builder renders its route, screenshots, compares to the mock, self-corrects up to 3 cycles BEFORE IN_REVIEW (the biggest lever after scoping). (4) GATE (fail-closed, the independent verifier): Layer A deterministic Playwright toHaveScreenshot vs blessed baseline (determinism mandatory: pinned Docker, workers:1, fonts.ready, animations off, seeded data, masked dynamic regions, no retries on visual specs, updateSnapshots none in CI, threshold 0.2 + maxDiffPixelRatio ~0.02) at >=2 viewports; Layer B VLM mock-judge (a DIFFERENT model from the builder) enumerates NAMED divergences before a verdict, >=3 samples order-randomized, fail-closed on a named structural divergence, escalate needs-owner on uncertainty, never auto-fail on fine pixel deltas. COMPLETE-EXTRACTION: the ADOPT-VISUAL extraction captures EVERY layer (base components + app-wide skin + each embedded sub-view spec), not just the palette. Canonical: factory/standards/design.md + build-orchestration.md section 5."
    requiere_humano: false
    nota: "owner-driven (2026-06-19): the owner spent significant time polishing an HTML prototype and demanded a GUARANTEE that AI agents reproduce it 100% visually. Audit root cause: the build engine passes the implementer ONLY a one-line summary — it never sees fdd/mocks/tokens; the refs reach it only if it reads fixed paths that were EMPTY for all ~17 UI FRDs (no fdd, no mocks, no ui:/visual_source); plus globals.css still shipped the prohibited palette and the token extraction missed the app-wide RPG skin + the party pixel-art spec. Researched via 3 parallel web agents: design-to-code fidelity (scope+ground+loop) and automated visual verification (deterministic pixel diff + VLM-as-judge, layered because neither alone is reliable). Fix: design/adopt SHARD the prototype per-FRD + complete-extraction + prototype home docs/design/prototype/; work-orders fills the ## Visual reference; pandacorp-build.js INJECTS the refs + in-loop directive into the build prompt; implementer/frontend-dev run the in-loop loop; reviewer + build-orchestration + STACK add the two-layer gate. Builds on DR-054 (approved visual = frozen contract) + DR-055 (preview smoke gate). See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-19)"

  - id: DR-057
    patron: "how parallel AI build agents avoid DUPLICATING components and keep visual + code coherence across one app"
    default: "FOUNDATION-FIRST + a COMPONENT INVENTORY + GATE ENFORCEMENT (research-backed: Storybook manifests, shadcn registry; a machine-readable inventory measurably raises reuse). Parallel feature agents cannot see each other's work, so given the same need they reinvent slightly-different versions of the same component (the Mission Control two-near-identical-warn-banners bug: PluginSyncBanner + OrphansBanner built by two agents that never talked, no shared Banner primitive). THREE mechanisms. (1) FOUNDATION-FIRST: the Build Plan schedules the shared design-system primitives (Button, Banner/Alert, Card, Chip, Modal, layout shells) as the FIRST work order(s) — a foundation wave that completes BEFORE feature work orders fan out; feature WOs declare a dependency on it, so they build against real existing primitives, not reinvented ones (the owner's build-the-common-things-first). (2) COMPONENT INVENTORY: a living docs/design/components.md (each shared component: name, purpose, path, key props/variants) seeded by the design phase + the foundation WO, appended by every WO that adds a shared component; the build ENGINE injects read-the-inventory-before-creating into every UI build prompt (reuseRef), so reuse->adapt(add a prop/variant)->create-only-if-new is the path of least resistance (a near-duplicate for a small difference, e.g. a banner icon left vs top, is a VARIANT not a second component). Claude Design's _ds_manifest.json IS this inventory when DR-058 is used. (3) GATE: the reviewer quality lens REJECTS a component that re-implements an existing primitive and flags sibling components that diverge from one shared pattern; reuse is verified, not assumed. (4) FOUNDATION-COMPLETENESS GATE (extended 2026-06-20): foundation-first only works if the foundation is COMPLETE — the UNION of EVERY shared primitive ANY surface's mock/FDD references, DERIVED from docs/design/components.md (+ each per-FRD mocks/fdd), never a hand-picked subset. The planner derives the complete set; the engine runs a foundation-completeness gate BEFORE any surface fans out (enumerate every referenced primitive, check each is BUILT as a shared component and its foundation WO is green) and REFUSES to start surfaces until the foundation is complete+green. An incomplete foundation triggers the bounded auto-repair (DR-065), not building surfaces against missing primitives. This closes the Party regression: the foundation was declared 'ready' while incomplete (Room/AgentSprite/StoneBridge/FlowStrip were never in it), so the surfaces built flat and failed fidelity. Canonical: factory/standards/build-orchestration.md section 3 + clean-code.md (injectable rule)."
    requiere_humano: false
    nota: "owner-driven (2026-06-19): the owner spotted two warn banners in Mission Control that should be one component but differ (triangle left vs top) — diagnosing duplicated code + no visual coherence because parallel agents never communicated. Research (deep-research, 3-0 high confidence): agents lacking structured knowledge of the existing design system reinvent components (default to shadcn/Tailwind); giving them a machine-readable inventory (Storybook manifests / shadcn registry) measurably improves reuse. Owner's own fix intuition (first agent builds the common things, then others reuse) = the foundation-first wave. Fix: build-orchestration.md section 3 (foundation-first + inventory + gate), pandacorp-build.js (reuseRef injection), blueprint/work-orders skills (foundation wave + reuse), implementer/frontend-dev (check-before-create), reviewer (dup/coherence lens), clean-code.md (the component-inventory rule shipped to projects). Pairs with DR-058 (Claude Design provides the inventory). EXTENDED 2026-06-20 (mechanism 4, foundation-completeness gate) after the Mission Control Party Phase-2 build declared an INCOMPLETE foundation 'ready' and shipped flat surfaces: the engine now derives the foundation as the UNION from components.md and gates completeness+green before fan-out; pairs with the bounded auto-repair (DR-065). See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-19, 2026-06-20)"

  - id: DR-058
    patron: "whether and how the factory uses Anthropic's Claude Design tool in the design phase"
    default: "PREFER CLAUDE DESIGN for the EXPLORE path (when the factory must PROPOSE a UI / no design system exists). Claude Design (Anthropic Labs, claude.ai/design, launched 2026-04-17; the 2026-06 update added Claude Design <-> Claude Code integration) is Anthropic's specialized design tool: generate a COHERENT design system + REUSABLE component library, with built-in self-checking of output against the system. Division of labour (CORRECTED 2026-06-27): the OWNER generates on the web canvas (the generative engine); the agent uses the DesignSync TOOL for FILE SYNC ONLY (create_project / upload context / pull / integrate) and CANNOT pilot the generator remotely. Auth is a one-time /design-login (interactive terminal); /design-sync is PUSH-ONLY React code (not a generator, not a pull); /design may be absent; never assert command availability from the filesystem (defer to the owner's autocomplete). EXPLORE path: generate the system in Claude Design, then sync it INTO the repo; its _ds_manifest.json seeds the DR-057 component inventory (docs/design/components.md). ADOPT-VISUAL path (a prototype already exists, e.g. Mission Control): keep the prototype extraction; OPTIONALLY push the extracted system UP to a Claude Design project for central management + self-checking. Hand-authored HTML mockups (design Steps 4-6) are the FALLBACK when Claude Design is unavailable. CAVEAT: it needs the owner's claude.ai login + design-system access (the tool prompts once) and is beta — OFFER it, never force it; for a headless/cron run with no claude.ai login it is unavailable, fall back to HTML. Does NOT apply to a project that already has its design (its prototype is the source of truth, DR-054). Canonical: factory/standards/design.md + plugin/skills/design/SKILL.md."
    requiere_humano: true
    nota: "owner-driven (2026-06-19): the owner saw Claude Design's 2026-06-17/18 Claude Code integration and asked to evaluate adopting it. Verified REAL via deep-research (Anthropic Labs research preview 2026-04-17, >1M users week one; the /design-sync + /design integration is real) AND by the presence of the DesignSync tool in this environment (read methods list_projects/get_project/list_files/get_file; create_project; finalize_plan; write_files/delete_files; the Design System pane builds a card index from @dsCard markers into _ds_manifest.json). Better than hand-coding HTML because it is the specialized tool, produces a coherent reusable library + the manifest that feeds DR-057, and self-checks. Owner approved full adoption for the EXPLORE path. Pairs with DR-057 (the manifest IS the component inventory) and DR-054 (does not override an existing approved prototype). See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-19). CORRECTED + EXTENDED 2026-06-27 (PersonalPage v2 session): connection facts fixed (one-time /design-login auth; /design-sync push-only; /design may be absent; DesignSync tool = file sync only; canvas = owner-driven generator; don't assert commands from the filesystem). The generation brief MUST be exhaustive with an anti-omission completeness checklist — all components + every state + image PLACEHOLDERS + a MANDATORY motion layer + breakpoints by target_platforms — and the agent MUST pull-and-review the canvas output against it before the gate. Canonical: factory/standards/design.md §1c. EXTENDED by DR-101 (batch-2, 2026-06-28): the generation CADENCE (two stages — system then ALL screens enumerated from the FRDs, never stop at the landing), weight=importance, real content, explicit prompts, the per-surface playbooks and the per-screen review rubric."

  - id: DR-059
    patron: "how the factory makes sure a project's REAL gate config (verify.sh / biome.json / knip) actually enforces the standards, not just the prose"
    default: "THE GATE CONFIG PROPAGATES VERBATIM + IS CONFORMANCE-CHECKED (the gate-config analogue of DR-051, which did this for the prose rules). Audit meta-root-cause: the standards + STACK example prescribed a rich enforcement layer, but a project's ACTUAL verify.sh/biome.json never wired it — so the smoke/visual gates (DR-055/056), knip (dead code), the Biome domains (react/next/test) + a11y group, and complexity=error were all silently OFF, and NOTHING checked the wiring (so DR-055/056 and the rules were written but unenforced in Mission Control — the same class as core/modules ignored, DR-051). FIX: the stack ships CANONICAL config files (plugin/templates/stack-a-nextjs/{biome.json,verify.sh,knip.json}) installed VERBATIM by blueprint + upgrade — never hand-rolled per project. MAXIMUM fail-closed (owner's choice): verify.sh runs `biome check . --error-on-warnings` (every warn becomes a hard gate, incl. noExcessiveCognitiveComplexity=error), tsc, knip (fail-closed), madge, vitest, and the smoke + visual fail-closed shims (a missing harness is RED). biome.json enables the domains + a11y group + the explicit rules as ERROR (noArrayIndexKey, useMaxParams, noParameterAssign, noBarrelFile, noDangerouslySetInnerHtml, useExhaustiveDependencies, useSortedClasses, etc.). CONFORMANCE: /pandacorp:upgrade diffs the project's verify.sh/biome.json/knip.json against the stack template and regenerates/fails on drift — so a project's enforcement can never silently fall behind the standard (the meta-fix that would have caught all of this automatically). Correction codified: Biome detects a domain's PRESENCE from package.json but does NOT auto-activate its rules — they must be enabled explicitly. Canonical: factory/standards/quality.md + plugin/templates/stack-a-nextjs/."
    requiere_humano: false
    nota: "owner-driven (2026-06-19): an exhaustive 3-front process audit (before continuing Mission Control) found MC's real verify.sh = biome+tsc+vitest only — no smoke/visual/knip, Biome domains off, complexity=warn (fails nothing) — so the freshly-added DR-055/056 gates and ~14 standards rules were unenforced. Same failure class as DR-051 (rules written, not wired). Owner chose MAXIMUM fail-closed. The conformance check in upgrade is the lever that prevents recurrence. Pairs with DR-051 (rules-as-files) — this is gate-config-as-files. See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-19)"

  - id: DR-060
    patron: "how the build engine guarantees parallel work orders never collide (shared files, raced contracts, non-atomic state)"
    default: "PARALLEL WOs CANNOT COLLIDE — declared artifacts + per-WO contract + dep hand-off + atomic state. Audit found four coordination holes: the `## Status Note` hand-off is post-hoc so it cannot coordinate WOs WITHIN a concurrent wave; the disjoint-artifacts rule (build-orchestration §2) was documented but the engine never enforced it; `docs/api.md` was a single shared file N parallel agents raced on (lost-update/torn-read); and a WO's state write was not atomic with its commit (crash → committed code with stale PLANNED). FIX (build-orchestration §2 + pandacorp-build.js): (1) each WO declares `artifacts: [globs]` in frontmatter; the ENGINE serializes wave-parallel WOs whose artifacts overlap into DIFFERENT waves (pickDisjointWave — the generalized banner-collision fix, for ALL file types not just UI components); undeclared artifacts fall back to prior behavior (back-compat). (2) per-WO API contract `docs/api/<wo-id>.md` (disjoint by construction, in the WO's own artifacts) replaces the shared docs/api.md; the consumer frontend WO reads the SPECIFIC provider's file (id from its Dependencies). (3) the implementer/backend-dev READS the `## Status Note` of its Dependencies before coding — the cross-wave hand-off is actually consumed (it was written but never read). (4) ATOMICITY: a WO sets `implementation_status: IN_REVIEW` + Status Note and commits code+frontmatter+note TOGETHER in ONE commit (with index.lock retry), so a crash never leaves committed code with stale state. Canonical: factory/standards/build-orchestration.md §2. FOLLOW-UP (not yet done): per-agent git worktree isolation to fully eliminate the shared-.git index.lock commit race (today: retry-on-lock + disjoint artifacts reduce it)."
    requiere_humano: false
    nota: "owner-driven (2026-06-19) exhaustive audit. The duplicated-banner bug (DR-057) was the visible symptom; the audit found the MECHANISM is general — the Status Note can't coordinate intra-wave, and the only real anti-collision guarantee (disjoint artifacts) was unenforced. DR-057 fixed UI-component reuse; DR-060 fixes collision for EVERY shared artifact (files, types, the api contract) at the engine level. Builds on DR-050 (Build Plan) + DR-057. See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-19)"

  - id: DR-061
    patron: "how a navigable prototype distinguishes DEMO-only controls (state previewers) from real product behaviour"
    default: "MARK DEMO-ONLY CONTROLS VISIBLY + CONSISTENTLY, in every prototype. A mockup often adds affordances that exist ONLY to preview states (a mode/effort picker, play/pause, reset, state togglers) so the owner can see how each state looks — but they do NOT exist in the real product (frequently read-only, or driven by a skill/CI, not by buttons). Leaving them unmarked makes the owner read a demo affordance as real behaviour (the Mission Control confusion: the Party prototype's effort picker + power/reset buttons looked as if the dashboard could CONTROL the factory, when MC is read-only and the build is launched by /pandacorp:implement). RULE: every block of demo-only controls is wrapped the same way — a DASHED-BORDER container + a small uppercase DEMO tag (warning colour) + a one-line note of how the real thing actually works; and any value the REAL app will surface (e.g. the effort a build ran with) is shown as READ-ONLY DATA in a real UI surface, never only inside the demo block. The factory-off / idle state is DERIVED from real state (no build running), not from a button. Tag/note use the prototype's UI language (Spanish default -> 'SOLO DEMO'). Canonical pattern + CSS in factory/standards/design.md section 6; wired in plugin/skills/design/SKILL.md + plugin/agents/designer.md."
    requiere_humano: false
    nota: "owner-driven (2026-06-19): while polishing the Mission Control Party prototype the owner noted the effort picker + Encender/Reiniciar buttons read as if they were real app controls, when MC is read-only (the build is launched via /pandacorp:implement). Owner asked to make the demo-marking a factory standard so every generated HTML with state-preview controls marks them identically (dashed border + DEMO tag). Fix: design.md section 6 (rule + canonical CSS/HTML), design skill + designer agent reference it; the effort now surfaces as read-only data in the prototype's mission bar. See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-19)"

  - id: DR-062
    patron: "how the factory makes a multi-surface app feel like ONE cohesive application, not screens designed in isolation"
    default: "STANDARDIZE THE FRAMING PATTERNS ACROSS EVERY SURFACE (beyond component reuse DR-057). The whole app must feel like one application. (1) PAGE TITLES: one title block (H1 style + optional subtitle) on every top-level page, and the page H1 EQUALS its nav-menu label (nav 'Propuestas' -> H1 'Propuestas'); any extra description goes in the subtitle, NEVER a different title (the you-are-here principle — a title that differs from the menu item the owner clicked breaks orientation). Either every page has a title or each omission is justified, not ad-hoc. (2) SECTION HEADERS, TABS, CHIPS/BADGES, PANELS/CARDS, COMMAND AFFORDANCES, EMPTY STATES, SPACING — each is ONE canonical pattern reused everywhere; a surface that invents its own variant of an existing pattern is a COHESION DEFECT (same class as a near-duplicate component). (3) DEVIATIONS only where genuinely justified (an intentionally immersive view), recorded not silent. ENFORCED: the design phase registers titles/section-headers/tabs as first-class shared primitives in docs/design/components.md (not per-screen ad-hoc markup), and the reviewer's runtime/visual lens CHECKS CROSS-SURFACE CONSISTENCY — a screen that looks like a different app from its siblings is rejected like a duplicate component. Canonical: factory/standards/design.md section 7. EXTENDED by DR-101 (2026-06-28): the page-closing call-to-action is ONE shared cta-band reused on every page (a per-page ad-hoc 'let's talk' link is both a cohesion and a hierarchy defect)."
    requiere_humano: false
    nota: "owner-driven (2026-06-19): reviewing the Mission Control prototype the owner found surfaces that felt like different apps — the Documentation page had a bespoke 'Códice del gremio' header in a different style than other sections' titles, and Inicio/Tablero/Portfolio had no page title while other pages did. He asked for an exhaustive cross-surface visual-cohesion audit + standardization (titles, section headers, tabs) and to make 'feels like ONE app' an explicit, recalcado rule in the design skill. Decision on the menu-vs-title question: align them (page H1 = nav label, extra context in subtitle). Fix: design.md section 7 (rule), design + designer + reviewer wired; applied to the MC prototype (added page titles, folded the Códice header into the standard pageHead, unified section-headers/rail-labels via shared helpers, renamed Manual->Documentación). Builds on DR-057 (component reuse) — DR-062 is the cross-surface PATTERN analogue. See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-19)"

  - id: DR-063
    patron: "whether the strict whole-project verify.sh runs as the Stop gate of EVERY turn while an incremental build is active"
    default: "THE STOP GATE IS PHASE-AWARE — strict at rest, stands aside during an active build. The strict whole-project verify.sh (DR-019/059) is the right gate for an ordinary 'done' turn, but the WRONG gate to run on EVERY Stop while an incremental build is in flight: mid-build the tree is legitimately red between safe points (a work order in flight, untracked files yet to pass their self-test), so a strict per-turn gate blocks every turn — in the building session AND in any OTHER session parked at that cwd in a shared repo (verify-before-stop.sh ties to the session's cwd and runs the whole project-in-cwd suite even for a session that never touched that project, and it does not distinguish two sessions in one repo). FIX: enforcement is split — (a) PER-FRD inside the build (verify.sh --since <last_green>, run by the engine's FRD gate) and (b) the FULL suite at CLOSE-OUT (the engine's final pass), both strict, both owned by the build engine; meanwhile the Stop hook STANDS ASIDE during an active build. MECHANISM: the supervisor maintains a freshness-stamped lock at .pandacorp/run/build.lock (touched at launch + every ~2-min heartbeat, removed at close; .pandacorp/run/ is gitignored runtime state). verify-before-stop.sh no-ops when that lock is FRESH (find -mmin -10), and re-engages strictly the moment the build ends or the lock goes stale — same 10-min TTL as the concurrent-run guard (DR-050 §9), so a dead supervisor auto-recovers. verify.sh ITSELF is always strict (it never softens itself); only the Stop-hook WRAPPER is phase-aware, so the engine — which invokes verify.sh directly — still gets the full strict gate. The hook is plugin-scoped (ships with the plugin update), so it needs NO OVERLAY_VERSION bump and no /pandacorp:upgrade change (a deliberate decision, not an omission). Canonical: factory/standards/quality.md (Gates) + build-orchestration.md section 5."
    requiere_humano: false
    nota: "owner-driven (2026-06-20), surfaced by the Mission Control build dogfood: the Stop gate fired during an ACTIVE background build whenever the tree was in a transitory red between safe-points, so the supervisor couldn't close a turn and any other session parked at the project cwd was blocked too (#5: the gate runs the full project-in-cwd suite even for a session that never touched the project, and doesn't tell two sessions in a shared repo apart). The split (per-FRD --since + close-out full) was already how the engine enforces; this just makes the per-turn Stop hook phase-aware so it stops double-enforcing the strict full suite mid-build. Fix touches plugin/scripts/verify-before-stop.sh (lock detection) + plugin/skills/implement/SKILL.md (supervisor creates/refreshes/removes the lock) + plugin/templates/stack-a-nextjs/verify.sh (clarifying comment: hook=phase-aware, verify.sh=always strict) + factory/standards/quality.md + build-orchestration.md. Includes improvement #5 (shared-repo / cross-session friction). See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-20)"

  - id: DR-064
    patron: "what a design re-anchor / prototype adoption must reconcile before the prototype is blessed as the canonical source of truth"
    default: "RECONCILE FUNCTIONALITY BIDIRECTIONALLY, not just the visual (refines DR-056). When the factory blesses an approved prototype as canonical (the ADOPT-VISUAL path of DR-054, and any design re-anchor), it must reconcile BEHAVIOUR too, not only the look — an approved whole-app prototype is the source of truth for behaviour as well. Walk BOTH directions and resolve every item EXPLICITLY before freezing: GROUP A — the prototype HAS it, the FRD LACKS it -> update the FRD (write the interaction/state/screen/affordance/flow into the owning FRD's acceptance criteria + fdd.md so the build produces it; a demo-only control per DR-061 is MARKED, not promoted to a requirement). GROUP B — the FRD WANTS it, the prototype LACKS it -> build it into the prototype (so the visual/fidelity gate has a real screen to verify against) OR flag it as an explicit gap (never silently ground a fidelity gate on a screen that doesn't exist). The reconciliation is itemized and surfaced to the owner; a visual-only re-anchor that leaves functional divergence is NOT done. This is the functional analogue of complete-extraction (DR-056 captures every VISUAL layer; DR-064 captures every BEHAVIOURAL one). Canonical: factory/standards/design.md section 8."
    requiere_humano: true
    nota: "owner+agent (2026-06-20): Mission Control's original divergence had TWO causes — (a) the design wasn't anchored (fixed by DR-054/056) AND (b) functionality the owner put in the prototype was never reflected in the FRDs (owner: 'puede ser un error mío por no documentarlo bien'), while some FRDs wanted things the prototype never showed (grounding a false visual gate). The re-anchor only reconciled the VISUAL; we found ~7 of each direction in MC. Fix: design.md section 8 (the A/B bidirectional rule), plugin/skills/design (Step 8b + advance-gate check) + plugin/skills/adopt (design-migration step 5) + plugin/agents/designer (reconcile-before-freeze rule). Refines DR-056. requiere_humano because the owner resolves the A/B list. See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-20)"

  - id: DR-065
    patron: "when the build engine auto-resolves a recoverable failure vs stops to ask the owner (the autonomy/escalation policy for a bounded class)"
    default: "BOUNDED AUTO-REPAIR FOR A HIGH-CONFIDENCE, RECOVERABLE CLASS — resolve the known fix, don't stop to ask. The Party Phase-2 build DETECTED the root cause correctly ('a surface failed fidelity because a shared primitive it needs isn't in the foundation') but STOPPED to ask the owner with 4 options — even though it already KNEW the fix (its own recommended option: move the missing primitives into the foundation and retry). The gap was AUTONOMY, not detection. RULE: for this one high-confidence, recoverable, BOUNDED class — 'a surface looks flat / fails fidelity because a primitive it needs is missing from the foundation' — the engine AUTO-RESOLVES: it resets to the last green (discarding the flat half-built surfaces, NEVER the verified foundation), ADDS the missing primitive(s) to the foundation on the frozen tokens per their mock spec, appends them to docs/design/components.md, rebuilds + re-verifies, and lets the surfaces rebuild against the real primitives — capped at foundationRepairCap (default 2) auto-repairs per run. It ESCALATES to the owner ONLY when: confidence is low, the gap is genuinely a human/design/product/irreversible decision, or the cap is reached after N failed auto-repairs. SIGNAL: the FRD gate returns missingFoundation:[names] when it sees this class; the engine routes it to the bounded foundation auto-repair instead of a needs-owner block. BALANCE: autonomy without loops or burning the budget. PAIRS WITH DR-057's foundation-completeness gate: PREVENT (gate the foundation complete+green before fan-out) + CURE (this bounded auto-repair when a surface still fails for a missing primitive). Canonical: factory/standards/build-orchestration.md section 6 (Bounded auto-repair)."
    requiere_humano: false
    nota: "owner+agent (2026-06-20): the owner's framing — 'the implement skill should be smart enough to resolve it like you did'. The engine escalated 're-plan the Build Plan + discard failed attempts' to the owner (over-conservative about rewriting its own plan / throwing away work). Two fixes for the same root cause: PREVENT lives in DR-057 (extended: derive the foundation completely from components.md + a foundation-completeness gate before fan-out); CURE is this bounded auto-repair. Fix touches plugin/templates/shared/.claude/workflows/pandacorp-build.js (FOUNDATION_SCHEMA + foundationCompletenessGate + repairFoundation + missingFoundation routing + FOUNDATION_REPAIR_CAP=2) + plugin/skills/implement/SKILL.md + factory/standards/build-orchestration.md section 6. Default cap 2 (owner choice). See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-20)"

  - id: DR-066
    patron: "how a monitoring UI (dashboard/status page) tells the truth about its own liveness/freshness — and how the state producer must feed it"
    default: "OBSERVABILITY FIDELITY — a monitor never presents a self-reported flag as proof of life; it crosses RECENCY and declares its own freshness; the producer emits a positive, time-driven heartbeat. Applies to EVERY project with a dashboard/monitor/status page. THREE rules, both sides of the wire: (a) LIVENESS = running AND fresh, never the flag alone — live ⇔ running AND (now − last_heartbeat) < staleness_window; a frozen running:true with a stale timestamp is NOT live. (b) THE UI DECLARES ITS OWN FRESHNESS in three graded bands off the producer tick T: 'en vivo' (age < 3·T), 'datos de hace X' (3·T ≤ age < hard_TTL, age stamped — never passed off as live), 'sin señal' (age ≥ hard_TTL = the producer's liveness TTL, e.g. the build's 10-min concurrent-run TTL; show 'sin señal', not the last value dressed as current). (c) THE PRODUCER EMITS A POSITIVE HEARTBEAT EVERY TICK AND ADVANCES ITS TIMESTAMP — on each tick it (i) appends a positive heartbeat event to its event stream and (ii) advances a freshness stamp in its state file (last_event_at / supervisor_heartbeat); the heartbeat is TIME-DRIVEN (a scheduled tick), not only event-driven, so a healthy-but-quiet process doesn't read as dead. GATE (a 'live' transport doesn't ship unproven): prove (1) a real state change reflects in the UI quickly — push/watch (fs-watch on the event stream, SSE, websocket) for near-real-time when the transport allows it at ~zero cost; poll fallback bounded ≤30 s worst case (never tighter than the app's perf/resource budget allows) — and (2) the 'sin señal' path actually engages when the heartbeat stops (kill the producer → UI flips to stale/sin-señal within hard_TTL, it does not freeze on the last value). Canonical: factory/standards/observability.md ('Liveness & freshness fidelity') + quality.md ('Observability-fidelity gate') + build-orchestration.md §9; wired into the build engine (plugin/templates/shared/.claude/workflows/pandacorp-build.js advances last_event_at at each safe point) + the supervisor (plugin/skills/implement/SKILL.md emits a time-driven SupervisorTick heartbeat) + the status.yaml template."
    requiere_humano: false
    nota: "owner-driven (2026-06-20): audit of Mission Control's READ layer found status.yaml had running:true + a FROZEN supervisor_heartbeat while the build advanced — a naïve monitor would have presented 'corriendo' as proof of life. Root cause: the heartbeat was advanced only by the event-driven Monitor, so it froze between long quiet agents, and nothing in the consumer crossed running with recency. The MC CONSUMER side (the UI applying (a)/(b) when reading status.yaml) is deferred — mission-control/ is owned by the parallel Phase-2 build window; this change ships the STANDARD + the PRODUCER side (engine + supervisor + template). Owner choices (2026-06-20): graded 3-band freshness; gate latency = near-real-time via push/watch when cheap, ≤30 s worst-case polling (criterion: as real-time as possible without hurting app perf or pegging the machine). Plugin v8.28.0 (MINOR). See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-20)"

  - id: DR-067
    patron: "how the build engine preserves/recovers in-flight work across a kill/relaunch/stop, and what the supervisor must watch to detect a BROKEN (not just stalled) tree"
    default: "NO-STASH RECOVERY + WORKING-TREE HEALTH IS A FIRST-CLASS SUPERVISOR SIGNAL. The build is resumable from the work-order frontmatter + commits (DR-050) and the engine commits single-writer/no-merge (build-orchestration §2), so two corollaries are now EXPLICIT and ENFORCED: (1) NEVER `git stash` to preserve in-flight work across a kill/relaunch/stop. Killing or stopping a run discards only the uncommitted work between two safe points; the relaunch rebuilds it from PLANNED/IN_PROGRESS state, never re-doing VERIFIED. A stash popped later onto a tree that has MOVED ON conflicts. The ONLY safe recovery from a dirty/conflicted tree is to restore it to last_green_sha (a clean reset to the green commit) — never hand-resolve a stash-pop. On startup the engine's baseline self-heal drops stale build stashes and clears leftover temp preview-wo* pages (they're stale; the work is resumable). (2) THE SUPERVISOR WATCHES THE TREE'S GIT HEALTH as a first-class signal, not just status.yaml + liveness: the Monitor runs `git status --porcelain` each tick — any UU/unmerged path or a <<<<<<< conflict marker is a BROKEN tree, emits an alarm, and routes to the bounded auto-repair (restore to last green, DR-065). This closes the gap DR-066 didn't: DR-066 made LIVENESS honest (the heartbeat can't lie about 'alive'), but a tree can be BROKEN while perfectly alive — a monitor blind to a broken tree is the same failure class as one blind to liveness. Canonical: plugin/skills/implement/SKILL.md (Rules: no-stash; baseline self-heal restores a dirty/conflicted tree; Monitor watches git health; React restores a broken tree to last green) + factory/standards/build-orchestration.md section 6 ('Working-tree health & no-stash recovery')."
    requiere_humano: false
    nota: "owner-driven (2026-06-20): the MC Phase-2 build went OFF-SCRIPT — its orchestrator improvised `git stash` to preserve work when it killed/relaunched runs (the skill never told it to; the design is resumable-without-stash). A later stash-apply of a stale `frd02-lacampana` stash (killed run) onto an already-VERIFIED FRD-02 left <<<<<<< markers in Button.tsx + CampaignPipeline + docs → 130 gate errors → the build wedged ~1h. WORSE: the supervisor was BLIND — it watched status.yaml + a stall heuristic, never `git status`, so it concluded 'run healthy' with the tree broken, and even did a soft reset (which does NOT clear unmerged paths). Owner's ask: 'make sure this never happens again, the supervisor and subagents should detect and resolve problems themselves.' Also explains the stash pile-up (one per kill/relaunch/stop, never cleaned) and the leftover half-written files (stop mid-pass). Fix touches plugin/skills/implement/SKILL.md + factory/standards/build-orchestration.md section 6. Plugin v8.29.0 (MINOR). See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-20)"

  - id: DR-068
    patron: "how a build's run-state stays HONEST when it ends/stops (so the dashboard never shows a phantom 'running'), and how the owner stops the whole build vs one pass"
    default: "BUILD-LIFECYCLE HONESTY — running:false on EVERY exit, stop-the-LOOP not just a run, never trust a stale flag. The engine already clears state on a NORMAL end (close-out sets running:false + a fail-safe agent 'never leave a phantom running build'). Two gaps remained (a build sat dead ~1h showing running:true + a stuck spinner): (1) A KILLED/stopped run never reaches the engine close-out, so clearing state is the SUPERVISOR's GUARANTEED LAST ACT on EVERY exit — clean end, budget/health/needs-owner stop, owner stop signal, or being interrupted: write running:false + rm the build lock. A stopped build still reading running:true is a LYING FLAG. Backstop: a stale running:true (heartbeat past the 10-min TTL) is NEVER trusted as alive — every reader (the concurrent-run guard, the supervisor health tick, Mission Control's display per DR-066) crosses running with heartbeat recency and reads it as STOPPED; the next state-writer auto-corrects it to false. (2) STOP-A-RUN ≠ STOP-THE-LOOP: the supervisor's design is to relaunch the next pass, so a lone TaskStop just triggers another pass ('I stopped it but it came back'). To halt the WHOLE build the owner sets a stop signal — rethink_pending:true (or .pandacorp/run/stop) — checked at each safe point AND before every relaunch; when set the supervisor halts the loop + runs the guaranteed shutdown. This distinction is surfaced to the owner, not implicit. Canonical: plugin/skills/implement/SKILL.md ('Stop the LOOP vs stop a run' + 'Guaranteed shutdown') + factory/standards/build-orchestration.md section 6 ('Build-lifecycle honesty'). Pairs with DR-066 (the consumer crosses running with recency) and DR-067 (tree health)."
    requiere_humano: false
    nota: "owner-driven (2026-06-20): the owner saw a stuck loader/spinner and status.yaml running:true while the build had been DEAD ~1h (measured: 59m since any write/event), and earlier the build 'came back' after he stopped it. Two distinct gaps: the run he stopped was KILLED (never hit the engine close-out that writes running:false), and the supervisor's autonomous relaunch loop (the overnight walk-away feature) relaunched the next pass — stopping one run is not stopping the loop. NOTE the meta-lesson that produced this DR: the agent first claimed 'the engine doesn't guarantee running:false' from a grep that misfired, then READING the engine (lines 441/453/457-461) showed it DOES on a normal end — verify by reading, not a tool's output (see the verify-before-telling rule). Fix touches plugin/skills/implement/SKILL.md + factory/standards/build-orchestration.md section 6. Plugin v8.30.0 (MINOR). See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-20)"

  - id: DR-069
    patron: "how the owner injects a change/feature/bug into a build that is already running (or queues it for the next one), and through which command"
    default: "ONE OWNER DOOR + A DURABLE, CLASSIFIED CHANGE QUEUE drained at safe points. The owner needs to inject changes WHILE a build runs (builds take hours/days; 'wait until it finishes' is not viable). Mechanism = the production-agent pattern (a thread-safe injection queue drained at iteration boundaries) + Kanban classes of service. (1) ONE DOOR: the owner uses a single command /pandacorp:change for ANY change or bug — it classifies the request (bug vs feature) and files it; it does NOT make the owner remember which sub-skill to call. bug + iterate remain the INTERNAL ENGINES (change and the build invoke them) and still work as direct aliases; decide stays separate (the owner ANSWERING a build question, opposite direction). (2) THE QUEUE: .pandacorp/inbox/changes/ (one file per change + a README index), in SPANISH (gitignored owner layer), unifying the former inbox/bugs/ (folds in as type:bug). Each file: machine header (type, class, status:draft|ready|done, frd, rebuilds_verified) + a Spanish body. (3) CLASSES OF SERVICE (Kanban/David J. Anderson): expedite (urgent/breaks something → jumps the queue at the next safe point), standard (default, FIFO), intangible/fixed-date for completeness. (4) CAPTURE IS DETECTION-FREE AND DOC-FREE — the safety property: /pandacorp:change ONLY writes one file; it never edits the build's docs/work-orders/code and has NO build-detection logic, so a mis-detection of 'is a build running?' CANNOT corrupt anything (the change waits durably until the build pulls it). There is no 'if no build, edit docs directly' branch to get wrong. The only place that decides 'is a build running?' is implement's concurrent-run guard (DR-050 §9) — a lease+heartbeat+TTL check with a fencing token (the run-id) so a zombie run can't write stale state — and it's safe-when-wrong (a wrong launch aborts on the guard; a missed launch just leaves the change queued). (5) THE CONSUMER — the supervisor drains+routes at each safe point and before every relaunch, taking ONLY status:ready items and SKIPPING status:draft (the readiness gate, point 6), WORK-CONSERVING (never stall the whole build for one item): expedite first then standard FIFO; an autonomous-resolvable change → integrate via the iterate engine (FRD/work-orders/blueprint) or the bug engine (regression→fix) AT THE SAFE POINT (never mid-feature), then the FRD review/test gate (same quality as planned work); a needs-owner decision → write to inbox/decisions.md, notify, DEFER + continue with independent FRDs (only full-stop if it blocks everything; owner answers with /decide); a structural/fundamental/new-design change → pause (rethink_pending) + tell the owner the command to run (e.g. /design — the design gate is the owner's). (6) READINESS GATE (status:draft|ready|done, amended 2026-06-21): a queued item is ready (complete enough to action → the build drains+builds it), draft (captured for VISIBILITY but the owner is still working out the details / it depends on something undone / it needs a design pass / it is infra-deployment the build doesn't implement → the build SKIPS it untouched), or done (built, set by the build with the landing commit). The build acts ONLY on ready — this separates 'I'm still thinking' from 'go build it', letting the owner park half-formed ideas in the queue (Mission Control shows them) and promote one with a single frontmatter edit (draft→ready). /pandacorp:change defaults a clear actionable request to ready; the owner says 'just note it' for a draft. (7) COMPLETION = VERIFY-THEN-ARCHIVE, NEVER HARD-DELETE (amended 2026-06-21, red-team + research-backed): when a change lands the build does NOT leave it in the active queue (clutter) NOR hard-delete it (changes/ is GITIGNORED → a delete is IRREVERSIBLE, no git history to recover the owner's original Spanish phrasing/intent/classification). It ARCHIVES: (a) independently verify the durable record exists (generator≠verifier — the landing commit touched the canonical doc FRD/PRD/blueprint AND a docs/decision-log.md entry references the change); (b) stamp status:done + shipped_sha + shipped_at; (c) MOVE the file to changes/done/ (a move, never rm). The active changes/ then shows pending-only (the owner's clean queue) while the Spanish audit trail survives in done/ (MC reads it for a 'recently shipped' view). If the durable record is MISSING → do NOT archive: leave it in place + flag the doc gap (archival is the enforcement point for the documentation discipline). NEVER auto-delete done/; any prune is a separate owner-gated reversible action. This is the industry commit-before-retire ordering (Kanban/Jira/Linear/GitHub archive-not-delete; event-sourcing append-only; SQS/Sidekiq delete only after the durable write is confirmed AND only because a separate system-of-record exists) — and the decision-log is NOT a guaranteed superset of the change file (English-curated-technical vs raw-Spanish-intent), so archive beats delete. NOT an overload of implement: it stays an orchestrator of specialized subagents over deterministic control flow (DR-013); quality is enforced by the independent FRD gate + verify.sh (generator≠verifier), not by trust. Canonical: plugin/skills/change/SKILL.md + plugin/skills/implement/SKILL.md (drain+route) + plugin/skills/{bug,iterate}/SKILL.md (engines) + factory/standards/build-orchestration.md section 8."
    requiere_humano: false
    nota: "owner-driven (2026-06-20), research-backed (Kanban classes of service — David J. Anderson; human-in-the-loop checkpoints; production agent injection-queue-drained-at-iteration-boundaries). The owner's two fears, both answered: (A) 'how do you guarantee 100% that iterate detects a running build?' → you don't need to: capture is detection-free + doc-free, so a misdetection only affects TIMING, never correctness (the durable queue + fencing token + DR-067 collision-proofing make it safe-when-wrong); (B) 'too many skills, I get confused' → ONE door (/change) routes bug/feature internally; the owner keeps direct verbs for direct actions (/implement, /decide) — NOT a single mega-router for everything (that would hurt agility). Mission Control surfacing the pending changes/ + decisions items (in Spanish) is a deferred follow-up. Fix: new plugin/skills/change/SKILL.md + plugin/skills/{implement,bug,iterate}/SKILL.md + factory/standards/build-orchestration.md section 8. Plugin v8.31.0 (MINOR — new skill = new capability). AMENDED 2026-06-21 (owner-driven): added the READINESS GATE (status:draft|ready|done) so the owner can park half-formed ideas in the queue without the build acting on them — the build drains ONLY status:ready and SKIPS status:draft. The owner needed exactly this: 'que el implement solamente tome las ideas que ya están listas, las que están draft no, porque todavía las estamos trabajando.' Touches plugin/skills/change/SKILL.md (status field + only-ready rule), plugin/skills/implement/SKILL.md (drain takes only ready), factory/standards/build-orchestration.md §8 (readiness gate). Plugin v8.37.0 (MINOR — new queue capability), no OVERLAY change (skills+standard only). AMENDED AGAIN 2026-06-21 (owner-driven, red-team + research-backed): added clause 7 — COMPLETION = verify-then-ARCHIVE, never hard-delete. The owner asked whether a done change should be deleted (his instinct: keep the folder clean). 3 adversarial agents (pro-delete / pro-keep / web-researcher) converged: the owner's GOAL (clean active queue) is right but hard-delete is the wrong METHOD here because (i) changes/ is gitignored → delete is irreversible (no git recovery), (ii) the decision-log is NOT a guaranteed superset of the change file (curated-English-technical vs raw-Spanish-intent+classification+draft→ready provenance), (iii) 'done' is build-emitted → wiring destruction to an unverified self-report violates generator≠verifier. Industry evidence (Kanban/Jira/Linear/GitHub archive-not-delete; event-sourcing append-only; SQS/Sidekiq delete-on-done only because a separate system-of-record exists) + the universal commit-before-retire ordering → ARCHIVE to changes/done/ after verifying the durable record, never auto-delete. Archive gets 100% of the owner's clean-folder goal at 0% irreversible risk. Touches plugin/skills/change/SKILL.md + plugin/skills/implement/SKILL.md (verify→stamp→move to done/) + factory/standards/build-orchestration.md §8 (completion paragraph). Plugin v8.41.0 (MINOR — new lifecycle capability), no OVERLAY change. See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-21). See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-21). See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-20)"

  - id: DR-070
    patron: "how the build engine's maxAgents ceiling actually brakes, and what happens to a rejected work order's CODE so it doesn't poison sibling FRDs' global gate"
    default: "HONEST FINE-GRAINED AGENT CAP + REJECT-CLEANS-THE-TREE. Two engine fixes after MC Phase-2 pass-1 ran 68 agents / ~4.95M tokens for +1 net FRD with maxAgents=40 doing nothing and clean siblings blocking. (1) THE CAP MUST BE HONEST AND FINE-GRAINED: agentSpawned increments on EVERY spawn (baseline, plan, close-out included — they were uncounted) and the ceiling is checked via capHit() at TWO safe points — the per-FRD-loop top AND the top of each BUILD WAVE inside an FRD. The old check ran ONLY between FRDs, so a pass with a few large FRDs inflated the count inside one FRD and overshot the ceiling arbitrarily (40-cap → 68 agents). On a mid-FRD cap hit the run stops at the wave boundary, leaving that FRD's built WOs IN_REVIEW (resumable) and skipping its gate. The SUPERVISOR additionally enforces a RELIABLE EXTERNAL brake — it counts actual agent-*.jsonl files in the run's transcript dir and TaskStops the workflow past the ceiling (with a small overshoot allowance), independent of the in-engine counter (which silently under-counted). maxAgents is the per-run engine ceiling AND the supervisor treats it as the cumulative-across-passes walk-away budget (it does not relaunch once cumulative agents reach it). (2) A GATE REJECTION MUST REVERT ITS OWN CODE: verify.sh --since scopes only TESTS; biome/tsc/knip run WHOLE-PROJECT. The wave-writer commits a surface's code during build (Option B); when the FRD gate then reopens/blocks that WO, the code was LEFT in the tree, so its dead exports/warnings turned EVERY later FRD's global gate RED — clean siblings blocked on another feature's mess. Now on reopen/block the gate/repair agent reverts the rejected WO's files to last_green_sha (surgical `git checkout <sha> -- <files>` + `git rm` for newly-created files; NEVER a whole-tree hard reset, which would discard verified siblings) and commits the revert with the status change. Canonical: templates/shared/.claude/workflows/pandacorp-build.js (capHit + wave-boundary check + accurate counting + gate/repair revert-on-reject), plugin/skills/implement/SKILL.md (supervisor external agent-count brake), factory/standards/build-orchestration.md section 6. Pairs with DR-067 (last_green is the recovery anchor) and DR-068 (honest run-state)."
    requiere_humano: false
    nota: "owner-driven (2026-06-21): MC Phase-2 pass-1 supervised live — maxAgents=40 was set as the overnight guardrail but the run reached 68 agents / ~4.95M tokens for only +1 net FRD verified (frd-16), and 2 clean FRDs (frd-11, frd-14) BLOCKED with reason=error 'entangled with a sibling FRD' (a rejected surface's committed dead code reddened their global knip/biome gate). Root causes: the cap was checked only between FRDs and agentSpawned under-counted; and rejected-but-committed code was never reverted. Owner chose 'fix the engine first' before relaunching. Plugin v8.32.0 (MINOR), OVERLAY_VERSION 8.28.0→8.29.0 (engine changed). See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-21)"

  - id: DR-071
    patron: "how the smoke + visual gates (DR-055/056) wait for a page to be ready when the app has a real-time transport (SSE / EventSource / websocket / long-poll)"
    default: "NEVER `waitUntil: 'networkidle'` for a page with a long-lived connection — use `domcontentloaded` + an explicit readiness wait, and BLOCK the live transport in the visual gate. A real-time transport (an open SSE/EventSource, a websocket, a long-poll) keeps the network perpetually busy, so Playwright's `networkidle` NEVER settles and the navigation TIMES OUT — the gate hangs forever on every real-time route, so no such surface can ever be blessed (the exact failure that made the MC Phase-2 build churn for hours with 0 gate passes: every dashboard/observability/party/work-orders route opens a DashboardLiveWatcher EventSource). FIX, two parts: (1) SMOKE — navigate with `waitUntil: 'domcontentloaded'` and let the existing `await expect(page.locator('main, h1').first()).toBeVisible()` be the deterministic readiness signal (the SSE stays live; smoke tests the real page). (2) VISUAL — additionally `await page.route('**/<live-endpoint>**', r => r.abort())` BEFORE navigating, so the screenshot is deterministic (streaming data must not shift pixels — this is already a determinism precondition, 'mocked network so data never shifts pixels'), then `domcontentloaded` + the `toBeVisible()` readiness wait + `document.fonts.ready` before `toHaveScreenshot`. The page still renders its initial server snapshot, which is what the blessed baseline captures. Refines DR-055/056. Canonical: plugin/templates/stack-a-nextjs/STACK.md (smoke + visual blocks)."
    requiere_humano: false
    nota: "owner-driven (2026-06-21): the MC Phase-2 build's own log diagnosed it ('smoke.spec/visual.spec navigate with waitUntil:networkidle, which never settles with an open SSE → / times out; verified: with domcontentloaded the page renders clean, 0 errors') but the autonomous fix (DR-070) addressed the budget cap + dead-code entanglement, not this root cause — so the build kept churning (0 gate passes in hours). This is the missing piece: every real-time surface could never pass the gate because the gate itself hung. A pure-config bug in the canonical gate that breaks ANY project with SSE/websocket/polling. Fix: plugin/templates/stack-a-nextjs/STACK.md (smoke→domcontentloaded; visual→block the live endpoint + domcontentloaded + readiness) + the MC instance e2e/{smoke,visual}.spec.ts. Plugin v8.32.1 (PATCH — gate-config fix, no skill/engine behavior change, OVERLAY_VERSION unchanged). See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-21)"

  - id: DR-072
    patron: "how the build CONVERGES (finishes) instead of churning build->reject->rebuild forever — the gate's strictness model, the visual-fidelity policy, and the non-progress stop"
    default: "SPLIT THE GATE + CONSOLIDATE FIDELITY INTO A NON-BLOCKING END PASS. A build that never finishes is the dominant overnight failure: every surface is built, the gate rejects on visual fidelity, it's reopened+rebuilt, rejected again — ~0 net VERIFIED for a whole run. Research-backed (Kanban classes of service; LLM/visual judges are noisy and trivially reward-hackable so a subjective HARD blocker rejects spuriously; an over-broad adversarial reviewer harms convergence by over-engineering; convergence = verifiable feedback IN-loop, not looser objectives). The fix is NOT lowering quality — it is splitting the gate BY CATEGORY: (1) CORRECTION = the HARD blocking gate, kept strict (renders clean/smoke, tests+types+lint, the FRD acceptance criteria met, security, no genuine duplicate primitive DR-057, and a GROSS visual-structural mismatch — flat list where the mock is a rich layout, a section missing). This is the no-bugs guarantee — DO NOT lower it. (2) VISUAL-FIDELITY NITS (sizing 15px-vs-16px, spacing, shade, density, 'doesn't match 100%') = ADVISORY, NEVER block — the gate appends each to .pandacorp/comms/visual-punch-list.md instead of reopening. The deterministic Playwright toHaveScreenshot regression baseline stays hard (a regression guard, not a fidelity judgment). (3) END-OF-BUILD VISUAL QA PASS: all systematic fidelity work consolidated into ONE dedicated phase at the end, scoped to the FRDs touched that run, OUTSIDE the convergence loop (so thoroughness can't cause churn) — render each route, compare semantically to its mock/fdd/tokens, complete the punch-list, FIX the cheap unambiguous gaps DIRECTLY (a size/spacing/color/token correction against the EXISTING design docs — no doc change, no change/iterate ceremony), re-run verify.sh, leave the residual for the owner. Punch-list + bounded polish, NEVER reject-to-rebuild. Two visual touchpoints: a LIGHT advisory per-FRD check (catches GROSS divergence early, in-loop) + this THOROUGH end pass. (4) NON-PROGRESS STOP: a WO carries reopen_count; reopened ≥ MAX_REOPENS (default 3) → BLOCK needs-owner instead of grinding the same fault. (5) SELECTIVE EFFORT: effort:'xhigh' on the hardest reasoning (FRD gate, repair, cross-feature close-out) only — diminishing returns by base-model strength, max overthinks structured tasks. REALISTIC TARGET: an overnight run lands a functionally-complete gate-green app (a working draft, no functional bugs) + a short visual punch-list the owner sweeps in the morning — NOT a pixel-perfect hands-off product (no agent system does that reliably at 2026 SOTA — METR/SWE-Marathon). Converge to that draft or STOP cleanly with a reason. Canonical: factory/standards/build-orchestration.md section 9 + plugin/templates/shared/.claude/workflows/pandacorp-build.js (split frdGate + visual-QA phase + MAX_REOPENS + effort) + plugin/agents/reviewer.md."
    requiere_humano: false
    nota: "owner-driven (2026-06-21), heavily research-backed (a deep-research workflow + 2 forensic/research agents over the week's 7 failed runs). The owner kept being crushed expecting a hands-off 100%-done-no-bugs app overnight — which 2026 SOTA cannot deliver (the expectation reset is itself part of the fix). Forensics found the post-reset build was a low-throughput grind: ~1 net FRD per run because every surface got rejected once on visual fidelity / orphan-composition / DR-057 reuse, deferred to the next overnight pass. The owner's own refinements shaped it: the 15px-vs-16px gap is a direct fix against the EXISTING spec (no ceremony); a light per-FRD check + a strict-but-polish end pass; reuse as structural prevention. Implements alongside 3 still-open risks: R3 (repairFoundation hard-reset now verifies last_green_sha is an ancestor before resetting — an orphaned SHA would have wiped verified work), R2 (the engine loudly warns if args arrived as a non-object — the Workflow-tool serialization drop that ran 'bounded' runs unbounded), R1 (the supervisor's external agent-file brake, DR-070). Fix touches plugin/templates/shared/.claude/workflows/pandacorp-build.js + plugin/agents/reviewer.md + factory/standards/build-orchestration.md section 9 + plugin/skills/implement/SKILL.md. Plugin v8.33.0 (MINOR — new convergence model + Visual QA phase). DEFERRED: the MC Manual narrative (DR-046, concepts/el-pipeline) + a quality.md cross-reference. See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-21)"

  - id: DR-073
    patron: "what the build engine does when the FRD gate rejects a specific work order for a localized fault — rebuild from scratch or patch in place — and which model builds a work order"
    default: "PATCH-IN-PLACE BEFORE REBUILD (single reopen_count budget, whole-project re-gate) + ADAPTIVE MODEL ESCALATION (empirical + hybrid, cost-weighted brake). Two engine changes after the MC build's WO-07-005 needed 4 gate cycles — each a DIFFERENT progressively-smaller finding (5 EARS → reverse cross-nav → dead-code knip → dead Back button) — every reject discarding a ~99%-correct build for a full rebuild that re-introduced a new micro-bug; it only converged when a human recovered the good build and PATCHED the one bug (a 4-line fix + a test, ~5 min vs 4 multi-agent passes). (1) PATCH-FIRST: on a localized CORRECTION reject the reviewer does NOT revert — it leaves the WO IN_REVIEW (no reopen_count change) and REPORTS findings: [{ wo, finding (file:line), failingTest (a RED-proven test that fails without the fix), files }]. The engine runs attemptPatch (opus, xhigh) — fix ONLY the named finding on the EXISTING build, make the RED-proven test pass, then RE-GATE WHOLE-PROJECT: the full FRD adversarial+integration pass AND a whole-project knip+biome+tsc (NOT verify.sh --since — a dead export the patch leaves must not slip to a sibling FRD's global gate, the red-team-A fix). Commit + set VERIFIED + reset reopen_count:0 ONLY on whole-project-clean; the patch runs SYNCHRONOUSLY inside this FRD's gate step so a sibling never sees broken committed code (DR-070's true invariant preserved without a revert). ONLY if the patch can't green it whole-project does the engine fall back to revertAndReopen (the DR-070 path): set PLANNED, INCREMENT reopen_count, surgical git checkout <last_green_sha> -- <files> + git rm newly-created (never a whole-tree hard reset), commit. SINGLE BUDGET: reopen_count is the only counter — the in-place patch is a sub-step of one reject cycle, NOT a second patch_attempts axis (this kills the nesting/non-termination the red team flagged); at MAX_REOPENS (3) the gate BLOCKs needs-owner. (2) ADAPTIVE MODEL: pickWorkerModel(wo) floors at the mode's P.worker and escalates to opus when difficulty=='high' (HYBRID a-priori, owner decision — the WO frontmatter carries difficulty: low|medium|high default medium, populated by the work-orders skill/the plan agent) OR reopen_count>=1 (empirical — it already failed once); the patch always runs on opus. COST-WEIGHTED BRAKE (red-team-B): maxAgents counts AGENTS not tokens, so agentSpawned is weighted by model cost (opus≈3 cost-units) so an opus escalation can't silently blow the token budget; every escalation is logged (⤴ opus: <wo> ...). HYBRID over Change-3-cut: difficulty=high is a-priori only (the one case where escalating before the first failure pays); reopen_count is the empirical correction for a mis-estimated WO. Canonical: factory/standards/build-orchestration.md section 6 (gate-reject + model selection) + plugin/templates/shared/.claude/workflows/pandacorp-build.js (attemptPatch, revertAndReopen, pickWorkerModel, COST, findings in FRD_GATE_SCHEMA) + plugin/agents/reviewer.md + plugin/skills/work-orders/SKILL.md (difficulty rubric). Supersedes the proposal v2 where they differ (single reopen_count, not patch_attempts/repair_attempts). Refines DR-070 (revert becomes the fallback) + DR-072 (reopen_count is the single budget)."
    requiere_humano: false
    nota: "owner-driven (2026-06-21), red-team-hardened (3 adversarial opus agents, proposal 12 v2). Origin: the MC Phase-2 build — WO-07-005 (the complex Configuración surface) churned 4 gate cycles before a human patch converged it. Owner: 'no tiene sentido descartar todo por un 1% que falla.' Owner decisions: HYBRID difficulty field (a-priori only for high) + implement v2 now. CRITICAL refinement over the proposal: a SINGLE counter (the existing reopen_count + MAX_REOPENS), NOT a new patch_attempts/repair_attempts union — the in-place patch is a sub-step of one reject cycle, eliminating the nesting/non-termination risk. Red-team fixes baked in: A (whole-project re-gate, not --since, so a dead export can't slip to a sibling), B (cost-weighted agentSpawned so opus escalation brakes on a token-proxy). Fix touches plugin/templates/shared/.claude/workflows/pandacorp-build.js + plugin/agents/reviewer.md + plugin/skills/{implement,work-orders}/SKILL.md + factory/standards/build-orchestration.md sections 6+9. Plugin v8.34.0 (MINOR — new capability), OVERLAY_VERSION 8.33.0→8.34.0 (the engine — an overlay file — changed). DEFERRED: the MC Manual narrative (DR-046, concepts/el-pipeline). See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-21)"

  - id: DR-074
    patron: "how the target platform (desktop / mobile / both) is decided and enforced, so an app cannot silently ship non-responsive — the verification gate the smoke/visual gates do not provide"
    default: "A TRACKED `target_platforms` FIELD DECIDED AT DEFINITION + A SHIPPED, SMART, FAIL-CLOSED RESPONSIVE GATE PROPAGATED VERBATIM (DR-059). Mission Control shipped desktop-first / non-responsive and passed GREEN: the smoke gate only checks 'renders clean' and the visual gate only checks 'matches its OWN committed baseline' (even a broken, overflowing baseline) — neither asserts the app WORKS at a phone width. Red-team unanimous: the failure is NON-ENFORCEMENT, not a missing field (the rule already existed in styling-and-ui.md + design/SKILL.md and MC shipped non-responsive anyway), and ~80% of the value is in ONE stage — a gate that actually ships. So: (1) THE GATE SHIPS AS VERBATIM STACK TEMPLATES (the real fix) — plugin/templates/stack-a-nextjs/e2e/{responsive.spec.ts,_responsive-helper.ts,smoke.spec.ts,visual.spec.ts} + playwright.config.ts, installed by blueprint and conformance-checked (byte-diff, overwrite-on-drift) by upgrade, exactly the DR-059 mechanism that already works for verify.sh/biome.json/knip.json. This kills the per-project-lenient-authoring root cause AND gives retrofit for free. (2) SMART, NOT NAÏVE: at the mobile viewport, per scroll-root — RED if scrollWidth > clientWidth + 1 (sub-pixel tolerance only) UNLESS the element or an ancestor is author-marked data-scroll-x='intentional' (the escape hatch for legit kanban/DAG/wide-table scroll-x — broken-vs-intentional is AUTHOR-DECLARED, never a heuristic); PLUS silent off-canvas clip (overflow-x:hidden|clip while wider than the box — what MC actually shipped); PLUS tap targets (axe target-size, WCAG 2.2 SC 2.5.8, the 24px line — NOT 44px); PLUS <main> not occluded by a fixed bar (WCAG 2.4.11, unless scroll-margin-top reserves space — the legit sticky-header opt-out). Settle FIRST (mobile viewport → block **/api/live** → domcontentloaded → fonts.ready → <main> visible) to kill the #1 flake. (3) RESPONSIVE = ENFORCED DEFAULT: no per-breakpoint mocks (responsiveness from the fluid design system + the gate; one mock per FRD). (4) ONE MACHINE FIELD target_platforms ∈ {desktop|mobile|responsive} in .pandacorp/status.yaml, read ONLY by the gate (via e2e/_target.ts) to choose which widths to assert — the mobile checks run only when it includes mobile; desktop-only/API/scraper = a vacuous pass. NEW project default = responsive (status.yaml template); the spec PRD records it as a one-line product decision. NO threading through design/blueprint/WO prose as separate enforcement (the gate enforces). (5) CONSERVATIVE RETROFIT (the red-lock fix): upgrade back-fills an EXISTING project to target_platforms=desktop (NOT responsive) — an existing project may be non-responsive, so responsive would turn the new mobile gate RED immediately and block all commits; desktop keeps it green, the owner promotes to responsive deliberately once verified. adopt sets desktop too (brownfield, no spec phase). e2e/routes.ts and e2e/_target.ts are PER-PROJECT — created-if-missing, NEVER byte-diffed (byte-diffing the surface manifest = data loss). Canonical: factory/standards/design.md §4b + quality.md (gates) + build-orchestration.md §5 + plugin/templates/stack-a-nextjs/STACK.md (Responsive Gate). Refines DR-055/056/059/071."
    requiere_humano: false
    nota: "owner-driven (2026-06-21), red-team-hardened (3 adversarial opus agents + a rating pass that added the 3 must-fixes, proposal 13 v2). Owner-stated principle: 'the target platform must be decided when the app is DEFINED and flow into the verification gates.' Origin: MC verified at 390px — the GuildBar overflows every page, the kanban + portfolio overflow horizontally, the workspace has no mobile baseline at all — yet 112/112 VERIFIED GREEN. Red team found the v1 over-engineered (the field exists but isn't enforced) and the naïve scrollWidth<=width gate both unreliable (false-reds MC's legit scroll-x kanbans) and non-shipping (the specs were authored per-project, in no stack template — that's WHY MC's gate was lenient). v2 = ship the gate as a verbatim template + make it smart (author-declared escape hatch) + cut the per-stage ceremony. THREE MUST-FIXES from the rating pass, all applied: (a) routes.ts EXCLUDED from the conformance/byte-diff set (per-project — byte-diffing clobbers the surface list); (b) retrofit back-fills target_platforms=desktop not responsive (else the new mobile gate red-locks all commits on an existing non-responsive project); (c) the gate READS target_platforms to choose which widths to assert. Fix touches plugin/templates/stack-a-nextjs/{e2e/*,verify.sh,STACK.md}, plugin/templates/shared/.pandacorp/status.yaml.tpl, plugin/skills/{spec,blueprint,upgrade,adopt}/SKILL.md, factory/standards/{design.md,quality.md,build-orchestration.md}. Plugin v8.35.0 (MINOR — new capability), OVERLAY_VERSION 8.34.0→8.35.0 (templates changed). DEFERRED: the MC Manual narrative (DR-046, concepts/el-pipeline + estandares-y-reglas). See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-21)"

  - id: DR-075
    patron: "the app shell / global nav as a build artifact, and verifying FIDELITY to the prototype (not self-consistency) — so a whole nav menu cannot silently go missing and pass green"
    default: "THE APP SHELL IS A CAPTURED FOUNDATION WORK ORDER + A SHIPPED, FAIL-CLOSED SHELL-PRESENCE GATE ANCHORED TO THE PROTOTYPE (DR-059 propagation). Mission Control shipped with NO global navigation menu (the prototype's persistent topbar Inicio·Tablero·Portfolio·Documentación was simply absent) and passed 112/112 VERIFIED GREEN. Two factory-level root causes. (B-structural) The per-FRD shard (DR-056, 'only that FRD's screens, never the whole app') drops the PERSISTENT SHELL — topbar/primary nav/footer/the layout frame — because it belongs to NO single FRD; it was never extracted to a mock, never a work order, never built. (A-enforcement) The visual gate (toHaveScreenshot) proves CONSISTENCY (matches its OWN committed baseline), NOT FIDELITY: every page rendered menu-less → menu-less baselines → green; the reviewer's VLM lens judged per-surface shards, never the whole app vs the prototype. Red team (3 adversarial opus agents) unanimous that v1 was over-engineered the same way DR-074-v1 was. v2: (1) THE SHELL IS A FOUNDATION WORK ORDER, NOT A NEW FRD — design Step 8a (and adopt step 6, the brownfield path where MC actually lost it) captures the prototype's persistent chrome as the AppShell/Nav foundation component in components.md (artifacts include app/layout.tsx); blueprint schedules it in the existing foundation wave (DR-057) so it builds FIRST and every surface mounts into it. A design-emitted frd-NN-app-shell would be an orphan in the REQ-NN-MMM→WO spine and the engine has no 'build this FRD between foundation and surfaces' primitive, whereas the foundation-completeness gate already enforces 'no surface until the shell is green' for free — ZERO engine change. (2) SHELL-PRESENCE GATE = a VERBATIM stack template e2e/shell.spec.ts (joins the DR-059/074 byte-diffed conformance set, now SIX e2e files; verify.sh gains a fail-closed test:shell shim) that asserts the app against the PROTOTYPE-ANCHORED nav contract e2e/shell.ts (per-project seed, created-if-missing, NEVER byte-diffed — author-declared at design time from the prototype, NOT derived from the app's own routes, or it just moves the consistency-not-fidelity trap up a level). It iterates SURFACES minus author-declared SHELL_EXEMPT (NOT BLESSED — the MC failure is a route that shipped blessed without the shell, so gating on blessed inherits the blind spot), settle-first exactly like the responsive helper (abort the live transport → domcontentloaded → fonts.ready → main visible → web-first auto-retry, DR-071), and per route asserts: the shell landmark is VISIBLE; every top-level NAV_DESTINATION is a VISIBLE in-shell link whose href equals its path (kills dead href='/'/'#', page-wide strays, empty landmark); each destination 2xx-resolves; and on mobile (target_platforms includes mobile, via _target.ts) the nav is reachable (visible or via the author-declared data-nav-toggle). Empty NAV_DESTINATIONS (an app with no shell — single-screen tool/landing/API/scraper) ⇒ a VACUOUS pass. (3) A2 IS NOT A NEW BLOCKING GATE — the reviewer gets ONE advisory whole-app sentence (the prototype's shell/nav present app-wide + every destination reachable); the BLOCK is the deterministic gate, and shell RESEMBLANCE (placement/order/active-state/branding) is a punch-list nit, never a reopen (DR-072 preserved). (4) CONSERVATIVE RETROFIT: upgrade adds shell.spec.ts to the six-file byte-diffed set + seeds shell.ts EMPTY (never a filled contract — a filled nav on an app with no shell would red-lock all commits, the DR-074 desktop-back-fill lesson); the real contract is filled in the SAME change that builds the shell (MC's re-anchor). Canonical: factory/standards/design.md §5b + quality.md (gates) + build-orchestration.md §3 (foundation) + §5 (gate) + plugin/templates/stack-a-nextjs/STACK.md (Shell-Presence Gate). Refines DR-054/055/056/057/072/074."
    requiere_humano: false
    nota: "owner-driven (2026-06-21), red-team-hardened (3 adversarial opus agents: minimalism, gate-reliability, ship/retrofit — proposal 14 v2). Origin: the owner found MC shipped with no global menu (continuation of mc-design-fidelity-failure). The owner also diagnosed WHY it was MC specifically: MC was ADOPTED (brownfield, /pandacorp:adopt), not built from scratch — its step 6 shards 'never the whole app' with no shell-capture step, so the chrome was dropped at adopt time. Red team reshaped v1 hard: (1) shell as a full FRD was the WRONG unit (orphan in the spine, no engine ordering primitive) → a foundation WORK ORDER, which the existing foundation-completeness gate enforces for free (cheaper AND better-enforced); (2) A2 (semantic whole-app blocking gate) was redundant with A1 + re-opened DR-072 churn → demoted to ONE advisory reviewer sentence; (3) the nav contract must be PROTOTYPE-anchored, NOT derived from routes.ts (MC has 8 SURFACES but the prototype's topbar has 6 — workspace/configuration are routes but not top-level nav; deriving from routes false-reds AND moves the consistency trap up a level); (4) iterate SURFACES not BLESSED (the whole ballgame — gating on blessed inherits the exact MC blind spot); (5) A1 must assert visible/in-shell/href-correct/2xx + settle-first (mirror _responsive-helper) or it false-negatives a dead nav and false-reds a hydrating one; (6) Piece C (responsive-shell + prototype-covers-target) was scope creep DR-074 deliberately cut → dropped (the shell rides the shipped responsive gate; only the mobile-nav-reachability check, which the responsive gate does NOT do, lives inside A1). Fix touches plugin/templates/stack-a-nextjs/e2e/{shell.spec.ts (new),shell.ts (new),playwright.config.ts}, plugin/templates/stack-a-nextjs/{verify.sh,STACK.md}, plugin/skills/{design,blueprint,upgrade,adopt}/SKILL.md, plugin/agents/{designer,reviewer}.md, factory/standards/{design.md,quality.md,build-orchestration.md}. Plugin v8.36.0 (MINOR — new e2e capability), OVERLAY_VERSION 8.35.0→8.36.0 (templates changed) → projects get the gate on /upgrade (back-filled EMPTY shell.ts). DEFERRED: the MC Manual narrative (DR-046, concepts/el-pipeline + estandares-y-reglas) — MC is in release/about to be re-anchored. NEXT (separate, not this DR): re-anchor MC under the new gate (build the missing shell + responsive + reconcile). See docs/proposals/14-fidelity-gate-and-app-shell.md + factory/decision-log.md + plugin/docs/decision-log.md (2026-06-21)"

  - id: DR-076
    patron: "keeping the canonical gate templates (biome/knip/verify.sh) FROM DRIFTING behind real projects, and how a project-specific lint exception coexists with conformance — discovered when /upgrade nearly REGRESSED a project that was ahead of a stale template"
    default: "TEMPLATE ALWAYS LEADS + ENFORCED BACK-PORT DISCIPLINE — do NOT weaken conformance. The MC re-anchor upgrade revealed the canonical stack-a-nextjs gate templates had drifted BEHIND real projects + carried a DR-074 bug, and that the conformance 'overwrite from template' would REGRESS a project that was ahead (red-team B git-forensics: the template knip.json was touched once at DR-059 install and never again; MC's v6 fix landed in-place and was never back-ported → a discipline violation, NOT a mechanism failure). Four fixes (red-team-hardened, 3 opus agents, 2 ran empirical biome/knip tests on MC): (a) BACK-PORT the UNIVERSAL biome/knip deltas — biome += css.parser.tailwindDirectives:true (without it biome PARSE-ERRORS on @theme in every Tailwind-v4 globals.css), += !.pandacorp/** (don't lint the overlay), += style.useExportType:error, and KEEP complexity.noImportantStyles:off (the reduced-motion WCAG reset the factory's OWN accessibility.md mandates uses !important — NOT MC-pixel-art-specific, the proposal's v1 misclassification); knip → knip@6 schema, DELETE the _pandacorp key (knip v6 rejects it → hard error at cold start), ignoreDependencies:['tailwindcss','@axe-core/playwright']. (b) @axe-core/playwright (the DR-074 responsive-gate dep, imported only in e2e/_responsive-helper.ts which knip's playwright plugin doesn't trace) goes in ignoreDependencies — NOT by pulling e2e/ into knip 'project' (tested: that introduces a NEW false-positive on _target.ts). (c) verify.sh runs the e2e gates in ONE playwright invocation (was four — one webServer boot, ~4× faster) gating on the SPEC FILE not the npm script — this is a CLEANUP, NOT the fix for the observed ERR_CONNECTION_REFUSED (red-team C: that is a mid-invocation dev-server death from .next/process contention, fixed by the deferred worktree isolation, not by invocation count). (d) the DR-075 shell wording is softened: don't AUTO-EMIT an orphan frd-NN-app-shell at greenfield shard time, but a DELIBERATELY-authored app-shell FRD rooted in the PRD (a brownfield re-anchor) is correct, with foundation-marked WOs. The CONFORMANCE MECHANISM stays UNCHANGED (red-team B: 'diff-and-flag-on-ahead' erodes DR-059's binary guarantee and the ahead-vs-drifted call is not mechanically decidable). Root cause (templates going stale because someone edits the COPY) is fixed by a discipline rule (canonical gate files edited at the SOURCE template, never in-place — an in-place project edit is reverted by the next /upgrade) ENFORCED by a new PreToolUse hook remind-backport-gate-config.sh (cloned from remind-manual-sync.sh, DR-046 pattern; plugin-scoped). DEFERRED (flagged, not built): a factory-side 'template-never-behind-a-project' CI check (stronger backstop, needs a factory runner); the biome.project.json extends opt-out mechanism (YAGNI — noImportantStyles is universal so no project needs it now); the .next-contention worktree fix (the real (c) fix); biome recommended:true→preset migration (deprecated, future biome major). Canonical: plugin/templates/stack-a-nextjs/{biome.json,knip.json,verify.sh,STACK.md} + plugin/scripts/remind-backport-gate-config.sh + plugin/skills/upgrade/SKILL.md (Rules) + factory/standards/{quality.md,build-orchestration.md,design.md}. Refines DR-059/074/075."
    requiere_humano: false
    nota: "owner-driven (2026-06-21), red-team-hardened (3 adversarial opus agents — A config-correctness TESTED biome/knip on MC, B conformance-mechanism git-forensics, C verify.sh runtime, proposal 15 v2). Origin: /pandacorp:upgrade of MC (8.33.0→8.36.1, re-anchor Phase 0) — the conformance overwrite would have regressed MC's already-fixed biome/knip; caught by hand. Three decisive red-team corrections to v1: (1) A — noImportantStyles:off is NOT MC-specific, it's the prefers-reduced-motion WCAG reset (globals.css), dropping it RED-locks a fresh project's a11y CSS under --error-on-warnings → KEEP it in the template; (2) B — REJECT my a3 'diff-and-flag-on-ahead' (erodes DR-059, not mechanically decidable); the regression was a discipline violation → fix with a back-port hook + rule, not a mechanism change; (3) C — my (c) root-cause was wrong: the ERR_CONNECTION_REFUSED is .next-contention mid-invocation, NOT the 4-invocation race, so 4→1 is a worthwhile cleanup but NOT the fix (the worktree work is). Plugin v8.40.0 (MINOR — new hook capability), OVERLAY_VERSION 8.37.0→8.38.0 (templates changed) → projects re-sync the corrected biome/knip/verify.sh on /upgrade; MC already carries the corrected biome/knip (kept during its upgrade) so it does NOT regress. See docs/proposals/15-gate-template-fidelity.md + factory/decision-log.md + plugin/docs/decision-log.md (2026-06-21)"

  - id: DR-077
    patron: "completing the document-template library, and whether to version templates per-document + auto-migrate already-generated docs"
    default: "COMPLETE THE TEMPLATE LIBRARY (do); NO PER-DOCUMENT VERSION STAMP and NO MIGRATION ENGINE (skip); RETROFIT BY REGENERATION + a doc-structure LINT instead of version metadata. Every recurring doc a project generates gets a THIN base template in plugin/templates/docs/ (frontmatter + required sections, explicitly-optional parts so an LLM doesn't pad small features into noise): added FDD, platform architecture, ADR, events plan, research, design-system (root DESIGN.md), per-FRD work-orders README, and the owner-channel change-request card — joining the existing PRD/FRD/blueprint/work-order. Each doc-generating skill POINTS at its template (the template is the single structural contract; skills don't re-derive sections). The template SET is versioned collectively under the existing OVERLAY_VERSION — there is NO third per-document `template_version` axis (it would re-create the state-fracture the pipeline audit flagged, and a birth-stamp lies the moment a doc is hand-edited; provenance already lives at project grain in .pandacorp/status.yaml created_with/overlay_version). To bring an old doc onto an improved template, REGENERATE it via its owning skill from the still-true upstream (PRD/FRD/code) — do NOT build a structural migration engine (the docs are LLM-generated: no deterministic common ancestor for a safe 3-way merge, and a structural patcher's safe surface is the low-value boilerplate, not the human-authored prose it would need to preserve); reserve in-place edits for the rare doc with irreplaceable hand-edits and prefer flag-for-review over auto-rewrite. Drift is surfaced by a shipped, conservative doc-lint (.pandacorp/doc-lint.sh, run from verify.sh) — ADVISORY (it reports findings and never fails the gate, so it never red-locks an existing/adopted project with a partial spine; fail-closed promotion is a future per-project opt-in): missing required frontmatter keys + a work order citing a REQ defined in no FRD; a project with no docs/ is a vacuous pass. Canonical: plugin/templates/docs/ (+ README.md) + factory/standards/structure.md (Documentation structure). Refines DR-049 (structure) + DR-048 (upgrade) + DR-059 (verbatim gate propagation)."
    requiere_humano: false
    nota: "owner-asked (2026-06-21), research + red-team-backed (a 10-agent workflow: 4 web-research angles + steelman + 4 adversarial opus lenses + a verdict judge; verdict do-reduced, high confidence, red team unanimous reduce). The owner proposed (a) fill the missing templates, (b) stamp template_version per doc, (c) auto-migrate old docs on template bump. Prior art: copier/cruft DO exactly (b)+(c) — but for FLEETS of hundreds of repos with deterministic (template,answers) regeneration; the AI-spec tools (spec-kit/Kiro/Tessl) all chose regenerate-or-flag, never auto-migrate. Ground-truth that killed (b)/(c): the portfolio is 1 project (MC), no sibling overlays — the 'fragmenting fleet' doesn't exist; the doc templates' entire git history is additive (0 breaking structural bumps); the migrate event has happened 0 times; provenance already exists at project grain. (a) is table-stakes; the highest-leverage piece the owner's proposal OMITTED was the doc-lint, which verify.sh confirmed was absent. Fix touches plugin/templates/docs/* (8 new templates + README), plugin/templates/shared/.pandacorp/doc-lint.sh (new), plugin/templates/stack-a-nextjs/verify.sh (lint call), plugin/skills/{spec,blueprint,design,work-orders,change,bug}/SKILL.md (template pointers). Plugin v8.37.0->8.38.0 (MINOR — new templates + doc-lint capability), OVERLAY_VERSION 8.36.1->8.37.0 (shared changed: doc-lint.sh). DEFERRED: the MC Manual narrative (DR-046) — MC is mid-re-anchor (tracked in mission-control/docs/decision-log.md). Rationale record: docs/proposals/16-template-library-and-doc-lint.md. See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-21)"

  - id: DR-078
    patron: "how a data reader/parser of an internal artifact behaves on a shape it does NOT recognise — and how 'genuinely empty' is told apart from 'could not interpret', so a silent [] cannot dark-render half an app"
    default: "FAIL LOUD, never silently empty (constitution §24 — the data-plane oracle). The Mission Control failure: readPortfolio() parsed only English headers, the real file is gitignored→Spanish, so it returned [] and Portfolio/Workspace/Party/home/Achievements all rendered dark while every gate stayed green — a [] is structurally identical to a passing-but-wrong build (E2). RULE: (1) PARSE, DON'T VALIDATE at every boundary that reads an internal artifact (a markdown table, status.yaml, an ndjson event stream, a portfolio/idea card): the reader returns a typed result OR throws / returns an explicit `unreadable` Result on an unrecognised shape — it MUST distinguish 'the source says empty' from 'I could not interpret the source', and the two give DIFFERENT outcomes (a thrown error / an explicit error state the UI renders as an error, NOT an empty list). (2) ILLEGAL-EMPTY UNREPRESENTABLE: a collection never legitimately empty is modelled NonEmpty (or carries an explicit empty-variant with a reason), so 'empty' is a deliberate state, not a fallthrough. (3) EVERY internal-artifact reader is unit-tested against a REAL fixture — INCLUDING the gitignored/foreign-language shape it will actually meet (the Spanish portfolio, not just the English one) — AND a MALFORMED fixture, asserting the malformed one FAILS LOUD, not returns []. Parser invariants use property-based tests (fast-check), promoting DR-016's optional tier into a REQUIRED parser-test family. (4) advisory RENDER backstop: a data-presence check (e2e/data-presence.spec.ts) seeds a real fixture and asserts the data surfaces don't render empty against the real data path — ADVISORY-with-teeth (a forgotten exemption fails CLOSED: an unlisted surface that renders empty is flagged), runs in the DR-072 end-of-build pass, vacuous if the project declares no data surfaces. Canonical: factory/standards/quality.md (Fail-loud read boundaries) + plugin/templates/rules/{quality-and-testing,typescript}.md + plugin/templates/stack-a-nextjs/{verify.sh,e2e/data-presence.spec.ts}. Instance of constitution §24; refines DR-016 (property-based) + the boundary-validation rule in conventions.md."
    requiere_humano: false
    nota: "process audit 2026-06-22 (a 31-agent deep-research + red-team workflow over the dev process, seeded with the MC build's empirical failures). KEY FINDING: the data plane had NO independent oracle — all of DR-054..077 hardened the VISUAL/coherence axis, but a reader returning [] passed every gate. The single clearest NET-NEW gap (the one class with no guardian). The render-level backstop (4) is ADVISORY (red-team: a hard data-presence gate would red-lock legitimately-empty states); the real fix is the unit-level fail-loud + the foreign-language fixture (3). Consolidates audit proposals P01/P16/P17. See factory/decision-log.md + the audit memory (2026-06-22)."

  - id: DR-079
    patron: "proving each fail-closed gate STILL goes RED on a deliberately-broken input — so a check that has silently stopped catching anything cannot pass as 'green'"
    default: "A CANARY meta-check (constitution §24 corollary; anti-cheat §22). The factory keeps a small fixture set of DELIBERATELY-broken inputs — a console-erroring route, a malformed data fixture (DR-078), a token/contrast violation, a removed nav destination (DR-075) — that each corresponding gate (smoke, reader-conformance, a11y, shell) MUST reject. Run the canary on each /pandacorp:upgrade (and optionally in CI toward main): if a gate that SHOULD red stays GREEN on its broken fixture, the gate has rotted (a renamed selector, a disabled rule, a swallowed exit code) and THAT is a RED — a gate you can't prove still bites is not a gate. Ships as a `verify.sh --canary` mode (the broken fixtures live OUTSIDE src/ and are invoked explicitly), so it NEVER runs on — nor red-locks — a normal build; vacuous until /upgrade installs the fixtures. Canonical: plugin/templates/stack-a-nextjs/verify.sh (canary mode) + plugin/skills/upgrade/SKILL.md. Instance of constitution §24; complements DR-059/076 (which byte-verify the gate FILES propagate — NOT that they still FUNCTIONALLY reject)."
    requiere_humano: false
    nota: "process audit 2026-06-22. DR-059/076 prove the gate config is present and matches the template; they do NOT prove the gate still FAILS on bad input (a rule can be present but disabled, a selector renamed, an exit code swallowed — and every gate would stay green while catching nothing). The canary closes that meta-gap. Low effort, high assurance. Red-team kept it, sharpened to opt-in canary-mode so it never red-locks a normal run. Audit proposal P18. See the audit memory (2026-06-22)."

  - id: DR-080
    patron: "anchoring visual + acceptance verification to an INDEPENDENT oracle (the approved prototype, a builder-blind acceptance suite) instead of the build's own output — and recording that anchoring so a bless can't silently drift"
    default: "Three reinforcements of constitution §24 on the fidelity axis: (1) PROVENANCE ON THE BLESS — when a visual baseline is blessed (DR-056/072), the SAME commit records the prototype path + shard it was blessed against + the reviewer's Layer-B sign-off, in the FRD's fdd.md / design-decisions.md; verify.sh REDs a baseline marked blessed with NO provenance line (a baseline with no recorded oracle is a self-reference — the E6 trap). (2) PROTOTYPE-FRESHNESS PIN — fdd.md records `prototype_blessed_at` = the git SHA of docs/design/prototype/ at bless time; when the prototype changes after a bless, an ADVISORY (non-blocking) reminder surfaces that the baseline may be stale (the prototype moved, the baseline didn't), reusing the remind-manual-sync hook pattern (DR-046) — never red-locks. (3) BUILDER-BLIND ACCEPTANCE SUITE — the happy-path acceptance suite (domain-language, from the FRD's REQ/AC) is authored by the reviewer (a DIFFERENT model family, DR-015), and the implementer may NOT edit it nor any blessed baseline (anti-reward-hacking, §22): the agent that writes the code cannot shape the test that judges it. Canonical: plugin/agents/{reviewer,implementer}.md + plugin/templates/stack-a-nextjs/verify.sh + plugin/templates/docs/ (fdd template: provenance + prototype_blessed_at). Instances of constitution §24; extend DR-015/056/072/075."
    requiere_humano: false
    nota: "process audit 2026-06-22. The visual gate (toHaveScreenshot) is self-baseline — DR-075 anchored only the SHELL to the prototype; a per-surface bless recorded NO link to the prototype, so a baseline blessed against a broken render is byte-identical to a faithful one (E6), and the implementer could shape the acceptance test that judged it (reward-hacking surface). Net-new is the provenance + freshness-pin + authorship-lock. The heavier visual oracle (a calibrated VLM fidelity judge, audit proposal P10) was DEFERRED as its own change — it needs a committed calibration gold set and must stay advisory (DR-072 keeps fidelity nits non-blocking). Consolidates audit proposals P03/P08/P09. See the audit memory (2026-06-22)."

  - id: DR-081
    patron: "how the factory propagates a change made DIRECTLY in a project's code (a hand-edit done to move fast, outside spec/design/implement/change) back into the documentation — the reverse of the doc→code flow — without blessing an experiment or accident as canonical"
    default: "RECONCILE WITH /pandacorp:sync (modo proyecto), EXHAUSTIVELY. A hand-edit to an app (Mission Control or a product project) is brought back into the docs by /pandacorp:sync, the inverse of iterate: it classifies the change with the canonical-doc routing table (CLAUDE.md) read code→doc and propagates reality through the change's FULL CASCADE — behaviour→FRD + its work order(s) + fdd; architecture/tech→blueprint + ADR + architecture.md + affected work orders; UI→fdd + (if the shared system moved) DESIGN/design-tokens/components; scope→PRD — across BOTH docs/ and .pandacorp/ (comms/summary in Spanish, status counters), AND records the area's decision-log entry. The source-of-truth hierarchy (FRD>fdd>tokens>blueprint>WO) decides who WINS a conflict; the cascade decides what is TOUCHED — the owning doc AND every derived doc the change made stale, so nothing slips through (the owner's standard: plenty of well-made docs over too little; exhaustive WITHIN the diff, bounded to it per DR-012, no padding). DIRECTION DECIDES THE ACTION (the code is the oracle of what the app DOES; the doc stays the oracle of what it SHOULD do): code-ahead-of-doc → document; a DELIBERATE behaviour change → update the doc; but a divergence where the DOC is right is NEVER written down into the code — a BUG (code contradicts a correct doc) is routed to /change|/bug to fix the code, a DOCUMENTED-BUT-UNBUILT feature is marked pending (PRD feature-landscape / WO implementation_status), the spec untouched (sync detects-and-routes code-behind-doc, it does not document it). TWO MODES: warm (changes already in context — still verified against the real diff) / COLD (no context — a FULL AUDIT: enumerate every app surface from the code, compare each to its owning doc, document every code↔doc gap; fan out for a large app). Two invariants, because the inverse flow INVERTS THE ORACLE (the code becomes the oracle, the doc conforms — constitution §24): (1) INTENT GATE — sync cannot judge whether a change is correct, only describe what the code DOES, so the owner marks each change deliberate (document) vs experimental/accidental (don't bless); (2) PROVENANCE — docs written from code are marked reconciled-from-code (like adopt's as-built), never authored design intent, and the decision-log 'Why' is ASKED from the owner (the diff carries the what, not the why). EXTERNAL DESIGN MIRROR: if the change moved the shared design system AND it has Claude Design provenance (_ds_manifest.json, DR-058), sync DETECTS+FLAGS+OFFERS a re-sync via /design-sync — it NEVER auto-pushes (an outward-facing write to an external beta service behind the owner's claude.ai login is a human gate); the repo's docs/design stays the source of truth (DR-054). v1 is modo proyecto only; a hand-edit to plugin/factory routes to /pandacorp:learn (don't duplicate plugin versioning). Canonical: plugin/skills/sync/SKILL.md. Complements iterate (DR-069, the forward owner door) + adopt (one-time brownfield code→docs); an instance of the two-layer rule (CLAUDE.md) + §24."
    requiere_humano: true
    nota: "owner-asked (2026-06-22): the owner hand-edits a project directly (notably Mission Control) to move fast / see it change live, outside the spec→implement / change flow, and wanted the reverse — a skill that catches the docs up from the code. No existing skill did it incrementally: adopt is one-time/full-project/brownfield, iterate/change go forward. Design anchored on the process-audit meta-pattern (factory-process-audit-2026-06-22 memory + DR-078/079/080): the inverse flow has NO independent oracle, so sync documents but never verifies — the owner supplies the intent oracle at the gate (hence requiere_humano), and provenance-marking stops an accident being blessed as design. The existing remind-manual-sync hook (DR-046) already flagged this gap for the MC Manual; sync generalises the fix to every doc. v1 scoped to modo proyecto (MC + product apps) by owner choice; modo fábrica (plugin/standards) deferred to a possible v2, routed to learn for now. SCOPE SHARPENED the same day by owner feedback: sync must be EXHAUSTIVE (the full cascade — a behaviour change touches the FRD AND its work order(s) AND the fdd; nothing unnoticed; plenty of well-made docs over too little, bounded to the diff), cover BOTH docs/ and .pandacorp/, work COLD (a full app↔docs gap-audit when run with no context), and treat the external Claude-Design mirror by detect+offer — the owner's open question, researched: the repo's docs/design is the source of truth (DR-054), Claude Design is a managed mirror refreshed only via /design-sync behind the claude.ai login gate, NEVER auto-pushed. Plugin v8.42.0->8.43.0 (MINOR — new skill; v8.44.0 was taken in parallel by the adopt board/portfolio fix). No OVERLAY_VERSION change (a skill only; no templates/shared or stack-* touched). See plugin/docs/decision-log.md (2026-06-22)."

  - id: DR-085
    patron: "the project lifecycle (phases) and what 'release' means — where the audit/security/quality/metrics hardening happens, and how an internal vs external deploy is tracked"
    default: "SIX phases, matching Mission Control's six Campaña rooms: research (pre-project) → product → design → architecture → implementation → release. TWO changes vs the old model: (1) CONSTRUCTION OWNS THE HARDENING — the security audit (OWASP + ASI Top 10), the quality close-out and the telemetry/metrics verification are the LAST STEP of construction (/pandacorp:implement), once every FRD is VERIFIED, NOT a separate release activity; the build leaves the project audited, quality-gated and instrumented before it sets phase: release. (2) RELEASE = LAUNCHED, and it ABSORBS the old 'operation' phase — there is NO separate operation/live phase. 'release' no longer means 'the act of auditing+deploying'; it means the product is DEPLOYED/LAUNCHED (internal or external) and from there it is iterated (/pandacorp:iterate) and its results read (/pandacorp:review-launch, whose precondition is now phase: release). /pandacorp:release performs the deploy/launch + launch plan and sets phase: release + the idea card → shipped/lanzada. INTERNAL vs EXTERNAL is tracked by a status.yaml field deploy_target: internal | external (NOT a phase): internal = an in-house tool used as-is with no external host (e.g. Mission Control on 127.0.0.1 — no external deploy, no production gate, no landing/GTM); external = deployed to an external server (Vercel/AWS/…) behind the human production gate (DR-004), with the launch plan (DR-042). Both are a real release of a software product — same 'release' concept, distinguished only by deploy_target (derived from return_type: personal/in-house ⇒ internal, monetary/mixed/opportunity ⇒ external). Iterating from release may loop back to construction in a future second build pass (conceptually allowed; the day-to-day is /pandacorp:iterate). Canonical: factory/standards/build-orchestration.md §5b/§6, plugin/skills/{implement,release,review-launch,adopt,new-version}/SKILL.md."
    requiere_humano: false
    nota: "owner redefinition (2026-06-23): 'release y operación son lo mismo — el concepto es un release de software, interno o externo; la auditoría/calidad/seguridad/métricas es el último paso de la construcción, no una fase posterior.' Folds the old 'operation' phase into 'release' (the launched/terminal phase) and moves the audit from release into construction's close-out, so a build is not 'done' until it's secure, quality-gated and instrumented. deploy_target replaces the false internal-vs-external phase distinction with a status field. Updates DR-043 (review-launch now triggers on phase: release). MAJOR — redefines the lifecycle, a breaking conceptual change (plugin v9.0.0). See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-23) + Mission Control's 6-room Campaña."

  - id: DR-086
    patron: "WHEN the build engine commits during a build — and therefore how much work an interruption (kill / cancel / internet drop / crash) discards"
    default: "COMMIT EACH WORK ORDER THE INSTANT ITS SELF-TEST GREENS — not batched at wave end. Workers never call git (Option B, DR-060); a single SERIALIZED writer (a promise-chain, one git op at a time) commits each WO the moment its self-test passes, staging ONLY that WO's own disjoint `artifacts` (+ its work-order .md with the IN_REVIEW frontmatter). This is the finest safe save point the architecture allows: a WO is atomic (one commit; an interrupted/uncommitted WO is rebuilt from scratch per DR-067, never resumed mid-write), so committing as-you-green means an interruption keeps EVERY already-green WO (committed → IN_REVIEW → skipped on resume, never rebuilt) and only the STILL-BUILDING (uncommitted) WOs are redone. Before this, the commit was batched after the WHOLE wave finished, so a mid-wave cut discarded the entire wave (up to `wave` WOs — 8 in powerful mode). The serialization keeps the no-index.lock-race / no-merge invariant even while sibling WOs of the same wave are still building (disjoint artifacts → the selective `git add` can't capture a sibling's in-flight files). `last_green_sha` is still advanced ONLY by the FRD gate (the review-verified anchor for safe_to_test / the review worktree / baseline-skip); the per-WO commits are finer RESUME points (via the frontmatter), not new VERIFIED points — so the recovery anchor's safety is unchanged. The RESTART policy itself is UNCHANGED and correct: resume into partial multi-agent file state is unsafe (no merge path); restart-from-the-last-commit is the only coherent recovery, and finer commits simply shrink what 'the last commit' discards. Canonical: factory/standards/build-orchestration.md §2 (Single-writer commit) + plugin/templates/shared/.claude/workflows/pandacorp-build.js (commitWOGreen)."
    requiere_humano: false
    nota: "owner-asked (2026-06-23): 'descartar trabajo al 99% por un corte de internet es un desperdicio — ¿commitear más pronto?'. Investigated with a 5-agent workflow + red-team (build-resume-policy): verdict = RESTART-from-last-commit is the right policy (resume into partial multi-agent state is unsafe — no merge path; the durable-execution rule is resume only when steps are idempotent + the checkpoint is durable; the la-campana stash-pop wedge, DR-067, is the concrete failure). The owner's right lever was 'more save points'. Reading the engine revealed it ALREADY committed per-wave + resumed committed WOs via the frontmatter — the only gap was the commit was BATCHED at wave end, so a mid-wave cut lost the whole wave. Fix: move the commit into buildWO (commit the instant the self-test greens, serialized), which also brings the engine into line with what MC's Manual (concepts/construccion-desatendida) ALREADY described ('cada work order que termina verde se commitea inmediatamente') — engine↔Manual now consistent, no Manual edit needed. Pauses/crashes need no active-time math: an interrupted WO is rebuilt whole (atomic) so its final attempt is contiguous — the planned .pandacorp/track.jsonl timeline's 'keep the last attempt' holds. Plugin v9.3.0→9.4.0 (MINOR — backward-compatible engine improvement); OVERLAY_VERSION 8.39.0→8.40.0 (templates/shared engine changed → projects get it on /upgrade). Refines DR-060/067; restart policy reaffirmed, not changed. See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-23)."

  - id: DR-087
    patron: "WHERE work-order dependencies are recorded (machine-readable) — and therefore whether Mission Control's dependency DAG shows the REAL graph or a fabricated one"
    default: "WORK-ORDER DEPENDENCIES LIVE IN A `dependsOn: [WO-NN-MMM]` FRONTMATTER FIELD — the canonical, machine-readable source of truth, mirroring the blueprint Build Plan DAG + the work-orders README 'Depends on' column (keep the three in sync). It lists the REAL upstream WOs a work order depends on (a WO can depend on several, across FRDs); `[]` when it is a root. It is HONEST data, never a fabricated sequential chain: a WO with no real predecessor declares `[]`, not 'the previous WO by number'. Mission Control's dependency graph (FRD-12 WoDag) reads `dependsOn` verbatim — independent node for `[]`, real cross-FRD edges otherwise; the old fallback that invented a per-FRD linear chain when a WO had no explicit deps is removed (it drew dependencies that did not exist — the DAG looked like every WO blocked exactly one other, never the real fan-in/fan-out). The work-orders skill writes `dependsOn`; lib/work-orders reads it. Wave serialization stays artifact-driven (DR-060); `dependsOn` is the dependency truth for traceability + visualization (and may inform ordering). Canonical: factory/standards/build-orchestration.md (Declared dependencies) + plugin/templates/docs/work-order-template.md + plugin/skills/work-orders/SKILL.md; consumed by mission-control FRD-12."
    requiere_humano: false
    nota: "owner-spotted (2026-06-24): the MC DAG showed every WO depending on exactly one other (a pretty linear chain) — 'en la vida real un WO bloquea varios y necesita de varios'. Investigation: the real cross-deps EXISTED in each FRD's work-orders/README.md 'Depends on' column (15/19 FRDs, with genuine fan-in/fan-out + cross-FRD), but lived only in human prose; lib/work-orders read no deps, and the DAG's deriveDeps FABRICATED a sequential 'depends on the previous WO in its FRD' chain as a fallback. Owner chose the durable fix: deps as machine-readable frontmatter. MC's existing WOs were backfilled into `dependsOn` from the README column (33 WOs; e.g. WO-01-000 fans out to 7, WO-18-001 fans in from 6 across 4 FRDs, WO-06-001←WO-06-012 non-sequential). Same class as the timeline's fake-bars (DR: don't fabricate — read real data or show honest emptiness). Plugin MINOR bump (new frontmatter field, backward-compatible: absent → []); OVERLAY_VERSION bump (template + skill changed → projects get it on /upgrade). See factory/decision-log.md + plugin/docs/decision-log.md + mission-control/docs/decision-log.md (2026-06-24)."

  - id: DR-088
    patron: "HOW a `fullPage` visual-fidelity baseline (DR-056) treats a region whose CONTENT is live, variable-length data (an idea-card grid, a proposals/feed list, an activity log) — whose row count changes the page height and breaks the screenshot diff even though the page renders correctly"
    default: "A VISUAL BASELINE ASSERTS THE PAGE CHROME, NOT THE DATA-DRIVEN LIST. Any region whose length is live data that changes the page height is MASKED from the `fullPage` baseline: mark its container `data-volatile` in the component (ideally `style={{display:'contents'}}` so the live layout is byte-identical — the marker only takes effect in the test, which hides `[data-volatile]` via the injected stylesheet alongside the existing data-testid exclusions). The baseline then gates layout, nav, headers and empty-state structure deterministically; the masked region's correctness is covered by its own unit/component/integration tests. This is the generalization of the per-region exclusions (dashboard-banners, activity-log, summary-text — DR-076/b50fa7a): a height-drifting list is not a fidelity regression, so it must not turn the gate RED on every data change or cold/warm reflow. Canonical: plugin/templates/stack-a-nextjs/e2e/visual.spec.ts (the `[data-volatile]` exclusion + its comment). Conformance-checked by /pandacorp:upgrade (DR-059)."
    requiere_humano: false
    nota: "owner-reported (2026-06-25): Mission Control's visual gate kept failing falsely on /board (tablero) and /proposals (propuestas) — both `toHaveScreenshot(..., {fullPage:true})` baselines coupled to LIVE factory data (idea cards on the board; the four self-learning streams + promotions queue on proposals) plus a cold/warm render reflow, so the page height drifted (/proposals 9769→9986→10203px across one session; /board on every add/discard/edit of a card) and the snapshot mismatched though the route rendered fine. Forced a manual --update-snapshots re-bless on almost every idea-base change (whack-a-mole). Fix: applied the exact b50fa7a/DR-076 pattern generically — `data-volatile` on the board's per-column cards list (IdeaBoardView) and on a display:contents wrapper around the proposals feed (page.tsx); added `[data-volatile]` to visual.spec.ts's hide list in BOTH mission-control and the stack template; re-blessed tablero+propuestas × desktop/mobile once. Shell + smoke gates still assert these routes render without console errors / error boundaries. PLUGIN PATCH (template-only fix, no skill/agent behavior change). See factory/decision-log.md + plugin/docs/decision-log.md + mission-control/docs/decision-log.md (2026-06-25)."

  - id: DR-089
    patron: "WHERE a project's always-on LOCAL deployment lives on disk and how it is named — the built, served snapshot of an internal tool (`deploy_target: internal` / `return_type: personal`, e.g. Mission Control on 127.0.0.1)"
    default: "LOCAL DEPLOYMENTS LIVE UNDER ONE CANONICAL ROOT, OUTSIDE THE SOURCE-PROJECTS AREA: `/Users/Shared/local-deployments/<project>/` (a sibling of `Proyectos/`, at the `Shared` level), each in a subfolder named EXACTLY after the project/repo — never a `-live`/`-deploy` suffix, never co-located inside `Proyectos/` next to source checkouts. The deployment is a PRODUCTION BUILD (`next build` + `next start`, not dev), kept in an ISOLATED git worktree so its `.next`/`node_modules` never collide with the dev checkout's builds/tests/verify.sh; LIVE gitignored factory data is read from the main checkout via `PANDACORP_FACTORY_ROOT`. It is served always-on via launchd (KeepAlive) on the project's reserved port. Redeploy = sync the worktree to the green HEAD + rebuild + restart the service. The dev checkout in `Proyectos/<project>` is where work happens; the deployment in `local-deployments/<project>` is the stable running copy — they are never the same folder."
    requiere_humano: false
    nota: "owner-stated (2026-06-25): the local deploy of Mission Control had been a worktree confusingly named `panda-corp-live` sitting inside `Proyectos/` (mixed in with the real source projects), which made it look like a separate project and made the owner unsure what it was / whether to delete it. It also poisoned the visual gate (reuseExistingServer reused the stale snapshot server). Rule: a clean, predictable home for all local deployments. Migrated MC: `git worktree move Proyectos/panda-corp-live → /Users/Shared/local-deployments/panda-corp`; updated `mission-control/.pandacorp/run/serve.sh` (cd) + `deploy-local.sh` (LIVE path); reloaded the launchd job (verified :1987 serves from the new path). Canonical standard: factory/standards/infra.md (Local deployments). Applies to every future internal/local deploy."

  - id: DR-090
    patron: "WHERE the manually-created REVIEW / TEST worktrees live on disk — the 'test the latest green build without stopping the agent' copies that `/implement` keeps pinned at `last_green_sha` and that Mission Control's snapshot panel (FRD-14) emits a `git worktree add` command for"
    default: "REVIEW WORKTREES LIVE UNDER ONE CANONICAL ROOT, OUTSIDE THE SOURCE-PROJECTS AREA: `/Users/Shared/review-worktrees/<project>/` (a sibling of `Proyectos/`, at the `Shared` level), each named EXACTLY after the project — NO `-review` suffix (the root already says it's for reviews), NEVER co-located inside `Proyectos/` next to source checkouts, and NEVER inside `.claude/` (tool-internal — risks Claude Code's worktree sweep deleting it). This mirrors the local-deployments root (DR-089): `Proyectos/` holds only source checkouts; every derived worktree lives in its own `Shared`-level root (`local-deployments/` for the always-on prod deploy, `review-worktrees/` for ephemeral green-snapshot testing). `/implement` creates/refreshes it (`git worktree add /Users/Shared/review-worktrees/<project> <last_green_sha>`, updated each time an FRD verifies); keep ONE per project and refresh it, don't accumulate."
    requiere_humano: false
    nota: "owner-stated (2026-06-25, same conversation as DR-089): the review worktree had been `Proyectos/<project>-review` — a sibling of the source projects, which (like the deployment) cluttered `Proyectos/` and confused the owner ('first time I hear of this project'). The owner asked whether they should go in `.claude/worktree` (Claude's default) or a dedicated root like the deployments — recommendation taken: a dedicated `Shared`-level root, NOT `.claude/` (the factory's review worktrees are deliberately persistent/manual, so they must stay out of what Claude Code's automatic sweep manages). Updated: factory/standards/infra.md (Worktrees → review-worktree root), plugin/skills/implement/SKILL.md (the `git worktree add` path), mission-control/src/lib/snapshot/snapshot.ts + its tests + FRD-14 AC-14-001.1/.2 (the command MC shows). The stale `panda-corp-review` (FRD-17 era, 2026-06-18) was removed; the next `/implement` recreates it under the new root."

  - id: DR-091
    patron: "the per-route VISUAL-FIDELITY oracle the reviewer judges a UI build against — and what happens when a project's design lives in ONE global prototype instead of per-FRD mocks"
    default: "RESILIENT FIDELITY ORACLE WITH A FALLBACK CHAIN + ENFORCE THAT EVERY UI FRD HAS AN ORACLE. The reviewer's per-route fidelity check (DR-072 advisory lens) previously fired ONLY 'when the FRD has approved mocks/' — so when the DR-056 sharding was skipped (no per-FRD mocks, the design is a single global prototype), it SILENTLY NO-OPPED, leaving only the DR-075 shell check. That is exactly how Mission Control shipped 17 un-sharded surfaces that diverged from the prototype while every gate stayed green. TWO reinforcements: (1) FALLBACK CHAIN (reviewer.md): the per-route oracle = per-FRD `mocks/<route>` -> ELSE the FRD frontmatter's `visual_source` (the global prototype's corresponding view/shard, rendered LIVE in a browser and A/B'd against the route screenshot) -> ELSE a `ui: true` FRD with neither is a FINDING (a UI build judged for fidelity blind is not acceptable), surfaced, never passed silently. Stays ADVISORY (DR-072 preserved — visual judges are reward-hackable; do NOT make it a hard block). (2) ENFORCEMENT (doc-lint.sh, DR-077): a `ui: true` FRD with no `fdd.md`, or with empty `mocks/` AND no `visual_source`, is flagged — the un-sharded surface that lets the fidelity check no-op is caught at the gate. Canonical: plugin/agents/reviewer.md (the fallback chain) + plugin/templates/shared/.pandacorp/doc-lint.sh (the completeness check). Extends DR-056/072/075/080."
    requiere_humano: false
    nota: "owner-driven (2026-06-26): forensic review of a long MC session where the owner hand-corrected dozens of fidelity gaps on Logros. Root cause verified against the repo: MC's overlay was 6 versions behind AND was never sharded — 17/19 FRD mocks/ are empty READMEs with visual_source pointing at the single global index.html, so the reviewer's mocks/-gated per-route check no-opped on them. The owner's own insight shaped the fix ('look in the FRD's mocks first, and if not there use the global html in design as the reference'). The heavier calibrated VLM fidelity judge stays DEFERRED (DR-080 note — needs a gold set, must stay advisory). Part of proposal 17 (enforcement & learning loop). See docs/proposals/17-enforcement-and-learning-loop.md + factory/decision-log.md + plugin/docs/decision-log.md (2026-06-26)."

  - id: DR-092
    patron: "shared DERIVED STATE (a level, a count, a status computed from the same sources) re-derived independently by several surfaces, drifting out of sync"
    default: "ONE SOURCE PER DERIVED VALUE — compute shared derived state ONCE and consume it everywhere. DR-057 prevents duplicate COMPONENTS; this prevents duplicate DERIVATIONS. A value computed from the data layer that more than one surface shows (e.g. the guild level, an aggregate count, a roll-up status) lives in a SINGLE cached function (a `React.cache()`/request-scoped resolver or one query module), and every surface reads THAT — never its own copy of the derivation. Re-deriving the same concept in two places is a defect: it drifts (the Mission Control header showed NV3 while the Logros hero showed NV1 because two call sites derived the guild level independently and one passed an unresolved path). The reviewer quality lens REJECTS a second independent derivation of a value an existing resolver already provides; the fix is to call the resolver, not re-implement it. Canonical: factory/standards/clean-code.md (injectable rule) + plugin/agents/reviewer.md (quality lens). Pairs with DR-057 (components) + DR-078 (fail-loud reads)."
    requiere_humano: false
    nota: "owner-driven (2026-06-26, proposal 17 P2.6): the NV3-vs-NV1 bug — `getGuildState()` (a React.cache single source) was introduced as the fix, but nothing in the standards/reviewer forbade the re-derivation that caused it. Net-new: 'single source for derived STATE', the data-layer analogue of DR-057's 'reuse before create' for components. See docs/proposals/17."

  - id: DR-093
    patron: "two or more agent/owner sessions working the SAME repo at once colliding on the shared gate and shared files (decision-logs, plugin.json, the registry)"
    default: "ISOLATE OR SERIALIZE CONCURRENT SESSIONS; APPEND-ONLY THE SHARED LOGS. Running two sessions on one working tree makes the shared gate flap (one session's half-built, unformatted, or knip-dirty WIP REDs the other's verify-before-stop) and collides on the few append-heavy shared files. RECOMMENDED DEFAULT: a second concurrent session works in its OWN git worktree (reuse the review-worktrees root pattern, DR-090) or on its own branch, and merges — so neither session's uncommitted WIP can break the other's gate. When sharing one tree is unavoidable, treat the gate as owned by one session at a time (don't end-turn-gate against the other's in-flight WIP), and keep the high-collision shared files — `decision-log.md` (every area), `factory/decisions/registry.yaml`, `plugin/.claude-plugin/plugin.json` — STRICTLY append-only/top-insert with a fresh dated block (never rewrite an existing entry), so two sessions add adjacent blocks instead of clobbering. A session must NEVER `git commit -a`/`git add -A` another session's incomplete WIP into its own commit, nor edit another session's uncommitted files to force the gate green. Canonical: factory/standards/build-orchestration.md (concurrency note)."
    requiere_humano: true
    nota: "owner-observed live (2026-06-26, proposal 17 P2.7): during one session a parallel session's IdeaPitch/discover feature broke the shared verify-before-stop gate 4× (unused param, test/impl mismatch, knip unused exports, stale visual baseline) and both sessions needed plugin.json + decision-logs. requiere_humano because choosing isolation (worktree/branch) vs serialized single-tree is an owner workflow decision; the append-only + no-sweep-others-WIP rules apply either way. See docs/proposals/17."

  - id: DR-094
    patron: "a canonical gate-config file (verify.sh / biome.json / knip.json / the VERBATIM e2e files) fixed IN-PLACE in a project, then silently reverted by the next /upgrade conformance overwrite"
    default: "DETECT IN-PLACE GATE-CONFIG DIVERGENCE AT UPGRADE, DON'T JUST OVERWRITE IT. The conformance overwrite (DR-059) is unconditional by design, but if a project's canonical gate-config legitimately diverged because a fix landed in-place (and was never back-ported), the overwrite silently reverts it (DR-076 — exactly how MC's knip@6 fix and biome `!**/*.py` were lost). So `/pandacorp:upgrade` MUST, BEFORE overwriting each canonical gate-config file, DIFF it against the template and — on any divergence — LOUDLY REPORT it (file + the diff) with the DR-076 instruction (back-port to plugin/templates/, don't fix in place), and only THEN overwrite. The overwrite stays unconditional (DR-059's binary guarantee preserved); the detector just makes the silent revert IMPOSSIBLE to miss, so a real in-place fix gets back-ported instead of lost. Pairs with the existing remind-backport-gate-config.sh edit-time nudge (DR-076). Canonical: plugin/skills/upgrade/SKILL.md (the gate-config conformance step)."
    requiere_humano: false
    nota: "owner-driven (2026-06-26, proposal 17 P2.8): in this session the dry-run diff before upgrade caught MC's biome.json ahead of the template (it would have reverted `!**/*.py` + trailingCommas); that catch was MANUAL. This codifies it as a required loud report inside /upgrade so the catch isn't luck. See docs/proposals/17 + DR-076."

  - id: DR-095
    patron: "how /spec produces the PRD/FRDs — the level of detail, and whether it ASKS the owner to resolve intent before generating vs invents requirements"
    default: "ASK BEFORE GENERATING (origin-calibrated) + FRDs COMPLETE-NOT-VERBOSE. (1) CLARIFICATION GATE: before writing the PRD/FRDs, the product-manager INFERS everything it can from the card/research/profile/standards and writes each as a visible `[ASSUMPTION: … — source]`, then asks only the MATERIAL, decision-changing gaps — in Spanish, grouped by lens (problema/scope · usuarios/flujos · datos&reglas · edge cases/errores · métricas · non-goals), concise, no filler. A MODE flag controls it (`--ask`/`--auto`/`--infer`), DEFAULTING by the idea's `origin`: a `new-idea` (`origin: owner`, owner-proposed) → `ask` (always present understanding+assumptions+questions and WAIT before generating); a `discover` idea (`origin: discovery`, intent INFERRED by the AI) → `auto` (ask only the key gaps the research didn't resolve, else proceed on the stated assumptions); `infer` never asks. Rationale: ambiguity is the #1 cause of an agent building the wrong thing, and a discovered idea's intent is inferred so it needs more elicitation than a user-proposed one. Resolved answers + standing assumptions are recorded in the PRD's 'Assumptions & open decisions'. (2) FRD DEPTH: the FRD is the build agent's contract, so it MUST carry data model, edge cases & error states, explicit non-goals, a worked example for the trickiest criteria, and an interface/contract sketch where it exposes/consumes one — BUT complete-not-verbose: over-specification overloads the agent's attention budget (lost-in-the-middle), and the build engine already passes one slice per agent (DR-056), so each FRD is complete on what matters, scoped, example-backed, contradiction-free; the PRD stays thin (depth lives in FRDs). Canonical: plugin/skills/spec/SKILL.md (step 4 gate + steps 5/6), plugin/agents/product-manager.md (rules 11/12 + SOP), plugin/templates/docs/{frd,prd}-template.md."
    requiere_humano: false
    nota: "owner-driven (2026-06-26): owner asked to make the spec docs the IDEAL input for build agents and to add a question-gate like PandaTrack's `create-frd-package` (3 discovery roles + 'do not create the FRD until critical ambiguity is resolved' + approval before writing). Deep-research (27 sources, 24/25 claims confirmed) validated: spec-driven dev (Kiro requirements→design→tasks, GitHub Spec Kit, EARS) is the right shape; ambiguity → wrong code; the over-specification/context-overload (lost-in-the-middle) failure mode is real, so 'as detailed as possible' is wrong — complete-not-verbose. The specific '66% / Cohen's d>1.2' clarification-questions stat was REFUTED, so the benefit is framed as an alignment lever, not a number. Owner set the calibration: new-idea always asks; discover infers then asks only key gaps; plus an explicit mode flag (ask/auto/infer)."

  - id: DR-096
    patron: "the owner fans out SEVERAL conversations/agents in parallel by hand (outside /implement) and the shared whole-program gate flaps — session A's verify.sh REDs on session B's in-flight WIP, A has no context on B and tries to fix or mask code it never wrote"
    default: "ISOLATE PARALLEL SESSIONS IN WORKTREES + REUNITE THROUGH A SERIALIZED MERGE QUEUE; ATTRIBUTE EVERY RED. /implement is collision-safe by construction (disjoint artifacts + single-writer, DR-060/086); this is the UNCOORDINATED case (DR-093), operationalized. (1) ISOLATE — a PER-SESSION reflex, NOT an orchestrator: the workflow is N independent natural conversations, so a session about to make a non-trivial code change (the SAME frontier as the write-gate; micro-edits stay in-tree) enters its OWN git worktree + branch ITSELF — the agent calls EnterWorktree, sanctioned by a standing rule in the project overlay — the moment it goes from planning to executing (isolate first, then edit). Reconstituting bootstrap on entry (.pandacorp/worktree-bootstrap.sh: pnpm install over the shared store — never symlink node_modules; .next per worktree; worktree-local launch.json on autoPort; secrets via the same out-of-repo sops exec-env; per-worktree DB for stateful projects via `CREATE DATABASE … TEMPLATE`, or PANDACORP_FACTORY_ROOT reference for stateless MC). Default-on, not detect-then-isolate (start-time detection is racy): a whole-program gate (tsc/knip/visual) cannot be scoped and only goes GREEN for a session whose foreign WIP isn't on disk — only isolation makes 'my gate sees only my work' true AND lets each parallel session actually reach done. (2) MERGE QUEUE (.pandacorp/merge-queue.sh): reunite branches through ONE serialized writer behind an atomic freshness-stamped merge.lock (clone build.lock, in the shared git dir): rebase onto current main tip → integration gate (verify.sh) on the combined result → ff-merge if green → remove worktree; a non-auto-resolvable textual conflict (git exits non-zero) is HANDED BACK, never auto-forced. The integration gate is the arbiter of textual/type/test correctness but CANNOT close the semantic-conflict gap — mitigate with typing + seam tests + small frequent merges + human review on same-region overlap. (3) ATTRIBUTE: a RED outside the session's own changed files is a FOREIGN red — reported, never fixed or --update-snapshots-masked (DR-093's no-sweep rule, executable in verify-before-stop.sh). (4) VISIBILITY — never silently strand a forgotten worktree: the invariant is that merge-queue.sh removes the worktree+branch ONLY on a successful merge, so anything surviving = unmerged work. Surface it three ways: the .pandacorp/run/worktrees/ manifest; `.pandacorp/pending-work.sh` (unions surviving worktrees with `git branch --no-merged` — the branch outlives a swept worktree — with age/status, plus --json + --notify); and Mission Control showing a GLOBAL ambient 'N pendientes' indicator in the persistent shell (primary, cross-project) + a per-project breakdown in the summary tab (secondary). Committed work is never lost (a branch persists past the conversation); this stops it being forgotten. PROPAGABLE: every project declares (a) fixed vs autoPort ports, (b) a reproducible bootstrap, (c) its per-worktree state-isolation strategy. Canonical: factory/standards/build-orchestration.md ('Parallel manual sessions' section) + a standing self-isolation rule in the project overlay (guide.md.tpl) — NO orchestrator skill; an optional thin /pandacorp:merge escape hatch for an escalated conflict. Builds on DR-060/086/090/093."
    requiere_humano: true
    nota: "owner-driven (2026-06-26, proposal 18), verified live: while designing this, the session's own Stop hook RED'd on a `documentacion`-mobile visual diff caused entirely by a parallel session's uncommitted globals.css/Banner WIP — zero edits from this session — the exact whole-program-gate cross-contamination this fixes. requiere_humano because choosing parallel scope, the DB-isolation strategy, and whether a given merge auto-resolves are owner/workflow calls. See docs/proposals/18."

  - id: DR-097
    patron: "a work order/feature implemented DIRECTLY (built by hand, in or out of /implement) left at a stale implementation_status — the board shows finished, gate-green work in the wrong Kanban column (stranded at IN_REVIEW or earlier instead of Done)"
    default: "DIRECT CHANGES MUST ADVANCE THE WORK-ORDER STATE. Whoever builds a change directly owns moving its work order's `implementation_status` to match reality — the board derives the Kanban column from that field, so a stale state shows finished work in the wrong column. While building → IN_PROGRESS; the moment the GREEN gate (.pandacorp/verify.sh — the objective scripts/CI, NOT self-assessment) passes clean → VERIFIED (board shows Done). NEVER leave finished, gate-green work stranded at IN_REVIEW: IN_REVIEW means 'built, awaiting a gate that hasn't run yet', so once the gate is green there is nothing left to wait for. This is CONSISTENT with constitution rule 4 ('an agent never checks off its own work') — the verify.sh gate IS the independent check; the agent only RECORDS its verdict, never self-asserts. The /implement engine advances state automatically; this rule covers the MANUAL path, which previously stranded work at IN_REVIEW. Canonical: project overlay guide.md ('Direct changes keep the work-order state honest') + factory/standards/build-orchestration.md §1."
    requiere_humano: false
    nota: "owner-driven (2026-06-27): the owner finished FRD-21 manually and asked why the work orders weren't moved to Done — they were stranded at IN_REVIEW because the agent over-applied rule 4, treating the reviewer AGENT as mandatory for VERIFIED. The objective gate (verify.sh) being green IS the verification; manual work must advance to VERIFIED on green, not wait for a reviewer nobody runs. The owner explicitly asked to codify this as a rule. Pairs with DR-096 (the manual parallel-session flow)."

  - id: DR-098
    patron: "a new project's visual design defaults to the factory's or a prior project's look (e.g. Mission Control's gamified pixel-art/RPG skin) instead of a design fit to THAT project's audience and use case"
    default: "EACH PROJECT EARNS ITS OWN VISUAL IDENTITY — there is NO factory-wide default aesthetic. The look is chosen FOR THE PROJECT, fit to its audience, use case and purpose; the EXPLORE path (design.md §1) researches the domain/audience and proposes directions FOR THAT PROJECT, and the audience constraint drives them (recruiter audience → professional/clean/confidence-inspiring; never gamified). Mission Control's gamified pixel-art/RPG skin is MC's OWN identity, NOT a template — never carry it (or any prior project's look) into a new project by default; reusing one project's aesthetic for another is a defect, the same class as ignoring an approved visual. Does NOT override the ADOPT-VISUAL path: when an approved visual exists for the project, fidelity to IT wins. Canonical: factory/standards/design.md §1b."
    requiere_humano: false
    nota: "owner-driven (2026-06-27): while re-speccing the personal-portfolio project (personal-page-v2), the owner asked that the gamified/RPG/pixel-art aesthetic stay scoped to Mission Control and that every project get its own design per audience — that one needs a professional, trust-inspiring look for recruiters. Reinforces the §1 EXPLORE 'bespoke per domain, never a house style'."

  - id: DR-099
    patron: "the worktree-isolation rule (DR-096) is a SOFT instruction — an agent rationalizes 'the tree is quiet' and edits the shared main checkout directly, leaving uncommitted WIP that REDs other sessions' gates; and a blocked merge or a cross-session red can leak into a conversation that should stay isolated"
    default: "ENFORCE ISOLATION AT THE EDIT MOMENT + KEEP CONVERSATIONS ISOLATED + LOUD HAND-BACK. (1) ENFORCEMENT, producer side: the PreToolUse write hook (plugin/scripts/warn-adhoc-write.sh) NUDGES to isolate whenever product CODE is edited directly in the SHARED main checkout (git-dir without /worktrees/) outside an active build — proactive + attributable (it is THIS session's edit), so 'the tree looks quiet' can no longer silently strand WIP (the racy detect-then-isolate mistake DR-096 warns against). Non-blocking (the agent judges significant-vs-micro), but in-the-loop at every shared-tree code edit; suppressed in a worktree and during an active build (the engine edits main in-place by design, DR-060). (2) LOUD HAND-BACK: merge-queue.sh fires a desktop notification on any merge that can't LAND (rebase conflict 10 / red gate 11 / busy main 12) — a blocked merge is never silent. (3) CONVERSATION ISOLATION: an agent handles a FOREIGN red SILENTLY (recognise it via git-status ownership, never touch/mask it — DR-096 not-mine) and does NOT narrate to the owner what OTHER sessions are doing (cross-session status is PULL, in Mission Control, never noise pushed into a conversation); and never reports work as 'done' until it is actually in main. AT COMMIT TIME this is concrete: when `git status` shows files this session did NOT touch (another session's WIP), `git add` ONLY this session's own files (never `git add -A`) and commit — do NOT ask the owner whether to commit, and do NOT mention the other session's files. Committing only your own files is correct and needs no permission (it leaves the foreign WIP untouched, DR-093 no-sweep); pausing to narrate it or ask is exactly the cross-session noise this rule removes. (4) GATE-LEVEL SILENCE ON FOREIGN REDS: the Stop gate (plugin/scripts/verify-before-stop.sh) ATTRIBUTES a red before surfacing it. warn-adhoc-write.sh records every edit of the session to .pandacorp/run/sessions/<session_id>.touched (gitignored runtime); on a red the gate compares the dirty + blamed files (by basename) against that record, and when NONE of this session's edits are implicated it ALLOWS THE STOP SILENTLY (logs to run/foreign-red.log for PULL visibility, emits NO stderr) instead of dumping another session's failure into the conversation. FAIL-CLOSED: a red touching any file this session edited (dirty or blamed), OR one that cannot be attributed (no per-session record), still BLOCKS — never silence a red that might be yours. Net effect: the owner is interrupted ONLY by their OWN session's reds; a foreign red is handled by the gate without a word. Canonical: plugin/scripts/warn-adhoc-write.sh, plugin/scripts/verify-before-stop.sh, plugin/templates/shared/.pandacorp/merge-queue.sh, project overlay guide.md. Builds on DR-096/097."
    requiere_humano: false
    nota: "owner-driven (2026-06-27): the agent built FRD-21 directly in the shared main checkout ('the tree is quiet') instead of a worktree, leaving uncommitted WIP that RED'd a parallel session's gate — exactly what DR-096 prevents, but DR-096 was a SOFT rule the agent rationalized past (and it wasn't even live in that already-running session). The owner asked to make it enforced. The PreToolUse isolation nudge + the loud merge hand-back + the conversation-isolation rule are the enforcement layer DR-096 lacked. A hard PreToolUse BLOCK was rejected: a hook can't reliably tell a significant change from a micro-edit, so it would trap legit work or mis-fire — hence a persistent in-the-loop nudge, not a lock. Refinement (owner-driven 2026-06-27): the Stop gate was STILL dumping a FOREIGN red (another session's in-flight WIP) into the conversation — the owner found that cross-session noise stressful and useless ('don't tell me about other sessions unless it needs my decision'). Mechanism (4) makes the gate itself attribute and stay SILENT on a foreign-only red, escalating only the session's own reds. The needs-a-decision case (an unresolvable merge conflict) is still surfaced — by the loud hand-back (2), not by the gate."

  - id: DR-100
    patron: "how /blueprint and /work-orders produce the technical blueprint + work orders — the precision/altitude of the docs and whether the plan's cohesion is CHECKED before the build, so the autonomous build is ideal (the build-side counterpart of DR-095, which fixed the spec/FRD side)"
    default: "RIGHT-SIZE + ANTI-OMIT + A CHECKED READINESS GATE. The factory's pipeline (FRD→blueprint/ADR→work-orders) is validated by the state of practice (Kiro requirements→design→tasks, BMad architecture-before-stories + context-embedded stories, GitHub Spec Kit WHAT/HOW split + ambiguity markers, EARS); the gap was ENFORCEMENT + a few precision levers, not the design. (1) READINESS GATE (BMad-style cohesion check, build-side counterpart of DR-095): before a blueprint goes ACTIVE — and re-checked by /implement's preflight — the architect asserts fail-closed: every REQ→component, every AC covered by EXACTLY ONE work order (no gaps/dupes), data model has no TBD, dependsOn acyclic + complete, wave artifacts disjoint by design, foundation complete (DR-057 asserted at plan time), each backend WO's docs/api/<wo>.md materialized before its consumer, and NO [NEEDS CLARIFICATION] survives. 'A blueprint with holes produces ambiguous work orders' becomes a CHECKED gate, not a hope. (2) [NEEDS CLARIFICATION] BLOCKING MARKER (Spec Kit): an unresolved, build-CHANGING question is marked inline `[NEEDS CLARIFICATION: q]` (distinct from a resolved `[ASSUMPTION: … — source]`, DR-095) — it BLOCKS, a doc may not reach status: ACTIVE while one survives; cabled fail-closed in verify.sh (a marker in an ACTIVE doc is RED; DRAFT may still carry it). (3) RIGHT-SIZE WITH A NAMED CEILING: the coarse-WO policy (DR-050) stands as the lower bound; the upper bound is now concrete — split a WO too big to review in one sitting, past the model's reliable context zone (context rot — quality degrades before the window fills), or mixing >1 concern. (4) ANTI-OVER-SPECIFICATION: if a blueprint/WO 'reads like code' it is over-specified (loses the abstraction benefit, overloads attention) — specify at the altitude (contracts/shapes), not line-by-line; a canonical worked example beats enumerating every edge case. (5) COMPLETENESS 20% (anti-omission): AI builders ship the ~80% happy path and drop the production 20% (error path per failure mode, validation beyond types, empty/partial states, observability, security) — so the FRD names the applicable items, the WO's Status-Note enumerates met/unmet AC (surfacing, NOT self-certifying — rule 4 preserved), and the reviewer's correctness lens verifies the build against the list (a missing item BLOCKS, it is not a visual nit). (6) STRUCTURED CONTRACTS: the FRD interface sketch + blueprint Contracts use a fixed shape (input+validation / success+status / errors / invariants). (7) EARS CALIBRATION: not every requirement fits EARS — >~3 preconditions → a table/decision-table; clarity over template. Canonical: plugin/skills/{blueprint,work-orders,spec}/SKILL.md, plugin/agents/{architect,product-manager,reviewer}.md, plugin/templates/docs/{frd,work-order,blueprint}-template.md, factory/standards/{build-orchestration.md §2/§3b,quality.md}, plugin/templates/stack-a-nextjs/verify.sh (residual-ambiguity gate)."
    requiere_humano: false
    nota: "owner-driven (2026-06-28): owner asked to make /blueprint + /work-orders generate consistently precise docs (ni más ni menos) so the 100%-AI build is ideal, with freedom to also touch /spec. Deep-research (28 sources, 125 claims, 24 confirmed 2/3-adversarial, 1 refuted) cross-walked against the factory's own skills: the FRD→blueprint→work-orders shape is validated by Kiro/BMad/Spec Kit/EARS — bones correct, the gap is that precision lived as prose not as a cabled gate. One claimed statistic was REFUTED in verification and is not used; the single-concern-per-task principle it touched stands on its own (curse-of-instructions + mixing-work-types-is-anti-pattern) and is what the work-order ceiling encodes. Extends DR-095 to the build side; the readiness gate is the BMad bmad-check-implementation-readiness analogue."

  - id: DR-101
    patron: "the per-surface QUALITY of what Claude Design generates in the EXPLORE design path — generation cadence, visual hierarchy, cross-page closing, real content, prompt discipline, and the per-screen review (batch-2, on top of DR-058's connection/brief + DR-062's cohesion)"
    default: "GENERATE THE FULL SCREEN SET IN A TWO-STAGE CADENCE + WEIGHT=IMPORTANCE + REAL CONTENT + EXPLICIT PROMPTS + A PER-SCREEN RUBRIC. Batch-2 design-phase rules learned driving the Claude Design canvas on personal-page-v2 (2026-06-28), on top of DR-058 (real connection + exhaustive anti-omission brief + pull-and-review) and DR-062 (cross-surface cohesion). (1) TWO-STAGE CADENCE, NEVER STOP AT THE LANDING: Stage 1 generates the design SYSTEM (tokens/brand/full component gallery+states+motion per the §1c checklist) → owner approves; Stage 2 generates ALL the UI-FRD screens — ENUMERATED BY THE SKILL from the FRDs (every ui:true FRD → its screen(s)) — one screen at a time with pull-and-review; the owner must never have to ask 'where are the other pages?' (only the landing generated until the owner asked page-by-page = the bug). (2) WEIGHT = IMPORTANCE (hierarchy/proportion): the surface's primary action/conversion gets prominent treatment (the shared cta-band), never an undersized one-line link (the contact CTA — THE conversion — shipped as a tiny text link); primary>secondary>tertiary, no key element rendered tiny, no secondary/decorative element out-shouting the primary; and DO NOT open a page with a context-free hero image (lead with title+context+at-a-glance, image contained/secondary — recruiters skim <60s). (3) ONE SHARED CLOSING cta-band reused on every page (reinforces DR-062): a first-class component in components.md, not a per-page ad-hoc 'let's talk' link (that is both a hierarchy and a cohesion defect). (4) REAL CONTENT, NEVER INVENTED: lists/cards/stack/archive/metrics derived from the owner's REAL sources (GitHub, sibling projects, projects.json, the brief), balanced lengths so cards align; placeholders only where data is genuinely pending and VISIBLY marked, never plausible-looking invented data. (5) EXPLICIT PROMPTS: name the element + the action + what stays ('Delete the ENTIRE element including its text and link; replace with nothing', not a vague 'remove the note'). (6) PER-SURFACE PLAYBOOKS (case study / Now / blog index / blog post / contact / projects-archive / stack) captured once so future projects don't re-research them live: plugin/skills/design/references/surface-playbooks.md. (7) PER-SCREEN REVIEW RUBRIC: before the owner gate the agent PULLS each generated screen (DesignSync get_file — from the real file, not memory/old screenshots) and checks hierarchy · cohesion · real content · all states · responsive · a11y · motion · no dead/placeholder where a real value/route exists · @dsCard present · surface-playbook followed. Canonical: factory/standards/design.md §7 (shared cta-band) + §9 (hierarchy) + §10 (real content) + §11 (two-stage cadence + explicit prompts) + §12 (rubric); plugin/skills/design/SKILL.md (EXPLORE path); plugin/skills/design/references/surface-playbooks.md. Factory-internal design-phase guidance (consumed by the design skill + designer/reviewer agents) — like DR-058/DR-062 it does NOT inject a project rule, so no rule-library/OVERLAY change."
    requiere_humano: false
    nota: "owner-driven (2026-06-28): batch-2 of the Claude Design learnings from personal-page-v2, codified via /pandacorp:learn IN THE FACTORY ON TOP of plugin v9.24.0/DR-058 §1c (do not redo: real connection, exhaustive brief + anti-omission checklist, image placeholders, mandatory motion, breakpoints by target_platforms, pull-and-review, token authorship). The skill's canvas guidance was still too loose: only the landing generated until the owner asked page-by-page; the contact CTA (the conversion) came out as a one-line link; prompts were ambiguous (a vague 'remove the note' left stray text); per-surface quality had to be re-researched live. Pairs with DR-058 (generation mechanism/brief) and DR-062 (cohesion — DR-101's shared cta-band is the closing-frame instance). Source lesson: personal-page-v2 memory claude-design-skill-improvements (promotion: approved). See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-28). Plugin v9.26.0→v9.27.0 (MINOR)."

  - id: DR-102
    patron: "after /blueprint installs the stack and writes the architecture/blueprints/work-orders, NOTHING re-checks those docs against the REAL installed scaffold — so a blueprint can cite a framework API/file-convention/version the model only REMEMBERS (outdated), which then surfaces as mid-build rework ('context blindness'); plus the supporting gaps that feed it: dep versions pinned only in prose, no env-var inventory, no version-matched agent docs, and NFRs left implicit"
    default: "REPO-GROUNDING + GROUNDED ARTIFACTS, on top of DR-100's cohesion gate. The single most evidence-backed AI-build error-reducer is validating the plan against the actual repo BEFORE code generation; DR-100 proved internal COHESION, this adds external FIDELITY to the installed scaffold. (1) REPO-GROUNDING VALIDATION GATE (/blueprint step 9b, before any doc goes ACTIVE; re-checked by /implement preflight): a fresh reviewer (not the author) verifies EVERY concrete claim in architecture.md + per-FRD blueprints + work orders against the scaffold installed in step 6 — (a) every cited file/dir path exists or is creatable as written under the installed framework's conventions (catches e.g. Next 16 `proxy.ts` vs the remembered `middleware.ts`); (b) every cited framework API/config key is current for the INSTALLED major, cross-checked against the framework's version-matched docs (the AGENTS.md pointer, not training memory); (c) every dependency version named in architecture.md is actually installed OR carried as an exact `pnpm add <pkg>@<version>` in a WO (no prose-only version); (d) hard guarantees are achievable as specified, verified against a real build (e.g. next-intl `setRequestLocale` present so `[locale]` is static, confirmed by `pnpm build`, not assumed). Any mismatch BLOCKS until fixed. (2) PIN VERSIONS AT THE INSTALL POINT, not in prose: install at the chosen versions or write the exact `pnpm add <pkg>@<version>` into the foundation WO. (3) GENERATE `.env.example` as a standard blueprint artifact (env-var inventory; commit it, keep real .env gitignored). (4) GENERATE/REFRESH `AGENTS.md` pointing agents at the framework's VERSION-MATCHED bundled docs (the create-next-app pattern; the model-uses-outdated-API fix). (5) NFRs EXPLICIT PER-WO: the work-order completeness-20% names security + performance + a11y + reduced-motion, not just functional ACs (NFRs are the most systematically dropped class in AI builds). HOLD THE ALTITUDE (DR-100): this grounds and currents the plan, it does NOT inflate it — tighten contracts + fix mismatches; spec VOLUME/quality alone does not reduce defects, grounded contracts + executable checks + repo-grounding do. Canonical: plugin/skills/blueprint/SKILL.md (step 6 pins/.env.example/AGENTS.md + step 9b repo-grounding gate), plugin/templates/docs/work-order-template.md (explicit NFRs). Extends DR-100; factory-internal skill/template guidance (consumed by /blueprint + architect/reviewer) — does NOT inject a project rule, so no rule-library/OVERLAY change."
    requiere_humano: false
    nota: "owner-driven (2026-06-29): on personal-page-v2, right after /blueprint produced a strong plan (115 ACs fully covered, acyclic DAG, disjoint artifacts) + installed the stack green, an adversarial audit found 4 BLOCKERS that would have caused mid-build rework — all 'context blindness' against the real installed stack: docs said `middleware.ts` but Next 16 renamed it `proxy.ts`; `setRequestLocale` missing so `[locale]` rendered DYNAMIC (broke the $0/static guarantee); theme attribute mismatch; dep versions pinned only in architecture.md prose. Deep-research (22 sources, 25 claims 2/3-adversarially verified) confirmed the remedy: validating intermediate artifacts against the actual repo BEFORE codegen is the #1 error-reducer (arXiv:2604.05278); AGENTS.md→version-matched docs measurably cuts outdated-API errors (Next.js /evals); NFRs are systematically absent (~14%, arXiv:2511.12884); and — important caveat, honored in the default — more/better spec VOLUME does NOT reduce defects (SSRN 6515898), so this grounds the plan, it does not inflate it. Extends DR-100 to add the missing external-fidelity half. The audit's 4 blockers were fixed in personal-page-v2 in the same session. See factory/decision-log.md + plugin/docs/decision-log.md (2026-06-29). Plugin v9.27.0→v9.28.0 (MINOR); no OVERLAY change (skill+template only)."
