# Registro de decisiones de Pandacorp
# Decisiones recurrentes con default pre-aprobado. Si una decisión no está aquí:
# escalar a Sergio UNA vez y agregar la regla nueva con su respuesta.

decisiones:
  - id: DR-001
    patron: "agregar dependencia npm/pip a un proyecto"
    default: "auto-aprobar si: sin CVEs conocidos, mantenida en los últimos 12 meses, licencia permisiva (MIT/Apache/BSD), y existe en el registry oficial (cuidado con paquetes alucinados)"
    requiere_humano: false

  - id: DR-002
    patron: "elección de stack/tecnologías para un proyecto nuevo"
    default: "el architect propone el stack en el blueprint partiendo del recomendado (fabrica/estandares/stack.md, en últimas versiones estables) y puede sugerir mejores alternativas con trade-offs; Sergio aprueba la elección (gate ligero) y queda como ADR. Las convenciones duraderas (fabrica/estandares) NO se negocian"
    requiere_humano: true
    nota: "aprobación ligera dentro del blueprint, no un gate aparte"

  - id: DR-003
    patron: "deploy a staging / entorno de pruebas"
    default: "auto-aprobar si CI verde"
    requiere_humano: false

  - id: DR-004
    patron: "deploy a PRODUCCIÓN"
    default: "BLOQUEAR — requiere aprobación explícita de Sergio"
    requiere_humano: true

  - id: DR-005
    patron: "gastar dinero (compras, planes pagos, dominios, APIs de pago)"
    default: "BLOQUEAR — requiere aprobación explícita de Sergio con monto"
    requiere_humano: true

  - id: DR-006
    patron: "migración de esquema de BD"
    default: "auto-aprobar migraciones ADITIVAS (expand) en dev/staging si tienen bloque down y pasan en BD de prueba. Cambios DESTRUCTIVOS (DROP de columna/tabla, rename) = patrón expand/contract forward-compatible; el DROP final requiere snapshot verificado + gate humano (DR-007) y timebox de troubleshooting con rollback. En producción → escalar"
    requiere_humano: false

  - id: DR-007
    patron: "borrar datos, repos, ramas remotas o recursos cloud"
    default: "BLOQUEAR — requiere aprobación explícita de Sergio"
    requiere_humano: true

  - id: DR-008
    patron: "comunicaciones externas (emails a usuarios, webhooks públicos, publicar en stores/marketplaces)"
    default: "BLOQUEAR — requiere aprobación explícita de Sergio"
    requiere_humano: true

  - id: DR-009
    patron: "idioma de artefactos"
    default: "documentos en español; código, commits e identificadores en inglés"
    requiere_humano: false

  - id: DR-010
    patron: "crear repositorio GitHub para un proyecto"
    default: "auto-aprobar como repo PRIVADO en la cuenta de Sergio; público → escalar"
    requiere_humano: false

  - id: DR-011
    patron: "descartar una idea de la base (score < 30 tras documentar)"
    default: "auto-aprobar mover a estado 'descartada' dejando el racional en la ficha; nunca borrar el archivo"
    requiere_humano: false

  - id: DR-012
    patron: "scope de una versión (qué FRDs entran en v1)"
    default: "el corte mínimo que valida la hipótesis de valor; FRDs 'nice to have' van al backlog de la siguiente versión"
    requiere_humano: false

  - id: DR-013
    patron: "implementación de un proyecto (cómo se reparte el trabajo entre agentes)"
    default: "usar Agent Teams (agentes que se comunican y se pasan el trabajo). Composición según stack: web (A) → backend-dev + frontend-dev + test-writer; API/scraper (B/C/D) → backend-dev + test-writer; siempre con dependencias (frontend arranca cuando backend termina; testing cuando frontend/backend terminan) y el reviewer al cerrar cada work order"
    requiere_humano: false

  - id: DR-014
    patron: "tamaño de equipo y modelos por agente (control de consumo)"
    default: "DISEÑAR PARA Max 5x en proyectos: equipo de ≤3 agentes simultáneos, líder en opus, obreros (implementación/testing/investigación) en sonnet o haiku. La construcción de la propia fábrica (panda-corp y su panel Pandacorp) puede usar equipos mayores mientras el plan lo permita (Max 20x)"
    requiere_humano: false

  - id: DR-015
    patron: "propiedad de los tests de verificación (quién escribe qué)"
    default: "el test-writer/implementer escribe los tests del happy path y los criterios EARS; el reviewer (modelo distinto al generador, opus) escribe ADEMÁS tests adversariales y de casos límite que el implementer NO vio. Anclar los casos en criterios EARS y en bugs reales de docs/progreso.md, nunca en lo que el modelo imagina"
    requiere_humano: false
    nota: "rompe el sesgo compartido test-writer↔implementer (ver docs/propuestas/06)"

  - id: DR-016
    patron: "mutation testing / property-based testing (cuándo correrlos)"
    default: "NO en cada gate Stop (caro). Correr mutation testing (Stryker en TS / mutmut en Python) y property-based (fast-check / hypothesis) al CERRAR cada hito de FRD y en CI hacia main. Umbral de mutation score sugerido ≥60% en lógica de negocio nueva; por debajo, el reviewer exige tests adicionales"
    requiere_humano: false

  - id: DR-017
    patron: "checklist de seguridad agéntica en release"
    default: "el security-auditor evalúa el OWASP Top 10 for Agentic Applications (ASI01–ASI10) además del OWASP web esencial. Tool Misuse, Identity/Privilege Abuse, Memory Poisoning y Cascading Failures = bloqueantes si hay exposición real"
    requiere_humano: false

  - id: DR-018
    patron: "documentación viva (changelog, ADRs, docs de usuario)"
    default: "auto-generar el changelog desde Conventional Commits en release; proponer un ADR automáticamente cuando un work order toca arquitectura; mantener README/docs como parte del work order (no tarea aparte). Sin esfuerzo humano salvo aprobar un ADR no obvio"
    requiere_humano: false

  - id: DR-019
    patron: "endurecimiento del entorno de verificación (anti-trampa)"
    default: "verify.sh corre en entorno limpio, parsea fail-closed (ambigüedad = fallo), no expone al agente generador los nombres exactos de los tests a pasar ni los fixtures, y emite mensajes accionables (qué regla falló y por qué). Aplica a la plantilla de verify.sh que crea el blueprint"
    requiere_humano: false

  - id: DR-020
    patron: "operación de la construcción (cómo corre implement desatendido)"
    default: "implement corre en auto mode (permisos; lo activa Sergio a nivel usuario, el repo no se lo concede) con freeze-on-red (tras 3 reintentos no commitea lo roto, deja HEAD en el último verde, marca el WO BLOQUEADO, notifica y sigue con WOs independientes) y circuit breakers (tope de iteraciones, no-progreso, presupuesto). El operador habla por archivos (docs/bugs, docs/decisiones.md, replanteo_pendiente), que el agente revisa solo en puntos seguros"
    requiere_humano: false

  - id: DR-021
    patron: "base de datos y servicios en desarrollo"
    default: "en DEV, cada proyecto y cada worktree levanta su BD/servicios con Docker Compose, puerto propio; en STAGING/PRODUCCIÓN, managed DB del golden path (Neon/Supabase), nunca Docker. Ver fabrica/estandares/infra.md"
    requiere_humano: false

  - id: DR-022
    patron: "asignación de puertos (varios proyectos/worktrees en paralelo)"
    default: "cada proyecto recibe un rango base al crearse; cada worktree suma un offset (agente +0, review +1); app/BD/servicios leen el puerto del .env del worktree; en Docker, nombre de proyecto Compose distinto por worktree"
    requiere_humano: false

  - id: DR-023
    patron: "probar lo avanzado sin parar la construcción"
    default: "Sergio prueba el último commit verde (last_green_sha) en un git worktree aparte (una sola carpeta de review, refrescada al último verde), nunca el working tree del agente. El script del gate escribe last_green_sha + safe_to_test en docs/estado.yaml. Checkpoints nativos NO sirven como snapshot (ignoran lo hecho por Bash)"
    requiere_humano: false

  # Las DR-024..030 son gobernanza: apuntan a un estándar de fabrica/estandares/ (los valores viven allí, no aquí).
  - id: DR-024
    patron: "performance en proyecto web"
    default: "aplicar budget Core Web Vitals (LCP≤2.5s / INP≤200ms / CLS≤0.1 al p75, ver performance.md); gate Lighthouse-CI como proxy, block-on-main; p75 real en campo vía PostHog. Desvío de umbral = ADR"
    requiere_humano: false

  - id: DR-025
    patron: "privacidad / manejo de datos personales (PII)"
    default: "minimizar PII, no loguearla, retención con plazo, export/delete en el modelo (ver privacidad.md). Recolectar PII NUEVA o compartir datos con terceros = escalar a Sergio (alinea con DR-008)"
    requiere_humano: true
    nota: "humano solo para PII nueva / compartir con terceros; lo demás es default determinista"

  - id: DR-026
    patron: "observabilidad mínima de un proyecto"
    default: "todo proyecto integra error-tracking (Sentry, del stack) + logs estructurados JSON con service.name desde el día 1, sin preguntar (ver observabilidad.md)"
    requiere_humano: false

  - id: DR-027
    patron: "security headers / CSP (web)"
    default: "setear el set OWASP barato como default literal en next.config (ver seguridad-web.md); CSP con nonce en report-only en v1. Verificado por header-scan en CI. El submit a hstspreload.org = humano (es duradero)"
    requiere_humano: false
    nota: "auto salvo el preload submit, que escala a Sergio"

  - id: DR-028
    patron: "contrato de error de una API"
    default: "RFC 9457 (application/problem+json) + validación en el borde (Zod/pydantic) por default (ver api-design.md)"
    requiere_humano: false

  - id: DR-029
    patron: "feature flags"
    default: "flags sensibles se evalúan server-side (el cliente recibe solo el resultado); expiración OBLIGATORIA al crear el flag + archivar (no borrar). Auto-aprobable: kill-switch y rollout gradual (1/5/25/50/100). ESCALA si el flag haría bypass de un gate existente (migración prod DR-006, dinero DR-005)"
    requiere_humano: false
    nota: "escalado condicional: humano solo si el flag bypassa otro gate"

  - id: DR-030
    patron: "desviación del golden path en un proyecto"
    default: "desviarse = ADR per-proyecto (no DR nueva). sync-portfolio/recommend observan ADRs de desviación recurrentes entre proyectos y proponen promover el patrón a fabrica/estandares/ cuando se repite. Promover a estándar = decisión de Sergio"
    requiere_humano: false
    nota: "la promoción de un patrón recurrente a estándar global la aprueba Sergio"
